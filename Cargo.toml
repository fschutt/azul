[dependencies.accesskit]
version = "0.24"
optional = true
default-features = false

[dependencies.agg-rust]
# Capped below 1.0.3: agg-rust-azul 1.0.3 removed/renamed
# RasterizerScanlineAa::add_path_vertices_transformed, which this (0.0.10-era)
# cpurender code calls — a fresh `--features svg` resolution stopped compiling
# the day 1.0.3 was published. azul master is already adapted to 1.0.3; this
# release line pins the API it was built against.
version = ">=1.0.2, <1.0.3"
optional = true
default-features = false
package = "agg-rust-azul"

