[workspace]
resolver = "2"
members = [
    "examples/rust", # Rust examples - depends on azul-dll
    "examples/azul-paint", # AzulPaint demo (SUPER_PLAN_2 P2 goal app)
    "examples/azul-maps", # AzulMaps demo (SUPER_PLAN_2 P3 goal app)
    "examples/azul-vault", # AzulVault demo (SUPER_PLAN_2 P4 goal app)
    "examples/azul-doc", # AzulDoc demo (SUPER_PLAN_2 P5 goal app)
    "examples/azul-spirit-level", # AzSpirit demo (P6 motion-sensor goal app)
    "examples/azul-gamepad", # AzGamepad demo (P6 gamepad goal app)
    "examples/azul-camera-app", # AzCamera demo (P6 camera widget)
    "dll", # dll module with auto-gen C functions (optional pyO3 support), depends on layout, core and css
    "doc", # doc / test generator, depends on layout, core and css
    "layout", # layout depends on core + css
    "core", # core depends on css
    "css", # CSS parser, does not depend on anything else
]
exclude = [
    ".claude-agents",
    "tests",
    "experiments",
    "third_party",
]

[workspace.dependencies]
glean = "60.5.0"
gleam = "0.15.1"

[patch.crates-io]
rust-fontconfig = { path = "/Users/fschutt/Development/rust-fontconfig" }
# Single azul-layout in the dll: point printpdf's azul-* (= 0.0.7) at OUR
# local crates, and use the local printpdf checkout (branch
# `azul-mobile-parsedfont-compat`) whose font.rs is updated to our current
# `ParsedFont` API (get_or_decode_glyph + original_bytes: Option<Arc<FontBytes>>).
# PR-pending upstream; switch back to the crates.io printpdf once released.
azul-css = { path = "css" }
azul-core = { path = "core" }
azul-layout = { path = "layout" }
printpdf = { path = "/Users/fschutt/Development/printpdf" }

[profile.release]
opt-level = 3
debug = 1         # Line-level debug info only (smaller than full debug=2).
strip = false     # Don't strip symbols so samply can resolve them.
lto = false       # No LTO for faster local builds.
codegen-units = 16 # Parallel codegen for faster local builds (~60s → ~20s for azul-layout).
panic = "abort"   # Removes stack unwinding code (drastic size reduction).

# CI / distribution profile: maximum optimization, slow to build.
#   cargo build --profile prod-release -p azul-dll --features build-dll
[profile.prod-release]
inherits = "release"
opt-level = 3
lto = "thin"      # Thin LTO: good size/perf wins without full-LTO build cost.
codegen-units = 1 # Single codegen unit for best optimization.
strip = "symbols" # Strip symbols for smallest binary.

# Minimum-size profile: smallest possible binary without losing functionality.
#   cargo build --profile min-size -p azul-dll --features build-dll
[profile.min-size]
inherits = "release"
opt-level = "z"   # Optimize for size over speed.
lto = "fat"       # Full LTO: maximum cross-crate inlining + dead code elimination.
codegen-units = 1 # Single codegen unit for best optimization.
strip = "symbols" # Strip debug symbols and local symbols.
debug = 0         # No debug info at all.

[profile.coverage]
inherits = "release"
strip = false     # Keep symbols for grcov source mapping.
debug = true      # Full debug info for line-level coverage.
lto = false       # Disable LTO so grcov can see individual object files.
codegen-units = 16
panic = "unwind"  # Tests need unwinding for #[should_panic] etc.

