[package]
name = "azul-gamepad"
version = "0.1.0"
edition = "2021"
authors = ["Felix Schütt <felix.schuett@maps4print.com>"]
license = "MIT"
description = """
    AzGamepad — a live game-controller readout, the P6 demo for gamepad
    input (SUPER_PLAN_2 §1 feature 6). A window-create callback installs a
    Timer that polls `CallbackInfo::get_primary_gamepad()` (via the
    TimerCallbackInfo's wrapped CallbackInfo) and re-lays-out a panel: button
    chips light up when pressed, the two sticks drive dots, the triggers
    drive bars. Unlike the sensor demos, the gilrs desktop backend runs on
    the dev host, so this is testable with a controller plugged in. Built
    entirely on the public `azul::` api.json surface (P6.gamepad).
"""
publish = false

[dependencies]
azul = { path = "../../dll", package = "azul-dll", default-features = false, features = ["link-static"] }

[[bin]]
name = "azul-gamepad"
path = "src/main.rs"
