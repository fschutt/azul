[package]
name = "azul-camera-app"
version = "0.1.0"
edition = "2021"
authors = ["Felix Schütt <felix.schuett@maps4print.com>"]
license = "MIT"
description = """
    AzCamera — a dummy camera app, the P6 demo for the camera widget pivot.
    `CameraWidget::create(config).dom()` embeds a live `<img>` fed by a
    background capture thread (started on mount) whose writeback uploads each
    frame into a GL texture + recomposites — no relayout, no display-list
    rebuild, no camera logic in core. With the built-in test-pattern worker
    this shows a colour-cycling preview on any machine (no webcam needed);
    the real AVFoundation/Camera2 worker swaps in later. Built entirely on the
    public `azul::` api.json surface (azul::widgets::CameraWidget).
"""
publish = false

[dependencies]
azul = { path = "../../dll", package = "azul-dll", default-features = false, features = ["link-static"] }

[[bin]]
name = "azul-camera-app"
path = "src/main.rs"
