[package]
name = "azul-paint"
version = "0.1.0"
edition = "2021"
authors = ["Felix Schütt <felix.schuett@maps4print.com>"]
license = "MIT"
description = """
    AzulPaint — finger / stylus paint demo. The P2 goal app from
    SUPER_PLAN_2 — exercises multi-touch TouchPointVec, the populated
    PenState (pressure + tilt), and the cross-platform mobile event
    surface. Save-as-SVG / Save-as-PNG round-trips through the mobile
    file-picker handle (P1.3).
"""
publish = false

[dependencies]
azul = { path = "../../dll", package = "azul-dll", default-features = false, features = ["link-dynamic"] }

# Android: build as a NativeActivity cdylib — link android-activity into libazul
# and use `ctor` for the load-time constructor that stashes the window options.
[target.'cfg(target_os = "android")'.dependencies]
azul = { path = "../../dll", package = "azul-dll", default-features = false, features = ["link-static", "android-activity"] }
ctor = "0.2"

# rlib = what the desktop/iOS bin links; cdylib = the Android NativeActivity lib.
[lib]
name = "azul_paint"
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"]

[[bin]]
name = "azul-paint"
path = "src/main.rs"
