[package]
name = "azul-maps"
version = "0.1.0"
edition = "2021"
authors = ["Felix Schütt <felix.schuett@maps4print.com>"]
license = "MIT"
description = """
    AzulMaps — the P3 goal app from SUPER_PLAN_2. Demonstrates the
    `MapWidget` (layout/src/widgets/map.rs) end-to-end on desktop:
    Web Mercator tile grid, viewport state, GPU-translated tile
    divs, `MapTileCache` `RefAny` dataset that survives relayout via
    a `DatasetMergeCallback`. Tile fetch + MVT decode + MapCSS-to-SVG
    pipeline land in follow-up ticks; this demo shows the grid math
    + viewport bookkeeping working today.
"""
publish = false

[dependencies]
azul = { path = "../../dll", package = "azul-dll", default-features = false, features = ["link-static"] }

[[bin]]
name = "azul-maps"
path = "src/main.rs"
