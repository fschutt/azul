[package]
name = "azul-maps"
version = "0.1.0"
edition = "2021"
authors = ["Felix Schütt <felix.schuett@maps4print.com>"]
license = "MIT"
description = """
    AzulMaps — the P3 goal app from SUPER_PLAN_2. Demonstrates the
    `MapWidget` (layout/src/widgets/map.rs) end-to-end on desktop:
    Web Mercator tile grid, viewport state, GPU-translated tile
    divs, `MapTileCache` `RefAny` dataset that survives relayout via
    a `DatasetMergeCallback`. Tile fetch + MVT decode + MapCSS-to-SVG
    pipeline land in follow-up ticks; this demo shows the grid math
    + viewport bookkeeping working today.
"""
publish = false

[dependencies]
azul = { path = "../../dll", package = "azul-dll", default-features = false, features = ["link-dynamic"] }

# On Android the crate builds as a NativeActivity cdylib: link the android-activity
# glue into libazul (so it provides android_main / ANativeActivity_onCreate) and
# pull in `ctor` for the load-time constructor that stashes the window options.
[target.'cfg(target_os = "android")'.dependencies]
azul = { path = "../../dll", package = "azul-dll", default-features = false, features = ["link-static", "android-activity", "map-tiles"] }
ctor = "0.2"

# rlib = what the desktop/iOS bin links; cdylib = the Android NativeActivity lib.
[lib]
name = "azul_maps"
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"]

[[bin]]
name = "azul-maps"
path = "src/main.rs"
