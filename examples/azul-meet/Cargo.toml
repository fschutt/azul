[package]
name = "azul-meet"
version = "0.1.0"
edition = "2021"
authors = ["Felix Schuett <felix.schuett@maps4print.com>"]
license = "MIT"
description = """
    azul-meet - a Google-Meet-style demo on the public azul API. A meeting UI
    whose toolbar toggles enable/disable microphone, camera and screen-share;
    each toggle triggers a relayout so the DOM gains/loses a CameraWidget /
    ScreenCaptureWidget / MicrophoneWidget (whose AfterMount starts the capture).
    Remote participants are grey placeholders; the local user is a live tile.
    Auto-joins a generated 'meeting link'. Sending media to remote peers over
    the wire is the WebTransport follow-up.
"""
publish = false

[dependencies]
azul = { path = "../../dll", package = "azul-dll", default-features = false, features = ["link-static"] }

[[bin]]
name = "azul-meet"
path = "src/main.rs"
