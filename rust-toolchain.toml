# Pin the toolchain so local builds, clippy, and rustfmt match upstream CI
# exactly (.github/workflows/rust.yml uses 1.88.0 across all jobs). Without this
# pin, a newer local rustc (e.g. 1.90) diverges on const-fn rules and edition-2024
# lints, producing errors/lints that don't reproduce on CI (and vice versa).
[toolchain]
channel = "1.88.0"
components = ["clippy", "rustfmt"]
