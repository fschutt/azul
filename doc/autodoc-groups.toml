# azul-doc autodoc — group manifest
#
# Hand-curated grouping of the 173 entries in doc/guide/reference.md into
# system-level documentation tasks. Consumed by `azul-doc autoreview autodoc`
# to dispatch one agent per group.
#
# Layout:
#   - one [[group]] per agent dispatch
#   - each group declares its target audience(s) and the output files it owns
#   - source_files are read-only inputs the agent uses to write the guide(s)
#   - no two groups own the same output path → no agent collisions
#
# Audiences:
#   "external"     — users of the azul crate (write apps, style with CSS, ...)
#   "contributor"  — azul developers (read internals, fix bugs, refactor)
#
# Agent strategy:
#   "single"  — one output file
#   "split"   — multiple output files within the same audience
#   "dual"    — output files for both audiences (shares read context, two writes)

[meta]
generated_from = "doc/guide/reference.md"
total_groups = 20
total_outputs = 27
existing_guides = ["architecture"]

# ── External-only ──────────────────────────────────────────────────────

[[group]]
id = "getting-started"
audience = ["external"]
agent_strategy = "split"
outputs = [
  { slug = "getting-started",        path = "doc/guide/getting-started.md",        title = "Getting Started" },
  { slug = "bindings/rust",          path = "doc/guide/bindings/rust.md",          title = "Rust Bindings" },
  { slug = "bindings/c",             path = "doc/guide/bindings/c.md",             title = "C Bindings" },
  { slug = "bindings/cpp",           path = "doc/guide/bindings/cpp.md",           title = "C++ Bindings" },
  { slug = "bindings/python",        path = "doc/guide/bindings/python.md",        title = "Python Bindings" },
]
source_files = [
  "core/src/lib.rs", "core/src/app.rs",
  "dll/src/lib.rs", "dll/src/python.rs",
  "examples/hello-world.rs",
  "api.json",
]
