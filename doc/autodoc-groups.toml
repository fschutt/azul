# azul-doc autodoc — group manifest (schema v3)
#
# Locks down the 3-tree shape of the azul book so that ~13 subagents can
# each produce a coherent batch of guide pages in parallel.
#
#   Tree 1 "getting-started" — core GUI, linear teaching order
#   Tree 2 "advanced"        — non-core systems, ramps to web deployment
#   Tree 3 "contributor"     — code architecture and per-system internals
#
# Schema (per-group):
#   id, tree, audience[], agent_strategy, tracked_files[], tracked_globs[]
#
# Schema (per-output, inside group.outputs):
#   slug, path, title, audience (when group is dual),
#   maturity        ∈ {mature, wip, stub, draft}     default mature
#   guide_order     int — position in the linear external guide
#   topic_only      bool — routes to /guide/topics/<slug>
#   prerequisites   [slug] — earlier slugs the reader is assumed to know
#
# guide_order is sparse so insertions are cheap. Sub-pages of a topic share
# the parent's tens digit (e.g. layout=50, layout/flex=51, layout/grid=52).

[meta]
generated_from = "doc/guide/en/reference.md"
schema_version = 3
existing_guides = ["architecture", "reference"]

# Files every agent must read before starting, to anchor on the project's
# big picture and writing conventions.
shared_context_files = [
  "doc/AUTODOC.md",                  # operational pipeline reference
  "doc/autodoc-plan.md",             # design rationale
  "doc/guide/en/SUMMARY.md",         # current tree of pages
  "doc/guide/en/reference.md",       # 173-section system catalog
  "doc/guide/en/architecture.md",    # canonical architecture doc
  "scripts/ARCHITECTURE.md",         # contributor-side code map
  "api.json",                        # FFI surface (read for type names)
]

# ──────────────────────────────────────────────────────────────────────
# Tree definitions (top-level book sections)
# ──────────────────────────────────────────────────────────────────────

[[meta.trees]]
id = "getting-started"
title = "Getting Started"
audience = "external"
description = """
Linear teaching path for app authors. Each page may only use concepts \
introduced in earlier pages. Covers core GUI authoring only — DOM, \
styling, layout, text, images, widgets, events, timers, animations, \
scrolling, windowing.
"""

[[meta.trees]]
id = "advanced"
title = "Advanced"
audience = "external"
description = """
Topics beyond the core GUI loop: developer tooling (debugging, profiling, \
e2e testing), I/O (clipboard, file dialogs), systems (XML, networking, \
accessibility), packaging (bindings, codegen, web deployment), and \
finally the security model. Pages are mostly standalone; a reader can \
jump to any topic after finishing Tree 1.
"""

[[meta.trees]]
id = "contributor"
title = "Contributors"
audience = "contributor"
description = """
For people hacking on azul itself. Starts with the overall code map and \
build pipeline, then per-system internals (DOM, CSS, layout, text, \
images, events, rendering, shell2 backends, menus, a11y, async, web). \
Pages cite source paths with line numbers and assume Rust + systems-\
programming background. No teaching order — read on demand.
"""

# ──────────────────────────────────────────────────────────────────────
# Writing style — applied to every page
# ──────────────────────────────────────────────────────────────────────

[meta.writing_style]
reference = "https://book.servo.org/contributing/guides/index.html — match this style. Dense, structural, zero throat-clearing. Headings carry the table of contents; prose only fills in what a heading + signature don't already say."
reader_model = "Senior engineer skimming for the answer. They have read the architecture page. They know Rust. They will Ctrl-F your headings — every H2 must be a thing they'd search for."
voice = "Declarative, second-person where unavoidable, otherwise impersonal. State facts. Don't narrate."
length_target = "Aim for the *shortest page that fully covers the topic*. Hard cap 2000 words; most pages 600–1200. If you exceed 2000, split into sub-pages instead of trimming."
opening_pattern = "First sentence states a fact about the subject — never 'In this guide…' or 'This page covers…'. First code or signature within 15 lines."
code_examples = "Complete and copy-pasteable. No `…` placeholders. External pages: ```rust. Stub pages: ```rust,ignore. Hidden setup via leading `#` lines."
visuals = "Use `azul-render` fences for screenshots / slideshows. `subtitle=` for captions. `slideshow=ID` to group frames."
cross_links = "Inline links, not bibliography sections. Cite source as `core/src/foo.rs:LINE` on contributor pages."
avoid = [
  "Throat-clearing: 'In this guide…', 'Let's start by…', 'First, we will…', 'It is important to note…', 'As mentioned earlier…'",
  "Recap paragraphs at section ends ('To summarize…', 'In short…')",
  "Restating the H2 as the first sentence",
  "Marketing words: blazing-fast, powerful, robust, seamless, cutting-edge, elegant",
  "Filler adverbs: simply, just, obviously, easily, basically, essentially, actually",
  "Hedging: 'tends to', 'often', 'in most cases' — be specific or omit",
  "Long prose runs without code, signatures, tables, or lists",
  "Forward references on external pages — never use a concept before its prerequisite page introduces it",
  "Multi-paragraph docstring inside code blocks",
  "Emojis",
]
prefer = [
  "Functional H2 headings the reader will Ctrl-F for: 'Adding a callback', 'Hit-test order', 'When the layout is invalidated' — not 'Overview' or 'Introduction'",
  "Two- to three-sentence paragraphs. Break with a code block, table, or list before a 4th sentence.",
  "Bullets for alternatives, options, and enumerations. Tables for cross-products (property × variant, OS × backend).",
  "Type signatures and function signatures inline before the explanation",
  "Numbered steps for ordered procedures only — not for explanations",
  "One concept per H2. If you find yourself writing 'There are two kinds of X', that's two H2s.",
  "End each H2 at the last fact. No closing paragraph.",
]

# ──────────────────────────────────────────────────────────────────────
# Agent thinking — max effort
# ──────────────────────────────────────────────────────────────────────

[meta.agent_thinking]
mode = "max-effort"
instructions = [
  "Before writing, READ all `shared_context_files` plus the group's `tracked_files`. Do not skim — actually load the relevant sections.",
  "For each output, READ the matching `## ` sections in `doc/guide/en/reference.md` (find by source-file path).",
  "Think extended: outline each page's section structure before writing. Cross-check the outline against `prerequisites` — every concept used must already be introduced.",
  "When citing internals, include `path/to/file.rs:LINE` so contributors can navigate. Verify the line number by re-reading the file.",
  "When introducing a type, link to or quote its definition. Don't paraphrase the type.",
  "After writing, RE-READ the page and check: (a) every code sample compiles in concept, (b) every cross-link target exists in the manifest, (c) frontmatter is complete and valid.",
  "If a `tracked_file` doesn't exist, note it in the page as 'planned but not yet implemented' and tag the page `maturity = stub`.",
]

