# azul-doc autodoc — group manifest
#
# Hand-curated grouping of the 173 entries in doc/guide/reference.md into
# system-level documentation tasks. Consumed by `azul-doc autoreview autodoc`
# to dispatch one agent per group.
#
# Schema (per-group):
#   id, audience[], agent_strategy, tracked_files[], tracked_globs[]
#
# Schema (per-output, inside group.outputs):
#   slug, path, title, audience (when group is dual),
#   maturity        ∈ {mature, wip, stub, draft}     default mature
#   guide_order     int — position in the linear external guide
#   topic_only      bool — routes to /guide/topics/<slug>
#   prerequisites   [slug] — earlier slugs the reader is assumed to know
#
# guide_order is sparse (10, 20, 30, ...) so insertions are cheap.
# Only external + non-topic + non-stub pages need a guide_order.

[meta]
generated_from = "doc/guide/reference.md"
total_groups = 24
total_outputs = 35
existing_guides = ["architecture"]
schema_version = 2

