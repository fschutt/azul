# dependency-justifications.toml — supply-chain governance manifest for azul.
#
# Every crate in azul's dependency tree (union of Linux + macOS + Windows) must
# carry a one-line, human-written justification: "why does azul need this crate?"
# The CI gate `scripts/check_dep_justifications.py` FAILS the build for any crate
# present in the tree but missing here. Adding a dependency — direct OR transitive
# — therefore requires a deliberate, reviewable justification.
#
# Format (parsed by a tolerant regex, NOT a TOML library):
#   crate-name = "justification text"
# `#` comments and `[section]` headers are ignored; used purely to organize.
# An empty "" does NOT count as justified.
#
# For transitive crates the justification names the cluster/parent that pulls it.

# === Core: azul's own workspace crates ===
azul-dll = "azul's own crate: the C-ABI DLL / superset build that links every subsystem (workspace member)."
azul-core = "azul's own crate: core DOM/layout/window/callback types (workspace member)."
azul-css = "azul's own crate: CSS property types and parser (workspace member)."
azul-layout = "azul's own crate: layout solver + text/font/image integration (workspace member)."
azul-simplecss = "azul's own crate: minimal CSS selector parser used by the cascade (workspace member)."

