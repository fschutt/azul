[package]
edition = "2021"
name = "rust-fontconfig"
version = "4.4.4"
authors = ["Felix Schütt <felix.schuett@maps4print.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Pure-Rust alternative to font-loader and fontconfig w. minimal dependencies"
readme = "README.md"
keywords = [
    "fontconfig",
    "font-loader",
    "font",
    "system-fonts",
]
categories = ["gui"]
license = "MIT"
repository = "https://github.com/fschutt/rust-fontconfig"

[features]
async-registry = [
    "std",
    "parsing",
]
cache = [
    "serde",
    "bincode",
    "std",
    "dirs",
]
default = ["std"]
ffi = [
    "parsing",
    "std",
    "async-registry",
]
multithreading = ["rayon"]
parsing = [
    "allsorts",
    "std",
]
single-thread-unsafe-locks = []
std = ["mmapio"]

[lib]
name = "rust_fontconfig"
crate-type = [
    "rlib",
    "staticlib",
    "cdylib",
]
path = "src/lib.rs"

[[example]]
name = "character_resolution"
path = "examples/character_resolution.rs"
required-features = ["parsing"]

[[example]]
name = "debug_azul_fonts"
path = "examples/debug_azul_fonts.rs"
required-features = ["parsing"]

[[example]]
name = "getfont"
path = "examples/getfont.rs"
required-features = ["parsing"]

[[example]]
name = "integration_api"
path = "examples/integration_api.rs"
required-features = ["parsing"]

[[example]]
name = "query"
path = "examples/query.rs"
required-features = ["parsing"]

[[example]]
name = "registry"
path = "examples/registry.rs"
required-features = ["async-registry"]

[[example]]
name = "unicode_aware_fonts"
path = "examples/unicode_aware_fonts.rs"
required-features = ["parsing"]

[[test]]
name = "tests"
path = "tests/tests.rs"

[dependencies.allsorts]
version = "0.16.4"
features = ["flate2_rust"]
optional = true
default-features = false
package = "allsorts-azul"

[dependencies.bincode]
version = "1"
optional = true

[dependencies.dirs]
version = "6"
optional = true

[dependencies.serde]
version = "1"
features = ["derive"]
optional = true

[target.'cfg(not(target_family="wasm"))'.dependencies.mmapio]
version = "0.9.1"
optional = true
default-features = false

[target.'cfg(not(target_family="wasm"))'.dependencies.rayon]
version = "1.11.0"
optional = true
default-features = false

[target.'cfg(target_os="linux")'.dependencies.xmlparser]
version = "0.13.6"
default-features = false
