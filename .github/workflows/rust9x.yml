# Builds the rust9x compiler (stage1) and publishes it as an asset on the
# permanent `rust9x-toolchain` GitHub Release.
#
# rust9x (https://github.com/rust9x/rust) is a Rust fork that targets legacy
# Windows (95/98/ME/NT/2000/XP/Vista) via i586/i686-rust9x-windows-msvc. There
# is NO prebuilt toolchain — it must be built from source (~90 min). Building
# it on every CI run is wasteful, so this workflow builds it ONCE and uploads it
# to a release. The main `rust.yml` `build_rust9x` job downloads that asset and
# builds azul against it in minutes (and, if the asset is missing, builds and
# publishes it itself — it never skips).
#
# The Actions cache is deliberately NOT used here: it expires after 7 unused
# days and is LRU-evicted at the 10 GB repo cap, which made the consumer job
# skip forever. A release asset is permanent.
#
# Run this manually (Actions → "rust9x compiler (toolchain release)" → Run
# workflow) whenever rust9x updates. It also rebuilds yearly to pick up drift.
name: rust9x compiler (toolchain release)

on:
  workflow_dispatch:
  schedule:
    # Yearly (Jan 1, 04:00 UTC) — only to pick up rust9x compiler updates; the
    # release asset itself never expires.
    - cron: "0 4 1 1 *"

permissions:
  contents: write # required to create the release + upload the toolchain asset

env:
  RUST9X_TAG: rust9x-toolchain
  RUST9X_ASSET: rust9x-stage1-x86_64-pc-windows-msvc.tar.gz
  GH_TOKEN: ${{ github.token }}

jobs:
  build-rust9x-compiler:
    name: Build + publish rust9x compiler (stage1)
    runs-on: windows-2022
    # LLVM is built from source (see download-ci-llvm below), so this is a long
    # one-time/yearly build.
    timeout-minutes: 350
    steps:
      - name: Install bootstrap Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Install Python (for x.py)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ninja (for the LLVM source build)
        run: choco install ninja -y

      - name: Clone rust9x compiler source
        shell: bash
        run: |
          # FULL clone (no --depth): rust's bootstrap (x.py) reads git history
          # (HEAD^1, merge-base) while computing config — a shallow clone makes
          # it panic with "fatal: ambiguous argument 'HEAD^1'".
          # GIT_TERMINAL_PROMPT=0 makes a bad URL fail fast rather than hang on
          # a credential prompt.
          GIT_TERMINAL_PROMPT=0 git clone --branch rust9x \
            https://github.com/rust9x/rust.git rust9x

      - name: Build rust9x stage1
        shell: bash
        working-directory: rust9x
        run: |
          cp bootstrap.rust9x.toml bootstrap.toml 2>/dev/null || true
          # download-ci-llvm=false: rust9x is a fork, so the prebuilt CI LLVM
          # artifacts for its commit 404 (rust-dev-beta-… not found) and
          # bootstrap panics. Build LLVM from source instead (slow, hence the
          # long timeout; only the resulting stage1 is cached for the consumer).
          python x.py build --stage 1 --set llvm.download-ci-llvm=false
        timeout-minutes: 330

      # Same tag + asset name the consumer (rust.yml build_rust9x) downloads.
      - name: Publish rust9x stage1 to Releases
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f rust9x/build/x86_64-pc-windows-msvc/stage1/bin/rustc.exe ]; then
            echo "::error::rust9x stage1 build produced no rustc.exe"
            exit 1
          fi
          tar -czf "$RUST9X_ASSET" -C rust9x/build/x86_64-pc-windows-msvc stage1
          gh release view "$RUST9X_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$RUST9X_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "rust9x toolchain (stage1)" \
              --notes "Prebuilt rust9x stage1 compiler (x86_64-pc-windows-msvc host, i686/i586-rust9x-windows-msvc targets), consumed by the build_rust9x CI job. Stored here rather than in the Actions cache, which expires and is LRU-evicted." \
              --latest=false
          gh release upload "$RUST9X_TAG" "$RUST9X_ASSET" \
            --repo "$GITHUB_REPOSITORY" --clobber
          echo "published $RUST9X_ASSET to release $RUST9X_TAG"
