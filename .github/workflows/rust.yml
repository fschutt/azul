# .github/workflows/rust.yml
#
# Two modes:
# 
# - ci: Runs on push/PR, builds everything, runs tests, creates artifacts
# - deploy: Manual trigger, downloads CI artifacts, deploys to GitHub Pages

name: build

on:
  # Run the full pipeline on every pushed commit (any branch) — we only push
  # debugged candidates, so each push is worth a full CI run. Tags still match
  # for release builds; PRs and the manual deploy trigger are unchanged.
  push:
    branches:
      - '**'
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'
  pull_request:

  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Select the workflow to run'
        type: choice
        options:
          - ci
          # website: build everything + deploy GitHub Pages, but do NOT run any
          # registry-publish job (crates.io / PyPI / npm / RubyGems / NuGet /
          # Maven / AUR / LuaRocks). Use this for a site-only release.
          - website
          # deploy: website + ALL registry publishes (token-gated).
          - deploy
        required: true
        default: 'ci'
      cache_bust:
        description: 'Force-clear all caches (full rebuild from scratch)'
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

# Per-ref concurrency: a new push to the SAME branch/PR cancels its own
# in-progress run (re-run on the latest commit), but different branches run
# independently — so pushing branch A doesn't cancel branch B's pipeline.
# (The Pages deploy is serialized by the github-pages environment regardless.)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Force ANSI color OFF for every step. Tool output is captured into the run
# Summary ($GITHUB_STEP_SUMMARY, which is markdown) where color escape codes
# render as literal garbage (e.g. `␛[0m`), and into the raw logs. CARGO_TERM_COLOR
# covers cargo/clippy/tree; NO_COLOR (the no-color.org standard) covers
# cargo-deny, cargo-geiger and other termcolor/anstream/colored-based CLIs that
# would otherwise force color on under CI.
env:
  CARGO_TERM_COLOR: never
  NO_COLOR: "1"
  # Run JS actions still bundling Node 20 (checkout@v4, upload/download-artifact@v4,
  # cache@v4, setup-chrome@v1, …) on Node 24 now — silences the Node-20 deprecation
  # warnings ahead of GitHub forcing the switch (2026-06-02), without bumping ~60
  # action pins. Drop once all actions ship Node-24 majors.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Release version consumed by the inlined multi-registry publish jobs (below).
  # Bump in lockstep with the workspace crates + api.json.
  AZUL_VERSION: "0.2.0"
  # When cache_bust is checked in a manual dispatch, the unique run ID is spliced
  # into every cache key so nothing matches and everything rebuilds from scratch.
  # On push/PR (no inputs) or when unchecked this resolves to the empty string.
  #
  # It MUST stay at the FRONT of every key (`<name>-${{ env.CACHE_BUST }}-…`) and
  # appear in every restore-keys entry: restore-keys are PREFIX matches, so a bust
  # value parked at the END of the key would be invisible to the fallback prefixes
  # and a "bust" run would happily restore the very caches it is trying to discard.
  CACHE_BUST: ${{ github.event.inputs.cache_bust == 'true' && github.run_id || '' }}

jobs:
  # =============================================================================
  # CI Jobs - Run on push, PR, or manual 'ci' mode
  # =============================================================================

  lint_and_check:
    name: Lint & Static Checks
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Install dependencies (Ubuntu)
        run: sudo apt-get update && sudo apt-get install -y libv4l-dev

      - name: Run autofix and normalize
        run: |
          cargo run -r -p azul-doc autofix
          cargo run -r -p azul-doc autofix explain
          cargo run -r -p azul-doc patch safe target/autofix/patches
          cargo run -r -p azul-doc patch target/autofix/patches
          cargo run -r -p azul-doc normalize

      - name: Check for uncommitted changes after autofix
        run: |
          if ! git diff --quiet; then
            echo "There are uncommitted content changes after running autofix:"
            git diff --stat
            git diff
            exit 1
          elif [[ -n $(git status --porcelain) ]]; then
            echo "Files touched but no content changes - resetting:"
            git checkout -- .
            echo "Reset complete, continuing..."
          else
            echo "No uncommitted changes after autofix."
          fi

      - name: Cache codegen output
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate DLL API bindings
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all

      - name: Run DLL tests
        run: cd dll && cargo test

      # Double-drop invariant (compile-free static check over api.json + the
      # generated mirror): the codegen must emit `impl Drop` on a mirror ONLY for
      # TRUE LEAVES (custom Drop or an owned raw pointer); plain aggregates get no
      # mirror Drop and free each field once via field-glue. A raw-heap-owning
      # type reachable by-value must stay idempotent. See doc/src/main.rs Lint 2.
      - name: Double-drop invariant check (azul-doc)
        run: cargo run -r -p azul-doc check

      # Double-drop RUNTIME regression gate. Exercises the real FFI drop path
      # (AppConfig by-value: SystemStyle, IconProviderHandle, Vecs, …). Aborts on
      # any double free; must print OK and exit 0. This is the hard guard that the
      # field-glue-delegation fix (mirror Drop only for leaves) stays correct.
      - name: Double-drop runtime gate (appconfig_double_drop)
        run: cargo run -r -p azul-dll --example appconfig_double_drop --features link-static

      - name: Check crates
        run: |
          cargo check -p azul-css
          cargo check -p azul-core
          cargo check -p azul-layout
          cargo check -p azul-dll --no-default-features --features "link-static,logging,ico,tga,hdr,webp,pnm,gif,png,tiff,bmp,a11y"

      - name: Check no std::time::Instant::now() in WASM-compatible crates
        run: |
          # azul-css, azul-core, and azul-layout must not call std::time::Instant::now()
          # because it panics on WASM targets. Uses in comments and #[cfg(feature = "std")]
          # blocks are allowed, but direct calls in non-gated code are forbidden.
          #
          # This is a simple grep-based check. It looks for Instant::now() in actual code
          # (not comments) and verifies a #[cfg] gate exists within 10 lines above.
          FOUND=0
          for dir in css/src core/src layout/src; do
            # Find Instant::now() calls, skip lines that are doc-comments or line-comments
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              FILE=$(echo "$line" | cut -d: -f1)
              LNO=$(echo "$line" | cut -d: -f2)
              CODE=$(echo "$line" | cut -d: -f3-)
              # Skip if the code portion is a comment (starts with // or /// or *)
              TRIMMED=$(echo "$CODE" | sed 's/^[[:space:]]*//')
              case "$TRIMMED" in
                //*) continue ;;
                \**) continue ;;
              esac
              # Check 30 lines above for a cfg gate (covers impl blocks)
              START=$((LNO > 30 ? LNO - 30 : 1))
              CONTEXT=$(sed -n "${START},${LNO}p" "$FILE")
              if ! echo "$CONTEXT" | grep -q '#\[cfg'; then
                echo "ERROR: Ungated std::time::Instant::now() at ${FILE}:${LNO}"
                echo "  $CODE"
                FOUND=1
              fi
            done < <(grep -rn 'std::time::Instant::now()' "$dir" --include='*.rs' || true)
          done
          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "std::time::Instant::now() panics on WASM. Use #[cfg(feature = \"std\")] gate"
            echo "or remove the call entirely."
            exit 1
          fi
          echo "OK: No ungated std::time::Instant::now() found in WASM-compatible crates."

  # Check that the crate compiles with various feature combinations
  # This catches issues like missing Copy/Clone derives on stub types
  feature_matrix_check:
    name: Feature Matrix Check
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Cache codegen output
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate DLL API bindings
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all

      - name: Check azul-dll with a11y enabled (default)
        run: cargo check -p azul-dll --no-default-features --features "link-static,logging,a11y"

      - name: Check azul-dll WITHOUT a11y (stub implementations)
        run: cargo check -p azul-dll --no-default-features --features "link-static,logging"

      - name: Check azul-dll with minimal features
        run: cargo check -p azul-dll --no-default-features --features "link-static"

      - name: Check azul-dll with all image formats
        run: cargo check -p azul-dll --no-default-features --features "link-static,all_img_formats"

      - name: Check azul-dll with svg and xml
        run: cargo check -p azul-dll --no-default-features --features "link-static,svg,xml"

      - name: Check azul-dll with link-dynamic (no internal crates)
        run: cargo check -p azul-dll --no-default-features --features "link-dynamic"

      - name: Check azul-layout with various features
        run: |
          cargo check -p azul-layout --no-default-features
          cargo check -p azul-layout --no-default-features --features "text_layout"
          cargo check -p azul-layout --no-default-features --features "font_loading"
          cargo check -p azul-layout --no-default-features --features "svg"
          cargo check -p azul-layout --no-default-features --features "xml"
          cargo check -p azul-layout --no-default-features --features "text_layout,font_loading,svg,xml"

  # Cross-compile cargo check for 32-bit and exotic targets
  # Uses cargo check (no linker needed), so only the Rust std-lib for
  # each target is required.  build-dll is tested on same-OS cross-arch
  # targets (platform windowing code compiles via cfg gates); cross-OS
  # targets check the sub-crates and link-static only.
  cross_compile_check:
    name: Cross-Compile Check (${{ matrix.target }})
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- 32-bit Linux (same-OS, can check build-dll) ----
          - target: i686-unknown-linux-gnu
            runner: ubuntu-22.04
            check_build_dll: true
          # ---- ARM64 Linux (same-OS cross-arch) ----
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            check_build_dll: true
          # ---- ARMv7 Linux (32-bit ARM, e.g. Raspberry Pi) ----
          - target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-22.04
            check_build_dll: true
          # ---- RISC-V 64 Linux ----
          - target: riscv64gc-unknown-linux-gnu
            runner: ubuntu-22.04
            check_build_dll: true
          # ---- PowerPC 64 Linux (big-endian) ----
          - target: powerpc64-unknown-linux-gnu
            runner: ubuntu-22.04
            check_build_dll: true
          # ---- s390x Linux (IBM Z, big-endian) ----
          - target: s390x-unknown-linux-gnu
            runner: ubuntu-22.04
            check_build_dll: true
          # ---- 32-bit Windows (Win7+, tests old Windows compat) ----
          - target: i686-pc-windows-msvc
            runner: windows-2022
            check_build_dll: true
          # ---- macOS x86_64, deployment target 10.13 High Sierra ----
          - target: x86_64-apple-darwin
            runner: macos-14
            check_build_dll: true
            macos_deployment_target: "10.13"
          # ---- macOS x86_64, deployment target 10.15 Catalina ----
          - target: x86_64-apple-darwin
            runner: macos-14
            check_build_dll: true
            macos_deployment_target: "10.15"
          # ---- macOS ARM64, deployment target 11.0 Big Sur ----
          - target: aarch64-apple-darwin
            runner: macos-14
            check_build_dll: true
            macos_deployment_target: "11.0"
          # ---- WASM (no windowing, sub-crates only) ----
          - target: wasm32-unknown-unknown
            runner: ubuntu-22.04
            check_build_dll: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}

      - name: Cache codegen output
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate DLL API bindings
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all

      - name: Check sub-crates (azul-css, azul-core, azul-layout)
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target || '' }}
        run: |
          cargo check --target ${{ matrix.target }} -p azul-css
          cargo check --target ${{ matrix.target }} -p azul-core
          cargo check --target ${{ matrix.target }} -p azul-layout --no-default-features --features "text_layout,svg,xml"

      - name: Check azul-dll link-static
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target || '' }}
        run: cargo check --target ${{ matrix.target }} -p azul-dll --no-default-features --features "link-static,logging"

      - name: Check azul-dll build-dll
        if: matrix.check_build_dll
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target || '' }}
        run: cargo check --target ${{ matrix.target }} -p azul-dll --features "build-dll"

  # Cross-compile actual binaries for additional architectures.
  # Uses cross (https://github.com/cross-rs/cross) for Linux cross-compilation
  # and native runners for Windows/macOS cross-arch.
  cross_build_binaries:
    name: Cross-Build (${{ matrix.target }})
    timeout-minutes: 90
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ${{ matrix.runner }}
    # The solid targets (i686/aarch64/armv7-linux, i686-windows, x86_64-macos)
    # stay BLOCKING. The exotic Linux arches below carry `experimental: true`
    # and are non-blocking: if cross can't build them they just don't ship,
    # the required pipeline stays green. (fail-fast: false already isolates
    # each matrix leg, so a failing experimental leg can't cancel the others.)
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- 32-bit Linux x86 ----
          - target: i686-unknown-linux-gnu
            runner: ubuntu-22.04
            artifact_name: azul-linux-i686
            use_cross: true
            artifact_ext: so
          # ---- Linux ARM64 (aarch64) ----
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            artifact_name: azul-linux-aarch64
            use_cross: true
            artifact_ext: so
          # ---- Linux ARMv7 (Raspberry Pi) ----
          - target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-22.04
            artifact_name: azul-linux-armv7
            use_cross: true
            artifact_ext: so
          # ---- 32-bit Windows (native runner) ----
          - target: i686-pc-windows-msvc
            runner: windows-2022
            artifact_name: azul-windows-i686
            use_cross: false
            artifact_ext: dll
          # ---- macOS x86_64 (Intel, from ARM64 runner) ----
          - target: x86_64-apple-darwin
            runner: macos-14
            artifact_name: azul-macos-x86_64
            use_cross: false
            artifact_ext: dylib
          # -----------------------------------------------------------------
          # Exotic Linux arches — EXPERIMENTAL / non-blocking. cross ships
          # prebuilt Docker images for each; we try to build a real .so and
          # ship it if it succeeds, but a failure here must NOT fail the run.
          # nfpm_arch is the Go-nomenclature (GOARCH) value handed to nfpm in
          # build_linux_packages so it can emit a correctly-tagged .deb/.rpm.
          # -----------------------------------------------------------------
          # ---- Linux PowerPC64 (big-endian) ----
          - target: powerpc64-unknown-linux-gnu
            runner: ubuntu-22.04
            artifact_name: azul-linux-ppc64
            use_cross: true
            artifact_ext: so
            experimental: true
            nfpm_arch: ppc64
          # ---- Linux s390x (IBM Z, big-endian) ----
          - target: s390x-unknown-linux-gnu
            runner: ubuntu-22.04
            artifact_name: azul-linux-s390x
            use_cross: true
            artifact_ext: so
            experimental: true
            nfpm_arch: s390x
          # ---- Linux RISC-V 64 ----
          - target: riscv64gc-unknown-linux-gnu
            runner: ubuntu-22.04
            artifact_name: azul-linux-riscv64
            use_cross: true
            artifact_ext: so
            experimental: true
            nfpm_arch: riscv64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Early artifact cache: skip the entire cross-build if source hasn't changed.
      # An EXACT key hit => "Validate build cache" sets skip=true and the build is
      # skipped outright. A restore-keys (prefix) hit leaves cache-hit=false, so the
      # build still runs — but against a WARM target/ from the last green build of
      # this target, so cargo rebuilds incrementally instead of from zero.
      - name: Check cross-build artifact cache
        id: build-cache
        uses: actions/cache@v5
        with:
          path: |
            target/${{ matrix.target }}/prod-release
            target/codegen
          key: cross-build-${{ env.CACHE_BUST }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('css/src/**/*.rs', 'core/src/**/*.rs', 'layout/src/**/*.rs', 'dll/src/**/*.rs', 'dll/build.rs') }}
          restore-keys: |
            cross-build-${{ env.CACHE_BUST }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}-
            cross-build-${{ env.CACHE_BUST }}-${{ matrix.target }}-

      - name: Validate build cache
        id: cache-valid
        shell: bash
        run: |
          if [ "${{ steps.build-cache.outputs.cache-hit }}" != "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          DIR="target/${{ matrix.target }}/prod-release"
          if compgen -G "$DIR/*azul*" > /dev/null 2>&1; then
            echo "Cache valid — output artifacts present in $DIR"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Cache restored $DIR but no *azul* output found — rebuilding"
            rm -rf "$DIR"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust
        if: steps.cache-valid.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}
      - name: Install cross (Linux)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache codegen output
        if: steps.cache-valid.outputs.skip != 'true'
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate DLL API bindings
        if: steps.cache-valid.outputs.skip != 'true' && steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all

      - name: Build with cross (Linux cross-arch)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.use_cross
        run: cross build --profile prod-release --target ${{ matrix.target }} -p azul-dll --features="build-dll"

      - name: Build natively (Windows/macOS cross-arch)
        if: steps.cache-valid.outputs.skip != 'true' && !matrix.use_cross
        run: cargo build --profile prod-release --target ${{ matrix.target }} -p azul-dll --features="build-dll"

      # Remove embedded ThinLTO bitcode + debug info from the staticlib before
      # upload (56-89% of every shipped archive, audit §2.4). llvm-objcopy
      # handles every cross arch — host binutils strip can't (it silently
      # skipped the cross-ELF archives in past releases). Asserts no .llvmbc
      # survives; machine code is untouched.
      - name: Strip static lib (bitcode + debug)
        if: steps.cache-valid.outputs.skip != 'true' && (success() || matrix.experimental)
        shell: bash
        run: |
          shopt -s nullglob
          set -- target/${{ matrix.target }}/prod-release/*azul*.a \
                 target/${{ matrix.target }}/prod-release/azul.lib
          bash scripts/strip_staticlib.sh "$@"

      # Run even when an experimental build failed (success() || matrix.experimental)
      # so a partial build that produced a binary still ships; for experimental
      # targets a missing binary is a clean skip (if-no-files-found: ignore),
      # while the solid targets keep the louder `warn`.
      - name: Upload Artifacts
        if: ${{ success() || matrix.experimental }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            target/${{ matrix.target }}/prod-release/*azul*.${{ matrix.artifact_ext }}
            target/${{ matrix.target }}/prod-release/*azul*.a
            target/${{ matrix.target }}/prod-release/*azul*.lib
          retention-days: 30
          if-no-files-found: ${{ matrix.experimental && 'ignore' || 'warn' }}

  # rust9x: Build azul for Windows 98/XP using the rust9x fork (i686).
  #
  # The rust9x COMPILER (stage1, ~90 min to build) is stored as an asset on the
  # permanent `rust9x-toolchain` GitHub *Release* — NOT in the Actions cache.
  # The cache was ephemeral (7-day unused expiry + LRU eviction at the 10 GB
  # repo cap), so the restore-only lookup always missed and this job skipped its
  # build forever. A release asset never expires.
  #
  # Flow: download the toolchain asset → if it is missing, BUILD it inline and
  # upload it to the release (so the next run is fast) → link it → build azul.
  # The job never silently skips.
  build_rust9x:
    name: Build rust9x (Win98/XP experimental)
    # Long enough to absorb a cold inline compiler build (LLVM from source).
    # Warm runs (asset present) finish in minutes.
    timeout-minutes: 360
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: windows-2022
    # BLOCKING: the Win98/XP build must succeed.
    continue-on-error: false
    permissions:
      # Needed to create/update the `rust9x-toolchain` release and upload the
      # toolchain asset when it is missing.
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RUST9X_TAG: rust9x-toolchain
      RUST9X_ASSET: rust9x-stage1-x86_64-pc-windows-msvc.tar.gz
    steps:
      - name: Checkout azul
        uses: actions/checkout@v5
        with:
          path: azul

      - name: Install Rust (for bootstrap + rustup)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Clone rust9x source (for std + toolchain link)
        shell: bash
        run: |
          # FULL clone (no --depth): if the toolchain asset is missing we build
          # the compiler here, and rust's bootstrap (x.py) reads git history
          # (HEAD^1, merge-base) — a shallow clone makes it panic.
          # GIT_TERMINAL_PROMPT=0 fails fast on a bad URL instead of hanging.
          GIT_TERMINAL_PROMPT=0 git clone --branch rust9x https://github.com/rust9x/rust.git rust9x

      - name: Download rust9x toolchain from Releases
        id: rust9x_asset
        shell: bash
        run: |
          # Permanent store: an asset on the `rust9x-toolchain` release. Absent
          # => build it below. `|| true` so a missing tag/asset is not fatal.
          mkdir -p dist
          if gh release download "$RUST9X_TAG" \
               --repo "$GITHUB_REPOSITORY" \
               --pattern "$RUST9X_ASSET" \
               --dir dist 2>/dev/null && [ -f "dist/$RUST9X_ASSET" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "rust9x toolchain asset downloaded from release $RUST9X_TAG"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::rust9x toolchain asset not found on release '$RUST9X_TAG' — building it inline (~90 min) and publishing it."
          fi

      - name: Install Python (for x.py)
        if: steps.rust9x_asset.outputs.found != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ninja (for the LLVM source build)
        if: steps.rust9x_asset.outputs.found != 'true'
        run: choco install ninja -y

      - name: Build rust9x stage1 (asset missing)
        if: steps.rust9x_asset.outputs.found != 'true'
        shell: bash
        working-directory: rust9x
        timeout-minutes: 330
        run: |
          cp bootstrap.rust9x.toml bootstrap.toml 2>/dev/null || true
          # download-ci-llvm=false: rust9x is a fork, so the prebuilt CI LLVM
          # artifacts for its commit 404 and bootstrap panics. Build LLVM from
          # source instead (slow — hence the long timeout).
          python x.py build --stage 1 --set llvm.download-ci-llvm=false
          test -f build/x86_64-pc-windows-msvc/stage1/bin/rustc.exe

      - name: Publish rust9x toolchain to Releases
        if: steps.rust9x_asset.outputs.found != 'true'
        shell: bash
        run: |
          set -euo pipefail
          tar -czf "$RUST9X_ASSET" -C rust9x/build/x86_64-pc-windows-msvc stage1
          # Create the release once; thereafter just clobber the asset.
          gh release view "$RUST9X_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$RUST9X_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "rust9x toolchain (stage1)" \
              --notes "Prebuilt rust9x stage1 compiler (x86_64-pc-windows-msvc host, i686/i586-rust9x-windows-msvc targets), consumed by the build_rust9x CI job. Stored here rather than in the Actions cache, which expires and is LRU-evicted." \
              --latest=false
          gh release upload "$RUST9X_TAG" "$RUST9X_ASSET" \
            --repo "$GITHUB_REPOSITORY" --clobber

      - name: Unpack rust9x toolchain (asset present)
        if: steps.rust9x_asset.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p rust9x/build/x86_64-pc-windows-msvc
          tar -xzf "dist/$RUST9X_ASSET" -C rust9x/build/x86_64-pc-windows-msvc
          test -f rust9x/build/x86_64-pc-windows-msvc/stage1/bin/rustc.exe

      - name: Link rust9x toolchain
        shell: bash
        run: rustup toolchain link rust9x "$(pwd)/rust9x/build/x86_64-pc-windows-msvc/stage1"

      - name: Generate DLL API bindings
        working-directory: azul
        run: cargo run -r -p azul-doc codegen all

      - name: Build azul with rust9x (i686, WinXP+)
        working-directory: azul
        shell: bash
        run: |
          # The only legacy-Windows link blocker was tfd pulling the `windows`
          # 0.48 import lib (windows.0.48.5.lib); the [patch.crates-io] tfd fork
          # (v0.1.2) drops it and resolves the dialog APIs at runtime via
          # LoadLibraryW+GetProcAddress (kernel32 is the only link-time Win32
          # dep), so build the full dll. accesskit_windows uses windows 0.62
          # (raw-dylib, no import lib) and the rest is pure Rust.
          cargo +rust9x build --release \
            --target i686-rust9x-windows-msvc \
            -p azul-dll --features="build-dll"

      - name: Upload rust9x artifact
        uses: actions/upload-artifact@v7
        with:
          name: azul-windows-i686-rust9x
          path: |
            azul/target/i686-rust9x-windows-msvc/release/azul.dll
            azul/target/i686-rust9x-windows-msvc/release/azul.lib
          retention-days: 30
          if-no-files-found: ignore

  test_heavy:
    name: Run Heavy Tests (Miri + Reftests)
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Install Miri
        run: |
          rustup toolchain install nightly --component miri
          cargo +nightly miri setup

      - name: Run Miri tests
        # Miri is GATED to a curated list of modules that do pure-Rust unsafe
        # memory work (pointer/refcount/transmute) — the only thing Miri can
        # actually validate and where it earns its ~100x slowdown. Everything
        # else is safe by Rust's guarantees, and running the whole suite made a
        # single large-N logic test (diff 100k, xml 2000-deep) hang Miri for
        # hours. Excluded on purpose: transform (x86 SIMD intrinsics Miri can't
        # run), gl / callbacks (real FFI/GL). EXTEND this list (space-separated
        # test-name filters) as new unsafe modules are verified Miri-clean — a
        # random new *safe* test must never land here.
        run: |
          cargo +nightly miri test --lib -p azul-core -- refany::

      - name: Cache codegen output
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate DLL API bindings
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Cache Chrome reference images
        uses: actions/cache@v5
        with:
          path: doc/target/reftest/reftest_img/*_chrome.webp
          key: reftest-chrome-images-${{ env.CACHE_BUST }}-${{ hashFiles('doc/working/*.xhtml') }}
          restore-keys: |
            reftest-chrome-images-${{ env.CACHE_BUST }}-

      - name: Run reftests
        run: cargo run -r -p azul-doc reftest

      - name: Upload reftest results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: reftest-results
          path: |
            doc/target/reftest/index.html
            doc/target/reftest/results.json
            doc/target/reftest/reftest_img/
          retention-days: 30
          if-no-files-found: warn

  coverage:
    name: Code Coverage
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      # Cargo + target cache, same house style as every other cache in this file
      # (content-hash key + restore-keys), so there is ONE caching system.
      # scripts/coverage.sh builds with the custom `coverage` profile → the
      # instrumented artifacts land in target/coverage. `~/.cargo/bin/grcov` + the
      # two cargo-install manifests are cached so `cargo install grcov` below sees
      # it as already-installed instead of recompiling grcov on every run.
      - name: Rust build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/bin/grcov
            target/coverage
          key: coverage-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('css/src/**/*.rs', 'core/src/**/*.rs', 'layout/src/**/*.rs', 'dll/src/**/*.rs', 'dll/build.rs') }}
          restore-keys: |
            coverage-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            coverage-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Install coverage tools
        run: |
          rustup component add llvm-tools-preview
          cargo install grcov

      - name: Run coverage
        run: bash scripts/coverage.sh --skip-install

      - name: Run coverage analysis
        if: always()
        run: python3 scripts/analyze_coverage.py coverage.txt | tee coverage_analysis.txt

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: |
            coverage/
            coverage.txt
            coverage_analysis.txt
          retention-days: 30
          if-no-files-found: warn

  ffi_safety_tests:
    name: FFI Safety Tests (${{ matrix.os }})
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            timeout_cmd: timeout
          - os: macos-14
            timeout_cmd: gtimeout
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y clang lldb libv4l-dev

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-14'
        run: brew install coreutils

      - name: Install Miri
        run: |
          rustup toolchain install nightly --component miri
          cargo +nightly miri setup

      - name: Cache codegen output
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate DLL API bindings
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all

      - name: Build azul-dll (debug)
        run: cargo build -p azul-dll --features build-dll

      - name: Compile C hello-world with ASan
        run: |
          cp target/codegen/azul.h examples/c/
          cd examples/c
          clang -g -O0 -fsanitize=address -I. hello-world.c -L../../target/debug -lazul -o hello-world-asan

      - name: Run C hello-world with ASan
        working-directory: examples/c
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/debug
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/target/debug
          ASAN_OPTIONS: detect_leaks=0,abort_on_error=1
          AZ_EXIT_SUCCESS_AFTER_FRAME_RENDER: "1"
          AZ_BACKEND: headless
        run: ${{ matrix.timeout_cmd }} 30 ./hello-world-asan || [ $? -eq 124 ]

      - name: Run Miri on azul-dll
        # azul-dll is a shell/GUI library: its unit tests legitimately touch
        # the filesystem (config/clipboard/shell2), which Miri's default
        # isolation forbids ("`open` not available when isolation is enabled").
        # Disable isolation so the UB checks still run against real I/O paths.
        env:
          MIRIFLAGS: -Zmiri-disable-isolation
        # Scope Miri to the C-ABI + pure-logic tests — the point of this job is
        # to catch UB in the generated C-ABI transmutes (dll_api_internal). The
        # desktop::{extra,shell2,display,native_screenshot} integration tests
        # call platform FFI (dlopen via libloading, mach task_info, posix_spawn,
        # EGL/GL, …) which Miri fundamentally cannot execute ("unsupported
        # operation: can't call foreign function"); they run under regular
        # `cargo test`, not Miri.
        run: |
          cargo +nightly miri test --lib -p azul-dll -- --nocapture \
            --skip desktop::extra \
            --skip desktop::shell2 \
            --skip desktop::display \
            --skip desktop::native_screenshot

  # Cross-backend ICU parity: pin every i18n backend to the ICU4X REFERENCE
  # output (layout/tests/icu_parity.rs). The three backends are mutually-
  # exclusive features, so the SAME public-API test is run once per backend on
  # its native OS:
  #   - ubuntu  : `icu`         (ICU4X, the reference)  -> RUN  (source of truth)
  #   - macOS   : `icu_macos`   (Apple Foundation)      -> RUN  (verified parity)
  #   - windows : `icu_windows` (Win32 NLS)             -> COMPILE-ONLY
  # The 11 documented ICU4X-vs-platform divergences are pinned inside the test.
  # Windows NLS output (short-date year width, French U+00A0 grouping, list
  # comma placement) legitimately differs from the reference in ways not
  # verifiable off-Windows, so that leg only compiles the backend + test; flip
  # its `run:` to true to execute on a real Windows host once values are pinned.
  icu_parity:
    name: ICU Parity (${{ matrix.backend.feature }})
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ${{ matrix.backend.os }}
    strategy:
      fail-fast: false
      matrix:
        backend:
          - os: ubuntu-22.04
            feature: icu           # ICU4X reference backend
            run: true
          - os: macos-14
            feature: icu_macos     # Apple Foundation backend
            run: true
          - os: windows-2022
            feature: icu_windows   # Win32 NLS backend (compile-only off real Windows)
            run: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Skip entirely if layout source (incl. ICU tests) hasn't changed. Only an
      # EXACT key hit skips the run (the steps below gate on cache-hit); a
      # restore-keys hit just restores the previous sentinel, which no step reads.
      - name: Check ICU parity cache
        id: icu-cache
        uses: actions/cache@v5
        with:
          path: target/icu-parity-done-${{ matrix.backend.feature }}
          key: icu-parity-${{ env.CACHE_BUST }}-${{ matrix.backend.os }}-${{ matrix.backend.feature }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('layout/src/**/*.rs', 'layout/tests/**/*.rs', 'layout/Cargo.toml') }}
          restore-keys: |
            icu-parity-${{ env.CACHE_BUST }}-${{ matrix.backend.os }}-${{ matrix.backend.feature }}-${{ hashFiles('Cargo.lock') }}-
            icu-parity-${{ env.CACHE_BUST }}-${{ matrix.backend.os }}-${{ matrix.backend.feature }}-

      - name: Install Rust
        if: steps.icu-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Run ICU parity tests (${{ matrix.backend.feature }})
        if: steps.icu-cache.outputs.cache-hit != 'true' && matrix.backend.run
        run: cargo test -p azul-layout --test icu_parity --no-default-features --features ${{ matrix.backend.feature }}

      - name: Compile-check ICU parity test (${{ matrix.backend.feature }})
        if: steps.icu-cache.outputs.cache-hit != 'true' && !matrix.backend.run
        run: cargo test -p azul-layout --test icu_parity --no-default-features --features ${{ matrix.backend.feature }} --no-run

      - name: Mark ICU parity done
        if: steps.icu-cache.outputs.cache-hit != 'true'
        shell: bash
        run: mkdir -p target && echo "done" > target/icu-parity-done-${{ matrix.backend.feature }}

  # Cheap "does azul.h compile + link" check across every C compiler that
  # matters, WITHOUT rebuilding the DLL per compiler. The ABI rule is: a C
  # consumer must match the DLL's ABI, so we build the DLL ONCE per OS and fan
  # out the (seconds-cheap) compile step over all compilers that share that ABI:
  #   - Linux : gcc + clang  → both link the one System V .so
  #   - macOS : clang        → system compiler
  #   - Windows: cl + clang-cl → both target the one MSVC azul.dll
  # (MinGW gcc is intentionally NOT here: it uses the gnu ABI and would need a
  # separate windows-gnu DLL — add only if MinGW consumers are supported.)
  c_compile_check:
    name: C FFI Compile (${{ matrix.os }})
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: macos-14
          - os: windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Install clang (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang libv4l-dev

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache codegen output
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate DLL API bindings (azul.h)
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all

      - name: Build azul-dll (debug, build-once-per-ABI)
        run: cargo build -p azul-dll --features build-dll

      - name: Compile + link C hello-world (Linux — gcc & clang)
        if: runner.os == 'Linux'
        run: |
          cp target/codegen/azul.h examples/c/
          cd examples/c
          for cc in gcc clang; do
            echo "::group::$cc"
            "$cc" -I. hello-world.c -L../../target/debug -lazul \
              -Wl,-rpath,../../target/debug -o "hw-$cc"
            echo "::endgroup::"
          done

      - name: Compile + link C hello-world (macOS — clang)
        if: runner.os == 'macOS'
        run: |
          cp target/codegen/azul.h examples/c/
          cd examples/c
          clang -I. hello-world.c -L../../target/debug -lazul \
            -Wl,-rpath,@executable_path/../../target/debug -o hw-clang

      - name: Compile + link C hello-world (Windows — cl & clang-cl)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          copy target\codegen\azul.h examples\c\ /Y
          cd examples\c
          echo === cl ===
          cl /nologo /I . hello-world.c /Fe:hw-cl.exe /link /LIBPATH:..\..\target\debug azul.dll.lib || exit /b 1
          echo === clang-cl ===
          clang-cl /I . hello-world.c /Fe:hw-clang.exe /link /LIBPATH:..\..\target\debug azul.dll.lib || exit /b 1

  export_code_e2e:
    name: Export-Code E2E (rust/c/cpp/python)
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Install toolchains (clang/c++/python + headless GL deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libgl1-mesa-dev libx11-dev libxext-dev python3

      - name: Cache codegen output
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate DLL API bindings (azul.h / azul20.hpp)
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all

      - name: Build azul-dll (release, with debug-server)
        run: cargo build --release -p azul-dll --features build-dll,debug-server

      - name: Codegen unit tests (HTML→code, incl. mixed text+element children)
        run: cargo test -p azul-dll --test xml_to_rust_compilation --test kitchen_sink_integration --features xml

      - name: Run export-code E2E (export live page → compile 4 languages)
        run: bash tests/e2e/test_export_code.sh

      - name: Run undo/redo E2E (app-state mini-git via debug server)
        run: bash tests/e2e/undo-redo.sh

  build_binaries:
    name: Build Binaries (${{ matrix.os }})
    # Normal run ~30-55 min; a cold Windows prod-release build is the slowest.
    # Cap well above that so an intermittent build hang (seen: "Build Python
    # extension" stuck >160 min) fails the job instead of burning the 6h default.
    timeout-minutes: 120
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: azul-linux-amd64
            artifact_path: |
              target/prod-release/libazul.so
              target/prod-release/libazuldbg.so
              target/prod-release/libazul.a
              target/prod-release/azul.so
          - os: macos-14
            artifact_name: azul-macos-amd64
            artifact_path: |
              target/prod-release/libazul.dylib
              target/prod-release/libazuldbg.dylib
              target/prod-release/libazul.a
              target/prod-release/azul.so
          - os: windows-2022
            artifact_name: azul-windows-amd64
            artifact_path: |
              target/prod-release/azul.dll
              target/prod-release/azuldbg.dll
              target/prod-release/azul.lib
              target/prod-release/azul.dll.lib
              target/prod-release/azul.pyd
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Early artifact cache: if engine source + Cargo.lock haven't changed,
      # skip the entire build and just upload cached artifacts. Cache key is
      # content-based: Cargo.lock (deps) + engine source. CI-only or doc-only
      # changes do NOT invalidate this cache.
      # An EXACT key hit => "Validate build cache" sets skip=true and nothing is
      # built. A restore-keys (prefix) hit leaves cache-hit=false, so the build
      # still runs — but the restored target/ dirs are the last green build's, so
      # cargo does an INCREMENTAL rebuild instead of compiling every crate cold.
      - name: Check build artifact cache
        id: build-cache
        uses: actions/cache@v5
        with:
          path: |
            target/prod-release
            target/azuldbg/prod-release
            target/pyext/prod-release
            target/codegen
          key: build-${{ env.CACHE_BUST }}-${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('css/src/**/*.rs', 'core/src/**/*.rs', 'layout/src/**/*.rs', 'dll/src/**/*.rs', 'dll/build.rs') }}
          restore-keys: |
            build-${{ env.CACHE_BUST }}-${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}-
            build-${{ env.CACHE_BUST }}-${{ matrix.os }}-

      - name: Validate build cache
        id: cache-valid
        shell: bash
        run: |
          if [ "${{ steps.build-cache.outputs.cache-hit }}" != "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          case "${{ matrix.os }}" in
            ubuntu-22.04) F="target/prod-release/libazul.so" ;;
            macos-14)     F="target/prod-release/libazul.dylib" ;;
            windows-2022) F="target/prod-release/azul.dll" ;;
          esac
          if [ -f "$F" ]; then
            echo "Cache valid — $F exists"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Cache restored but $F missing — rebuilding"
            rm -rf target/prod-release target/azuldbg/prod-release target/pyext/prod-release
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust
        if: steps.cache-valid.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Install clang (Linux)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.os == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y clang libgl1-mesa-dev libx11-dev xvfb libv4l-dev

      - name: Install MinGW (Windows)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.os == 'windows-2022'
        shell: bash
        run: choco install mingw -y

      - name: Install coreutils (macOS)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.os == 'macos-14'
        run: brew install coreutils

      - name: Cache codegen output
        if: steps.cache-valid.outputs.skip != 'true'
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate DLL API bindings
        if: steps.cache-valid.outputs.skip != 'true' && steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all

      - name: Validate C header syntax (Linux)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.os == 'ubuntu-22.04'
        run: |
          cd target/codegen
          clang -fsyntax-only -std=c99 -x c azul.h
          echo "C header (C99) compiles successfully"

      - name: Validate C++ headers (Linux)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.os == 'ubuntu-22.04'
        run: |
          cd target/codegen
          clang++ -std=c++03 -fsyntax-only -I. azul03.hpp && echo "C++03 ✓"
          clang++ -std=c++11 -fsyntax-only -I. azul11.hpp && echo "C++11 ✓"
          clang++ -std=c++14 -fsyntax-only -I. azul14.hpp && echo "C++14 ✓"
          clang++ -std=c++17 -fsyntax-only -I. azul17.hpp && echo "C++17 ✓"
          clang++ -std=c++20 -fsyntax-only -I. azul20.hpp && echo "C++20 ✓"
          clang++ -std=c++2b -fsyntax-only -I. azul23.hpp && echo "C++23 ✓"

      - name: Compile C examples (syntax check)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.os != 'windows-2022'
        shell: bash
        run: |
          cd examples/c
          for example in *.c; do
            [ -f "$example" ] || continue
            clang -fsyntax-only -std=c99 -I../../target/codegen "$example" \
              || { echo "FAIL $example"; exit 1; }
            echo "✓ $example"
          done

      - name: Compile C++ examples (syntax check)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.os != 'windows-2022'
        shell: bash
        run: |
          for std in cpp03:c++03 cpp11:c++11 cpp14:c++14 cpp17:c++17 cpp23:c++2b; do
            dir="${std%:*}"
            flag="${std#*:}"
            if [ -d "examples/cpp/$dir" ]; then
              cd "examples/cpp/$dir"
              # cpp23 uses std::expected directly (we assume a C++23 toolchain — no
              # __cpp_lib_expected fallback). Prefer a compiler that ships <expected>
              # (g++-13/12); and don't gate the release if the runner's toolchain is too
              # old for C++23 — that's by design (newest-compiler assumption).
              cxx="clang++"; fatal=1
              if [ "$dir" = "cpp23" ]; then
                fatal=0
                for c in g++-13 g++-12 g++; do command -v "$c" >/dev/null 2>&1 && { cxx="$c"; break; }; done
              fi
              for example in *.cpp; do
                [ -f "$example" ] || continue
                if "$cxx" -fsyntax-only -std=$flag -I../../../target/codegen "$example"; then
                  echo "✓ $dir/$example ($cxx)"
                elif [ "$fatal" = "0" ]; then
                  echo "⚠ $dir/$example: $cxx -std=$flag failed — C++23 toolchain lacks <expected>; not gating release"
                else
                  echo "FAIL $dir/$example"; exit 1
                fi
              done
              cd ../../..
            fi
          done

      - name: Build DLL (for C/C++ examples)
        if: steps.cache-valid.outputs.skip != 'true'
        run: cargo build --profile prod-release -p azul-dll --features="build-dll"

      # Strip the STATICLIB, in two layers:
      #  1. scripts/strip_staticlib.sh removes the embedded ThinLTO bitcode
      #     (.llvmbc/__LLVM,__bitcode — 56-89% of every shipped archive; a
      #     prebuilt-lib consumer never runs Rust ThinLTO, so it is pure dead
      #     weight) + debug sections, and ASSERTS none survived. Machine code
      #     is untouched. Runs FIRST because Apple nm/ld can't even parse
      #     members whose embedded bitcode is newer than Xcode's LLVM
      #     ("Invalid attribute group entry"). Audit §2.4.
      #  2. host strip drops local symbols (cargo's profile `strip` only
      #     strips final linked outputs, never `.a` archives). Combined with
      #     prod-release `debug = 0` this keeps libazul.a small (was ~1 GB).
      - name: Strip static lib (.a/.lib)
        if: steps.cache-valid.outputs.skip != 'true'
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            bash scripts/strip_staticlib.sh target/prod-release/azul.lib
          else
            A="target/prod-release/libazul.a"
            [ -f "$A" ] || exit 0
            bash scripts/strip_staticlib.sh "$A"
            if [ "${{ runner.os }}" = "macOS" ]; then
              strip -S -x "$A" || true            # -S strip debug, -x strip locals
            else
              strip --strip-debug --strip-unneeded "$A" || true
            fi
            echo "after local-symbol strip: $(du -h "$A" | cut -f1)"
          fi

      # macOS code signing. Without an Apple Developer ID (paid program) we can
      # only AD-HOC sign (`-`), which does not clear the download quarantine but
      # is a precursor to notarization and avoids some "damaged" errors. When the
      # APPLE_* secrets are present we do the REAL thing: import the Developer ID
      # cert, hardened-runtime codesign, notarize, and staple. Users without a
      # notarized build clear quarantine via release/<v>/unquarantine.sh
      # (xattr -dr com.apple.quarantine).
      # Normalize LC_ID_DYLIB BEFORE signing (editing after invalidates the
      # signature). rustc's default id is the ABSOLUTE runner path
      # (/Users/runner/work/.../deps/libazul.dylib): every user binary linking
      # the downloaded dylib records that path and dies at dyld load. dll/build.rs
      # now sets @rpath/libazul.dylib at link time; this step is belt-and-braces
      # for artifacts produced by older build paths.
      - name: Normalize macOS dylib install name
        if: steps.cache-valid.outputs.skip != 'true' && runner.os == 'macOS'
        shell: bash
        run: |
          for f in target/prod-release/libazul.dylib; do
            [ -f "$f" ] || continue
            echo "before: $(otool -D "$f" | tail -1)"
            install_name_tool -id @rpath/libazul.dylib "$f"
            echo "after:  $(otool -D "$f" | tail -1)"
          done

      - name: Codesign macOS artifacts
        if: steps.cache-valid.outputs.skip != 'true' && runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -e
          FILES="target/prod-release/libazul.dylib target/prod-release/libazul.a target/prod-release/azul.so"
          if [ -n "$APPLE_CERT_P12" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "::notice::Apple Developer ID present — signing + notarizing"
            KCHAIN="$RUNNER_TEMP/azul.keychain-db"
            security create-keychain -p actions "$KCHAIN"
            security set-keychain-settings -lut 21600 "$KCHAIN"
            security unlock-keychain -p actions "$KCHAIN"
            echo "$APPLE_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
            security import "$RUNNER_TEMP/cert.p12" -P "$APPLE_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KCHAIN"
            security list-keychain -d user -s "$KCHAIN"
            IDENT=$(security find-identity -v -p codesigning "$KCHAIN" | awk '/Developer ID/{print $2; exit}')
            for f in $FILES; do
              [ -f "$f" ] || continue
              codesign --force --timestamp --options runtime --sign "$IDENT" "$f"
              ZIP="$RUNNER_TEMP/$(basename "$f").zip"; ditto -c -k "$f" "$ZIP"
              xcrun notarytool submit "$ZIP" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
                --password "$APPLE_APP_PASSWORD" --wait || true
              xcrun stapler staple "$f" 2>/dev/null || true   # .dylib/.a may not be staple-able
            done
          else
            echo "::notice::No APPLE_* secrets — ad-hoc signing only (users run unquarantine.sh)"
            for f in $FILES; do [ -f "$f" ] && codesign --force --sign - "$f" || true; done
          fi

      # Build the azuldbg.* swap-in (debug-server feature → AZ_DEBUG works) into
      # a SEPARATE target dir so it never clobbers the lean libazul.* the example
      # / screenshot steps consume. Devs download azuldbg.* and drop it in place
      # of azul.* to re-enable the debug server. Shipped azul.* stays lean.
      - name: Build azuldbg (debug-server swap-in)
        if: steps.cache-valid.outputs.skip != 'true'
        shell: bash
        run: |
          cargo build --profile prod-release -p azul-dll \
            --features build-dll,debug-server --target-dir target/azuldbg
          SRC=target/azuldbg/prod-release
          DST=target/prod-release
          if [ "${{ runner.os }}" = "macOS" ]; then
            cp "$SRC/libazul.dylib" "$DST/libazuldbg.dylib"
            # Swap-in semantics: users RENAME this over libazul.dylib, so the
            # id must stay @rpath/libazul.dylib (set before the ad-hoc sign).
            install_name_tool -id @rpath/libazul.dylib "$DST/libazuldbg.dylib" || true
            codesign --force --sign - "$DST/libazuldbg.dylib" || true
          elif [ "${{ runner.os }}" = "Windows" ]; then
            cp "$SRC/azul.dll" "$DST/azuldbg.dll"
          else
            cp "$SRC/libazul.so" "$DST/libazuldbg.so"
            strip --strip-debug "$DST/libazuldbg.so" || true
          fi

      - name: Build Rust examples
        if: steps.cache-valid.outputs.skip != 'true'
        run: cargo check --verbose --examples

      - name: Take screenshots (Linux)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.os == 'ubuntu-22.04'
        continue-on-error: true
        run: |
          chmod +x scripts/screenshot_single.sh
          mkdir -p target/screenshots
          PORT=8780
          for example in hello-world widgets opengl infinity async xhtml calc; do
            echo "=== Taking screenshot for $example on port $PORT ==="
            xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
              ./scripts/screenshot_single.sh "$example" "$PORT" || echo "Screenshot for $example failed"
            # Copy screenshot to target/screenshots with OS suffix
            if [ -f "target/examples-temp/$example/${example}_screenshot.png" ]; then
              cp "target/examples-temp/$example/${example}_screenshot.png" "target/screenshots/${example}-linux.png"
              echo "  -> Saved target/screenshots/${example}-linux.png"
            fi
            PORT=$((PORT + 1))
          done
          ls -la target/screenshots/ || echo "No screenshots directory"

      - name: Take screenshots (macOS)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.os == 'macos-14'
        continue-on-error: true
        run: |
          chmod +x scripts/screenshot_single.sh
          mkdir -p target/screenshots
          PORT=8780
          for example in hello-world widgets opengl infinity async xhtml calc; do
            echo "=== Taking screenshot for $example on port $PORT ==="
            ./scripts/screenshot_single.sh "$example" "$PORT" || echo "Screenshot for $example failed"
            # Copy screenshot to target/screenshots with OS suffix
            if [ -f "target/examples-temp/$example/${example}_screenshot.png" ]; then
              cp "target/examples-temp/$example/${example}_screenshot.png" "target/screenshots/${example}-macos.png"
              echo "  -> Saved target/screenshots/${example}-macos.png"
            fi
            PORT=$((PORT + 1))
          done
          ls -la target/screenshots/ || echo "No screenshots directory"

      - name: Take screenshots (Windows)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.os == 'windows-2022'
        continue-on-error: true
        shell: bash
        run: |
          chmod +x scripts/screenshot_single.sh
          mkdir -p target/screenshots
          PORT=8780
          for example in hello-world widgets opengl infinity async xhtml calc; do
            echo "=== Taking screenshot for $example on port $PORT ==="
            ./scripts/screenshot_single.sh "$example" "$PORT" || echo "Screenshot for $example failed"
            # Copy screenshot to target/screenshots with OS suffix
            if [ -f "target/examples-temp/$example/${example}_screenshot.png" ]; then
              cp "target/examples-temp/$example/${example}_screenshot.png" "target/screenshots/${example}-windows.png"
              echo "  -> Saved target/screenshots/${example}-windows.png"
            fi
            PORT=$((PORT + 1))
          done
          ls -la target/screenshots/ || echo "No screenshots directory"

      # The pyo3 extension is a SEPARATE artifact on EVERY platform. The old
      # "one libazul.so for both `import azul` AND -lazul" scheme (Linux baked
      # Py* stubs into the cdylib) was REMOVED 2026-07-07: defining CPython-API
      # symbols inside the pyo3 cdylib is an anti-pattern — pyo3 is statically
      # linked in, so under LLVM's `dso_local` (default -fno-semantic-
      # interposition) its use of a locally-defined Py*/PyExc_*/type-object binds
      # to our stub instead of the interpreter's real symbol, SIGSEGV-ing every
      # #[pyclass] teardown. See dll/src/lib.rs for the full rationale. We now
      # ship TWO artifacts on all platforms:
      #   - libazul.so/.dylib/.dll : python-free, clean az_* C ABI, for `-lazul`.
      #   - azul.so/.pyd           : the pyo3 extension, Py* left UNDEFINED so the
      #                              interpreter resolves them at import (standard
      #                              pyo3/manylinux). Built into a SEPARATE target
      #                              dir so it never clobbers the lean C lib.
      - name: Build Python extension
        if: steps.cache-valid.outputs.skip != 'true'
        run: cargo build --profile prod-release -p azul-dll --lib --features="python-extension" --target-dir target/pyext

      - name: Rename Python extension (Windows)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.os == 'windows-2022'
        shell: bash
        run: cp target/pyext/prod-release/azul.dll target/prod-release/azul.pyd

      # Linux: expose the pyo3 extension as azul.so ALONGSIDE the lean C
      # libazul.so — do NOT overwrite it (the C lib must stay python-free).
      # Mirrors the macOS step below.
      - name: Expose Python extension (Linux)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.os == 'ubuntu-22.04'
        run: cp target/pyext/prod-release/libazul.so target/prod-release/azul.so

      # The C libazul.so must be PYTHON-FREE: zero Py* symbols (defined OR
      # undefined). pyo3 lives only in the separate azul.so extension. This is
      # what lets `-lazul` link cleanly with no CPython stubs baked in (the old
      # stubs are the dso_local anti-pattern that SIGSEGV'd pyclass teardown).
      - name: Verify libazul.so is python-free (Linux)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.os == 'ubuntu-22.04'
        run: |
          PY=$(nm -D target/prod-release/libazul.so 2>/dev/null \
            | grep -E '\b(Py|_Py)[A-Za-z0-9_]*' || true)
          if [ -n "$PY" ]; then
            echo "::error::libazul.so (C lib) references CPython symbols — must be python-free:"
            echo "$PY" | head
            exit 1
          fi
          echo "OK: libazul.so is python-free (clean az_* C ABI)"

      # HARD regression gate for the pyo3 stub-dealloc crash: creating AND tearing
      # down a pyclass must not SIGSEGV. `import` alone is insufficient — the crash
      # was only on dealloc (`del obj`). Headless; no display needed.
      - name: Python pyclass teardown gate (Linux)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.os == 'ubuntu-22.04'
        run: |
          cp target/prod-release/azul.so examples/python/
          cd examples/python
          AZ_BACKEND=headless python3 -c "import azul; c=azul.ColorU.create(1,2,3,4); del c; a=azul.AppConfig.create(); del a; print('pyclass teardown OK')"

      # Empirically prove a C app links against the python-free release libazul.so
      # (no CPython symbols to resolve, so it links cleanly). Link only — running
      # needs a display.
      - name: C link test against release libazul.so (Linux)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.os == 'ubuntu-22.04'
        run: |
          cd examples/c
          clang -std=c99 -I../../target/codegen hello-world.c \
            -L../../target/prod-release -lazul -o /tmp/azul-c-linktest \
            && echo "OK: C app links against the release libazul.so (B1 fixed)"

      - name: Rename Python extension (macOS)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.os == 'macos-14'
        run: cp target/pyext/prod-release/libazul.dylib target/prod-release/azul.so

      - name: Test Python extension import
        if: steps.cache-valid.outputs.skip != 'true'
        # Smoke test only — must NOT block the C/C++/Rust binary + header upload
        # steps below. (A failure here previously aborted the whole job, so the
        # ubuntu release binaries never uploaded.) The dedicated B1 gates above
        # ("Verify no undefined Py* symbols", "C link test") are the hard gates.
        continue-on-error: true
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-2022" ]; then
            export PATH=$PATH:$(pwd)/target/prod-release
            python3 -c "import sys; sys.path.insert(0, 'target/prod-release'); import azul; print('Python extension loaded!')"
          else
            cp target/prod-release/azul.so examples/python/
            cd examples/python && python3 -c "import azul; print('Python extension loaded!')"
          fi

      # Dist artifacts must be panic=abort ([profile.release] panic="abort",
      # inherited by prod-release). _Unwind_RaiseException is the throw
      # primitive that ONLY the Rust panic_unwind runtime imports — C++ deps
      # (vk-mem) legitimately import _Unwind_Resume, so assert on the former.
      # (2026-07-04 audit §2.10d misread those C++/uwtable artifacts as
      # panic=unwind; verified all shipped 0.2.0 .so files are abort. This
      # gate keeps it that way.) Runs after the python bake so it checks the
      # exact files that ship.
      - name: Assert panic=abort (no unwind runtime in dist artifacts)
        if: steps.cache-valid.outputs.skip != 'true' && runner.os != 'Windows'
        shell: bash
        run: |
          for f in target/prod-release/libazul.so  target/prod-release/libazuldbg.so \
                   target/prod-release/libazul.dylib target/prod-release/libazuldbg.dylib \
                   target/prod-release/azul.so; do
            [ -f "$f" ] || continue
            if { nm -D -u "$f" 2>/dev/null; nm -u "$f" 2>/dev/null; } | grep -qw "_Unwind_RaiseException"; then
              echo "::error::$f imports _Unwind_RaiseException — the panic runtime is unwind; dist artifacts must be panic=abort (check [profile] inheritance)"
              exit 1
            fi
            echo "OK: $f has no unwind panic runtime (panic=abort)"
          done

      # The cdylib must export ONLY the azul C API — dll/build.rs restricts
      # exports so the host's global dynamic namespace isn't polluted (audit
      # §2.1). Allowed everywhere: Az*/az_* (C API + host-invokers), PyInit_* +
      # Py*/_Py* (python module + interposed weak stubs), and objc2 __*_Azul*
      # class statics (macOS). Linux's --version-script is authoritative → zero
      # strays required. macOS ld-prime keeps a dep's `#[no_mangle]` symbols
      # exported despite -exported_symbols_list (and -unexported_symbols_list
      # can't be combined), so it retains ~121 turso/limbo SQLite loadable-
      # extension entry points + material-icons icon_to_char — harmless under
      # Mach-O two-level namespacing. Those specific families are allowed on
      # macOS ONLY; anything else is a failure. Windows is skipped (no restrict).
      - name: Assert cdylib exports only the azul C API
        if: steps.cache-valid.outputs.skip != 'true' && runner.os != 'Windows'
        shell: bash
        run: |
          # dep #[no_mangle] residuals that neither macOS -exported_symbols_list
          # nor rustc's Linux cdylib export control can localize (turso/limbo
          # SQLite loadable-extension entry points, material-icons, chrono/time
          # helpers) — see dll/build.rs. Harmless symbol-table bloat, allow-listed
          # on both platforms (Linux can't restrict without hiding azul-core's
          # own host-invoker Az* exports).
          RESIDUAL_ALLOW='^(.*VTabModule|register_.*|time_.*|dur_.*|uuid.*|make_date|make_timestamp|to_timestamp|icon_to_char)$'
          if [ "${{ runner.os }}" = "macOS" ]; then
            LIST() { nm -gU "$1" 2>/dev/null | awk '{print $NF}'; }
            MACOS_ALLOW="$RESIDUAL_ALLOW"
          else
            LIST() { nm -D --defined-only "$1" 2>/dev/null | awk '{print $NF}'; }
            MACOS_ALLOW="$RESIDUAL_ALLOW"
          fi
          rc=0
          for f in target/prod-release/libazul.so target/prod-release/libazul.dylib \
                   target/prod-release/azul.so; do
            [ -f "$f" ] || continue
            STRAY=$(LIST "$f" | sed 's/^_//' \
              | grep -vE '^(Az|az_|Py|PyInit_|_Py)' \
              | grep -vE '^_?(_CLASS_|_IVAR_OFFSET_|_DROP_FLAG_OFFSET_|_REGISTER_CLASS_)Azul' \
              | grep -vE '^(__CLASS_|__IVAR_OFFSET_|__DROP_FLAG_OFFSET_|__REGISTER_CLASS_)Azul' \
              | grep -vE "$MACOS_ALLOW" \
              || true)
            if [ -n "$STRAY" ]; then
              echo "::error::$f exports non-azul symbols (export restriction failed):"
              echo "$STRAY" | head -40
              rc=1
            else
              echo "OK: $f exports only the azul C API + allowed residuals ($(LIST "$f" | wc -l | tr -d ' ') symbols)"
            fi
          done
          exit $rc

      - name: Upload Screenshots
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: screenshots-${{ matrix.os }}
          path: target/screenshots/*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Debug - Tree before upload
        shell: bash
        run: |
          echo "=== target/prod-release ==="
          ls -la target/prod-release/ 2>/dev/null | head -30 || echo "Not found"
          echo "=== target/codegen ==="
          ls -la target/codegen/ 2>/dev/null | head -20 || echo "Not found"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload Headers (Linux only)
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v7
        with:
          name: azul-headers
          path: |
            target/codegen/azul.h
            target/codegen/azul03.hpp
            target/codegen/azul11.hpp
            target/codegen/azul14.hpp
            target/codegen/azul17.hpp
            target/codegen/azul20.hpp
            target/codegen/azul23.hpp
          retention-days: 30
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Build the demo "goal apps" as self-contained, downloadable release binaries.
  #
  # Each demo is a Rust workspace member that depends on azul-dll with
  # `link-static`, so `cargo build --release -p <demo>` compiles azul straight
  # into the binary — no separate libazul link step. The produced binary is a
  # single self-contained executable visitors can download and run off the
  # release page.
  #
  # Every demo build is BEST-EFFORT: some need platform deps that aren't
  # installed on every runner (camera/video → v4l/AVFoundation, audio → cpal,
  # maps → geo stack), so a demo that won't build on a given OS just isn't
  # shipped — it must never block the release. We therefore:
  #   * make the whole job `continue-on-error: true` (non-blocking), and
  #   * build each demo with `|| echo "::warning::..."` so one failing demo
  #     doesn't abort the loop / fail the step.
  # Binaries are staged as `<demo>-<os>[.exe]` (e.g. azul-maps-linux,
  # azul-maps-macos, azul-maps-windows.exe) and uploaded as `azul-demos-<os>`.
  # ---------------------------------------------------------------------------
  build_demos:
    name: Build Demo Apps (${{ matrix.os }})
    # Demos link-dynamic against the prebuilt libazul (built once by
    # build_binaries) instead of statically recompiling the whole engine — a
    # few-second link + the shared engine cache, not a 60-min WebRender rebuild.
    needs: build_binaries
    timeout-minutes: 30
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    # Non-blocking: a demo that won't build on some platform must never fail the
    # pipeline or block the release. fail-fast: false already isolates each OS.
    continue-on-error: true
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            os_suffix: linux
            bin_ext: ""
            artifact_name: azul-demos-ubuntu
            dll_artifact: azul-linux-amd64
          - os: macos-14
            os_suffix: macos
            bin_ext: ""
            artifact_name: azul-demos-macos
            dll_artifact: azul-macos-amd64
          - os: windows-2022
            os_suffix: windows
            bin_ext: ".exe"
            artifact_name: azul-demos-windows
            dll_artifact: azul-windows-amd64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      # Mirror build_binaries' Linux dependency install (clang + GL/X11) plus
      # libv4l-dev for the camera/video demos. macOS/Windows pull their platform
      # frameworks (AVFoundation, Media Foundation) from the SDK at build time.
      - name: Install clang + deps (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y clang libgl1-mesa-dev libx11-dev libv4l-dev

      - name: Install MinGW (Windows)
        if: matrix.os == 'windows-2022'
        shell: bash
        run: choco install mingw -y

      - name: Install coreutils (macOS)
        if: matrix.os == 'macos-14'
        run: brew install coreutils

      - name: Cache codegen output
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate DLL API bindings
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all

      # Build each demo best-effort. A failing demo prints a ::warning:: and is
      # skipped (no binary shipped) instead of failing the step/job. azul-doc is
      # intentionally excluded — it's the generator tool, not a demo.
      - name: Download prebuilt libazul (static .a for self-contained demos)
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.dll_artifact }}
          path: libazul-prebuilt

      - name: Build demos (best-effort)
        env:
          # Demos use the `link-dynamic` FEATURE (compile thin against the C ABI,
          # target/codegen/dll_api_external.rs) but link the prebuilt STATIC
          # libazul.a → ONE self-contained binary per demo, same as link-static
          # used to produce, but WITHOUT recompiling the engine from source.
          # dll/build.rs links `static=azul` against libazul.a. AZ_LINK_STATIC
          # forces the static path so a stray libazul.so in target/ or /usr/lib
          # can't make it link dynamically instead.
          AZ_LINK_PATH: ${{ github.workspace }}/libazul-prebuilt
          AZ_LINK_STATIC: "1"
          # The prebuilt libazul.a is final machine code (no LTO bitcode), so the
          # demo build must NOT try to LTO across it ("failed to get bitcode from
          # object file for LTO"). The engine is already optimized inside the .a;
          # only the thin demo glue is built here, so LTO buys nothing anyway.
          CARGO_PROFILE_RELEASE_LTO: "off"
        shell: bash
        run: |
          set +e
          # Keep ONLY the static archive so build.rs's probe_dir finds no dylib
          # and falls through to `rustc-link-lib=static=azul` (self-contained).
          rm -f libazul-prebuilt/libazul.so libazul-prebuilt/libazuldbg.so \
                libazul-prebuilt/libazul.dylib libazul-prebuilt/libazuldbg.dylib \
                libazul-prebuilt/azul.dll libazul-prebuilt/azuldbg.dll \
                libazul-prebuilt/azul.dll.lib libazul-prebuilt/azul.so \
                libazul-prebuilt/azul.pyd 2>/dev/null
          echo "Linking against static lib(s):"; ls -la libazul-prebuilt/
          for demo in azul-paint azul-widgets azul-maps azul-vault azul-gamepad azul-camera-app azul-screenshare-app azul-video-app azul-meet azul-self-test; do
            echo "=== Building $demo on ${{ matrix.os }} ==="
            cargo build --release -p "$demo" || echo "::warning::$demo failed to build on ${{ matrix.os }} (likely missing platform deps) — skipping"
          done

      # Collect whatever built into a staging dir, renamed <demo>-<os>[.exe].
      # Missing binaries (failed builds) are simply skipped.
      - name: Stage demo binaries
        shell: bash
        run: |
          mkdir -p demos-staging
          # Each demo is a single self-contained binary (static libazul.a linked
          # in) — no DLL to ship alongside, same as the old link-static output.
          for demo in azul-paint azul-widgets azul-maps azul-vault azul-gamepad azul-camera-app azul-screenshare-app azul-video-app azul-meet azul-self-test; do
            src="target/release/${demo}${{ matrix.bin_ext }}"
            if [ -f "$src" ]; then
              dst="demos-staging/${demo}-${{ matrix.os_suffix }}${{ matrix.bin_ext }}"
              cp "$src" "$dst"
              # Strip debug/line-table symbols — the `release` profile keeps
              # debug=1, so each statically-linked demo is ~40 MB unstripped
              # (azul-demos-ubuntu was 278 MB). strip drops that to a few MB.
              # Best-effort: macOS/Linux `strip`, Windows MinGW `strip.exe`.
              before=$(wc -c < "$dst" 2>/dev/null || echo 0)
              strip "$dst" 2>/dev/null || strip -S "$dst" 2>/dev/null || true
              after=$(wc -c < "$dst" 2>/dev/null || echo 0)
              echo "  [OK] staged ${demo}-${{ matrix.os_suffix }}${{ matrix.bin_ext }} ($before -> $after bytes)"
            else
              echo "  [skip] $src not found (build absent or failed)"
            fi
          done
          ls -la demos-staging/ || echo "No demos staged"

      - name: Upload demo binaries
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: demos-staging/*
          retention-days: 30
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Native AZ_E2E click/counter test — producer + family consumers.
  #
  # The language bindings drive libazul's headless E2E runner:
  #   AZ_E2E=<spec.json> AZ_BACKEND=headless ./hello-world
  # which replays a click, the binding's callback increments a counter, and
  # libazul prints cargo-test-style output ending in `test result: ok`.
  #
  # build_dll_e2e builds the debug-server DLL + the codegen bindings ONCE per OS
  # and uploads them. The consumer family jobs (rust / c-cpp / scripting) then
  # DOWNLOAD that prebuilt DLL and run only their slice of the language matrix —
  # no per-job DLL rebuild. Previously every "Native AZ_E2E (os)" job rebuilt the
  # whole DLL (~15-20 min) before a matrix whose actual tests take ~400 ms each;
  # the split removes that redundant rebuild and runs the three families in
  # parallel, cutting the E2E tail from ~28 min to a few minutes per job.
  #
  # Gating: each consumer runs `scripts/e2e_language_matrix.sh --gate-shipped`,
  # which fails the job iff one of the 11 SHIPPED bindings FAILS on an OS where
  # it can run (missing toolchains / unrunnable-on-this-OS report ⊘ SKIP and do
  # NOT gate — per-OS aware without a hardcoded table). BETA/ALPHA stay info-only.
  # ---------------------------------------------------------------------------
  build_dll_e2e:
    name: Build E2E DLL (${{ matrix.os }})
    timeout-minutes: 60
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Early artifact cache: skip the DLL build if engine source hasn't changed.
      # EXACT hit => skip=true (no build). restore-keys (prefix) hit => cache-hit is
      # false so the DLL is still rebuilt, but on top of the last green build's
      # target/, i.e. incrementally rather than from zero.
      - name: Check E2E DLL artifact cache
        id: build-cache
        uses: actions/cache@v5
        with:
          path: |
            target/release
            target/pyext-e2e/release
            target/codegen
          key: e2e-dll-${{ env.CACHE_BUST }}-${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('css/src/**/*.rs', 'core/src/**/*.rs', 'layout/src/**/*.rs', 'dll/src/**/*.rs', 'dll/build.rs') }}
          restore-keys: |
            e2e-dll-${{ env.CACHE_BUST }}-${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}-
            e2e-dll-${{ env.CACHE_BUST }}-${{ matrix.os }}-

      - name: Validate build cache
        id: cache-valid
        shell: bash
        run: |
          if [ "${{ steps.build-cache.outputs.cache-hit }}" != "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          case "${{ matrix.os }}" in
            ubuntu-22.04) F="target/release/libazul.so" ;;
            macos-14)     F="target/release/libazul.dylib" ;;
            windows-2022) F="target/release/azul.dll" ;;
          esac
          if [ -f "$F" ]; then
            echo "Cache valid — $F exists"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Cache restored but $F missing — rebuilding"
            rm -rf target/release target/pyext-e2e/release
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust
        if: steps.cache-valid.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Install dependencies (Linux)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.os == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y clang libgl1-mesa-dev libx11-dev libv4l-dev

      - name: Cache codegen output
        if: steps.cache-valid.outputs.skip != 'true'
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate DLL API bindings
        if: steps.cache-valid.outputs.skip != 'true' && steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all

      - name: Build azul-dll (release, dynamic, debug-server)
        if: steps.cache-valid.outputs.skip != 'true'
        # debug-server enables the AZ_E2E runner the families drive (it is OFF in
        # the shipped lean build, so the E2E test binary must opt back in).
        run: cargo build --release -p azul-dll --features build-dll,debug-server

      # Python's matrix row runs the real counter e2e only when a prebuilt,
      # debug-server-enabled extension module exists (the SHIPPED azul.so is
      # lean and would silently skip AZ_E2E — same trap as the dll). Built
      # into its own target dir so it can't clobber the dll above. Linux/
      # macOS only: the windows .pyd rename path is exercised by build_binaries.
      - name: Build python extension (debug-server, for e2e)
        if: steps.cache-valid.outputs.skip != 'true' && matrix.os != 'windows-2022'
        run: cargo build --release -p azul-dll --lib --features python-extension,debug-server --target-dir target/pyext-e2e

      - name: Stage DLL + codegen artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf e2e-dll && mkdir -p e2e-dll/release e2e-dll/codegen
          cp -a target/codegen/. e2e-dll/codegen/
          if [ "${{ matrix.os }}" != "windows-2022" ]; then
            # placed as examples/python/azul.so by the e2e_native consumer
            cp target/pyext-e2e/release/libazul.dylib e2e-dll/release/azul-pyext.so 2>/dev/null \
              || cp target/pyext-e2e/release/libazul.so e2e-dll/release/azul-pyext.so
          fi
          # Per-OS native lib(s). Windows also needs the MSVC import lib so the
          # C / C++ families can link against azul.dll.lib.
          if [ "${{ matrix.os }}" = "macos-14" ]; then
            cp target/release/libazul.dylib e2e-dll/release/
          elif [ "${{ matrix.os }}" = "windows-2022" ]; then
            cp target/release/azul.dll        e2e-dll/release/
            cp target/release/azul.dll.lib    e2e-dll/release/ 2>/dev/null || true
            # The rust family builds with link-dynamic, whose `-lazul` resolves
            # to `azul.lib`; rustc emits the MSVC import lib as `azul.dll.lib`,
            # so also stage it under the bare name or the link fails LNK1181.
            cp target/release/azul.dll.lib    e2e-dll/release/azul.lib 2>/dev/null || true
          else
            cp target/release/libazul.so e2e-dll/release/
          fi
          # Strip debug info from the e2e shared libs. The release profile has
          # debug=1 (line tables for samply) which bloats libazul.so to ~311 MB.
          # E2E tests don't need debug symbols; stripping shrinks the artifact
          # and the consumer's disk footprint (the scripting job installs 27+
          # language toolchains and was running out of disk space).
          for f in e2e-dll/release/*.so e2e-dll/release/*.dylib; do
            [ -f "$f" ] && strip -S "$f" 2>/dev/null || true
          done
          ls -la e2e-dll/release/

      - name: Upload E2E DLL + codegen
        uses: actions/upload-artifact@v7
        with:
          name: azul-e2e-dll-${{ matrix.os }}
          path: e2e-dll
          retention-days: 7
          if-no-files-found: error

  # ===========================================================================
  # Headless engine E2E — every JSON scenario in e2e/ (damage / stale-screen /
  # window-size / resource-leak invariants), run against the real engine with
  # AZ_BACKEND=headless.
  #
  # The scenarios `mount` their own DOM+CSS, so the host binary is irrelevant —
  # any debug-server-enabled binary works; we reuse the prebuilt E2E DLL from
  # build_dll_e2e and link the rust hello-world example against it (exactly the
  # recipe e2e_native's `rust` family uses).
  #
  # BLOCKING: this job is in deploy_pages.needs, same as build_rust9x /
  # e2e_native — a red damage/leak invariant must not ship.
  # ===========================================================================
  e2e_headless:
    name: E2E Headless (e2e/*.json)
    needs: build_dll_e2e
    timeout-minutes: 30
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ubuntu-22.04
    env:
      AZ_BACKEND: headless
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Install dependencies (Linux)
        run: sudo apt-get update && sudo apt-get install -y clang libgl1-mesa-dev libx11-dev libv4l-dev fonts-dejavu-core

      # House-style cache: content-hash key + restore-keys, CACHE_BUST as the
      # key PREFIX. Caches only the dep subdirs of target/release — the prebuilt
      # libazul is copied into target/release below and must not be re-uploaded.
      - name: Rust build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/release/deps
            target/release/build
            target/release/.fingerprint
          key: e2e-headless-${{ env.CACHE_BUST }}-ubuntu-22.04-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('css/src/**/*.rs', 'core/src/**/*.rs', 'layout/src/**/*.rs', 'dll/src/**/*.rs', 'dll/build.rs') }}
          restore-keys: |
            e2e-headless-${{ env.CACHE_BUST }}-ubuntu-22.04-${{ hashFiles('Cargo.lock') }}-
            e2e-headless-${{ env.CACHE_BUST }}-ubuntu-22.04-

      - name: Download prebuilt E2E DLL + codegen
        uses: actions/download-artifact@v8
        with:
          name: azul-e2e-dll-ubuntu-22.04
          path: e2e-dll

      - name: Place DLL + codegen into the target tree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/release target/codegen
          cp -a e2e-dll/codegen/. target/codegen/
          cp -a e2e-dll/release/. target/release/
          rm -rf e2e-dll
          echo "AZ_LINK_PATH=$PWD/target/release" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$PWD/target/release" >> "$GITHUB_ENV"

      # link-dynamic links the PREBUILT debug-server DLL (link-static would
      # rebuild azul-dll WITHOUT debug-server, and AZ_E2E would be a silent
      # no-op — see the note in scripts/e2e_language_matrix.sh).
      - name: Build the headless host binary (links the prebuilt DLL)
        run: cargo build --release -p azul-examples --example hello-world --no-default-features --features link-dynamic

      - name: Run every e2e/*.json scenario (BLOCKING)
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p target/e2e
          shopt -s nullglob
          scenarios=(e2e/*.json)
          if [ ${#scenarios[@]} -eq 0 ]; then
            echo "FATAL: no scenarios in e2e/ — the gate would be vacuous" >&2
            exit 1
          fi
          failed=0
          for f in "${scenarios[@]}"; do
            echo "::group::$f"
            if AZ_E2E="$f" timeout 300 ./target/release/examples/hello-world; then
              echo "PASS $f"
            else
              echo "::error file=$f::e2e scenario FAILED: $f"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit "$failed"

      - name: Upload damage PNGs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-headless-damage-pngs
          path: target/e2e/
          if-no-files-found: ignore
          retention-days: 7

  e2e_native:
    name: AZ_E2E ${{ matrix.family.key }} (${{ matrix.os }})
    needs: build_dll_e2e
    # macOS installs 27 language toolchains (~18 min of brew) THEN runs the
    # matrix; 30 min timed out mid-run every time, cancelling the leg. Since
    # e2e_native is in deploy_pages.needs, that silently skipped the deploy.
    timeout-minutes: 60
    # Stays BLOCKING on every OS/family: a real per-OS binding bug must fail the
    # release. The 30→60 bump + toolchain caching keeps the macOS scripting leg
    # (27 toolchains) inside the window instead of timing out mid-run.
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
        family:
          # key = board file suffix + display; langs = subset passed to the script.
          - key: rust
            langs: "rust"
          - key: c-cpp
            langs: "c cpp"
          # scripting = everything else: the FFI shipped bindings + all beta/alpha
          # langs, so the per-OS board (concatenated in deploy) still covers them.
          - key: scripting
            langs: "python lua ruby node csharp java kotlin ocaml go zig odin nim racket red ada algol68 cobol fortran freebasic haskell lisp pascal perl php powershell scala smalltalk vb6"
    runs-on: ${{ matrix.os }}
    env:
      AZ_E2E: ${{ github.workspace }}/tests/e2e/hello_world_counter.json
      AZ_BACKEND: headless
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Rust toolchain: the rust family compiles examples/rust; the others don't
      # rebuild the DLL but installing rustup is cheap and harmless.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      # Cargo + target cache (house style: content-hash key + restore-keys) for the
      # `rust` family — the only leg that compiles Rust; the others just link the
      # prebuilt DLL downloaded below.
      # Deliberately caches the DEP subdirs of target/release, NOT the profile dir
      # itself: "Place DLL + codegen into the target tree" copies the prebuilt
      # libazul straight into target/release/, and caching the profile root would
      # re-upload that whole DLL into the (10 GB) cache on every run.
      - name: Rust build cache
        if: matrix.family.key == 'rust'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/release/deps
            target/release/build
            target/release/.fingerprint
          key: e2e-native-${{ env.CACHE_BUST }}-${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('css/src/**/*.rs', 'core/src/**/*.rs', 'layout/src/**/*.rs', 'dll/src/**/*.rs', 'dll/build.rs') }}
          restore-keys: |
            e2e-native-${{ env.CACHE_BUST }}-${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}-
            e2e-native-${{ env.CACHE_BUST }}-${{ matrix.os }}-

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        # gdb: lets the language matrix capture a backtrace when a native binding
        # (C/C++/Rust) crashes, so a "crash at runtime" reports a stack.
        run: sudo apt-get update && sudo apt-get install -y clang libgl1-mesa-dev libx11-dev libv4l-dev gdb

      # MinGW gives cgo/C/C++ a gcc that links the MSVC import lib (mirrors
      # build_binaries' Windows setup). Only the c-cpp + scripting (go) families
      # need it.
      - name: Install MinGW (Windows)
        if: matrix.os == 'windows-2022' && matrix.family.key != 'rust'
        shell: bash
        run: choco install mingw -y

      # OCaml: lang_ocaml WORKS once dune + ctypes are present. setup-ocaml is
      # Linux/macOS only; only the scripting family needs it.
      - name: Set up OCaml (Linux/macOS)
        if: matrix.family.key == 'scripting' && matrix.os != 'windows-2022'
        continue-on-error: true
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"

      - name: Install OCaml FFI packages (Linux/macOS)
        if: matrix.family.key == 'scripting' && matrix.os != 'windows-2022'
        continue-on-error: true
        shell: bash
        run: opam install -y dune ctypes ctypes-foreign

      # The JVM bindings (java/kotlin/scala) target Java 11+; the Windows runner's
      # default `javac` is too old ("invalid target release: 11"), so pin a JDK.
      # Also exports JAVA_HOME, which kotlinc/scala pick up.
      - name: Set up JDK 17 (JVM bindings)
        if: matrix.family.key == 'scripting'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Odin: lang_odin builds the C-ABI-direct binding + counter example.
      # setup-odin downloads a prebuilt Odin (needs the token for GH releases);
      # best-effort — if it fails the matrix row SKIPs (odin is BETA, non-gating).
      - name: Set up Odin
        if: matrix.family.key == 'scripting'
        continue-on-error: true
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: latest

      # Nim: lang_nim builds the C-ABI-direct binding (importc/dynlib, direct
      # cdecl callbacks). ALPHA/non-gating — SKIPs if the action is unavailable.
      - name: Set up Nim
        if: matrix.family.key == 'scripting'
        continue-on-error: true
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.0.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # D: lang_d builds the C-ABI-direct binding (extern(C) declarations +
      # extern(C) fn-ptr callbacks) + counter example, compiled with dmd.
      # best-effort — if the action is unavailable the matrix row SKIPs
      # (d is BETA, non-gating). Without this step dmd is absent and lang_d
      # can never run on CI, so it can never be proven green cross-OS.
      - name: Set up D (dmd)
        if: matrix.family.key == 'scripting'
        continue-on-error: true
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: dmd-latest

      # Racket: lang_racket builds the ffi/unsafe binding (libffi closures =
      # real C fn-ptrs). ALPHA/non-gating.
      - name: Set up Racket
        if: matrix.family.key == 'scripting'
        continue-on-error: true
        uses: Bogdanp/setup-racket@v1.11
        with:
          version: 'stable'

      # Swift: the macOS runner ships swiftc preinstalled, so lang_swift is
      # already proven there. Linux has no system Swift, so install the swift.org
      # toolchain (best-effort) — otherwise the ubuntu row can never prove swift
      # green and swift stays macOS-only. Windows Swift needs the separate MSVC
      # toolchain setup and is left for a follow-up (the row SKIPs there).
      - name: Set up Swift (Linux)
        if: matrix.family.key == 'scripting' && matrix.os == 'ubuntu-22.04'
        continue-on-error: true
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.10'

      # Swift (Windows): the swift.org Windows toolchain (compnerd's action wraps
      # the official installer + Visual Studio integration). Best-effort — if it
      # fails, swiftc is absent and lang_swift SKIPs on Windows (BETA/non-gating).
      - name: Set up Swift (Windows)
        if: matrix.family.key == 'scripting' && matrix.os == 'windows-2022'
        continue-on-error: true
        uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-5.10-release
          tag: 5.10-RELEASE

      # Zig: lang_zig builds the @cImport(azul.h) binding + counter (C-ABI-direct
      # callbacks). SHIPPED — must prove green on all three OSes.
      - name: Set up Zig
        if: matrix.family.key == 'scripting'
        continue-on-error: true
        uses: mlugg/setup-zig@v1
        with:
          version: "0.14.1"

      # Go on macOS: ubuntu/windows runners preinstall go, macOS does not.
      - name: Set up Go (macOS)
        if: matrix.family.key == 'scripting' && matrix.os == 'macos-14'
        continue-on-error: true
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # Scala (JVM binding): coursier installs the `scala`/`scalac` launchers.
      # SHIPPED — must prove green on all three OSes.
      - name: Set up Scala (coursier)
        if: matrix.family.key == 'scripting'
        continue-on-error: true
        uses: coursier/setup-action@v1
        with:
          jvm: temurin:17
          apps: scala scalac

      # Haskell on macOS: ubuntu/windows runners ship ghc/cabal; macOS does not.
      # SHIPPED — must prove green on all three OSes.
      - name: Set up Haskell (macOS)
        if: matrix.family.key == 'scripting' && matrix.os == 'macos-14'
        continue-on-error: true
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6'
          cabal-version: '3.10'

      # Crystal: lang_crystal builds the azul.cr binding + counter. BETA. Windows
      # crystal is experimental; install-crystal targets ubuntu/macos only.
      - name: Set up Crystal
        if: matrix.family.key == 'scripting' && matrix.os != 'windows-2022'
        continue-on-error: true
        uses: crystal-lang/install-crystal@v1

      # V (vlang): lang_v builds the azul.v subpackage binding + counter. BETA.
      - name: Set up V (vlang)
        if: matrix.family.key == 'scripting'
        continue-on-error: true
        uses: vlang/setup-v@v1.4
        with:
          check-latest: true

      # Julia: lang_julia builds the ccall binding + counter. BETA.
      - name: Set up Julia
        if: matrix.family.key == 'scripting'
        continue-on-error: true
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'

      # Red (red-lang.org): no maintained GitHub Action for the Red toolchain,
      # and the binding is ALPHA/broken, so `redc` is intentionally NOT installed
      # and lang_red SKIPs (ALPHA/non-gating).

      - name: Download prebuilt E2E DLL + codegen
        uses: actions/download-artifact@v8
        with:
          name: azul-e2e-dll-${{ matrix.os }}
          path: e2e-dll

      - name: Place DLL + codegen into the target tree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/release target/codegen
          cp -a e2e-dll/codegen/. target/codegen/
          cp -a e2e-dll/release/. target/release/
          # Debug-server-enabled python extension → where the matrix's python
          # row looks for it (absent on windows; the row SKIPs there).
          if [ -f target/release/azul-pyext.so ]; then
            mv target/release/azul-pyext.so examples/python/azul.so
          fi
          # Remove the download staging dir — its contents are now in target/
          # and keeping it doubles the DLL footprint on disk.
          rm -rf e2e-dll
          ls -la target/release/

      - name: Resolve dynamic library path
        shell: bash
        run: |
          # build.rs falls back to target/<profile>, but set AZ_LINK_PATH too so
          # the rust example links the prebuilt DLL without any rebuild.
          echo "AZ_LINK_PATH=$PWD/target/release" >> "$GITHUB_ENV"
          if [ "${{ matrix.os }}" = "macos-14" ]; then
            echo "AZ_LIB=$PWD/target/release/libazul.dylib" >> "$GITHUB_ENV"
            echo "DYLD_LIBRARY_PATH=$PWD/target/release" >> "$GITHUB_ENV"
          elif [ "${{ matrix.os }}" = "windows-2022" ]; then
            echo "AZ_LIB=$PWD/target/release/azul.dll" >> "$GITHUB_ENV"
            echo "$PWD/target/release" >> "$GITHUB_PATH"
          else
            echo "AZ_LIB=$PWD/target/release/libazul.so" >> "$GITHUB_ENV"
            echo "LD_LIBRARY_PATH=$PWD/target/release" >> "$GITHUB_ENV"
          fi

      # Per-language toolchain install/cleanup is now handled inside
      # e2e_language_matrix.sh (lang_deps_install / lang_deps_cleanup) so each
      # language installs only what it needs, runs, then cleans up — avoiding the
      # disk-space exhaustion caused by installing all 27+ toolchains at once.

      - name: Language binding board (AZ_E2E, gates shipped tier)
        shell: bash
        run: |
          # Run only this family's subset against the prebuilt DLL. tee the board
          # to a per-(os,family) file for the Statistics section; propagate the
          # script's --gate-shipped exit code (NOT tee's) via pipefail so a
          # shipped-binding regression still fails CI.
          set -o pipefail
          mkdir -p stats
          os_slug="ubuntu"
          case "${{ matrix.os }}" in
            macos-14)     os_slug="macos" ;;
            windows-2022) os_slug="windows" ;;
          esac
          # Kotlin (kotlinc) and Haskell (cabal update + GHC) compile the large
          # generated binding and need room beyond the 240s default. RUST_BACKTRACE
          # surfaces a panic backtrace if a binding aborts at runtime.
          E2E_LANG_TIMEOUT=600 RUST_BACKTRACE=full \
          bash scripts/e2e_language_matrix.sh --gate-shipped ${{ matrix.family.langs }} \
            | tee "stats/language-bindings-${os_slug}-${{ matrix.family.key }}.txt"

      - name: Upload language binding board
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stats-language-board-${{ matrix.os }}-${{ matrix.family.key }}
          path: stats/language-bindings-*.txt
          if-no-files-found: warn
          retention-days: 30

  # ===========================================================================
  # Mobile libazul — prebuilt drop-in libraries (+ the minimal link stubs).
  #
  # Cross-compiles the LEAN libazul (no remill/web) for iOS + Android and bundles
  # the few NDK / iOS-SDK *link stubs* it needs, so a user links a dropped-in
  # libazul with NEITHER Android Studio NOR Xcode (see guide/mobile.md). The CI
  # runner's NDK / Xcode SDK are used only to extract those stubs once — the
  # published artifact is self-contained. Best-effort / non-blocking.
  # ===========================================================================
  build_mobile:
    name: Mobile libazul (${{ matrix.label }})
    timeout-minutes: 45
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    continue-on-error: true
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04, label: android-arm64,  target: aarch64-linux-android, abi: arm64-v8a }
          - { os: ubuntu-22.04, label: android-x64,    target: x86_64-linux-android,  abi: x86_64 }
          - { os: macos-14,     label: ios-arm64,      target: aarch64-apple-ios }
          - { os: macos-14,     label: ios-sim-arm64,  target: aarch64-apple-ios-sim }
    env:
      MOBILE_FEATURES: "std,logging,link-static,a11y"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}
      # Early artifact cache: skip the entire mobile build if source hasn't changed.
      # EXACT hit => skip=true. restore-keys (prefix) hit => build runs against a
      # warm target/<triple>/release (incremental, not cold).
      - name: Check mobile build artifact cache
        id: build-cache
        uses: actions/cache@v5
        with:
          path: |
            target/${{ matrix.target }}/release
            target/codegen
          key: mobile-build-${{ env.CACHE_BUST }}-${{ matrix.label }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('css/src/**/*.rs', 'core/src/**/*.rs', 'layout/src/**/*.rs', 'dll/src/**/*.rs', 'dll/build.rs') }}
          restore-keys: |
            mobile-build-${{ env.CACHE_BUST }}-${{ matrix.label }}-${{ hashFiles('Cargo.lock') }}-
            mobile-build-${{ env.CACHE_BUST }}-${{ matrix.label }}-

      - name: Validate build cache
        id: cache-valid
        shell: bash
        run: |
          if [ "${{ steps.build-cache.outputs.cache-hit }}" != "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          DIR="target/${{ matrix.target }}/release"
          if compgen -G "$DIR/libazul.*" > /dev/null 2>&1; then
            echo "Cache valid — output artifacts present in $DIR"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Cache restored $DIR but no libazul output found — rebuilding"
            rm -rf "$DIR"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache codegen output
        if: steps.cache-valid.outputs.skip != 'true'
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate DLL API bindings
        if: steps.cache-valid.outputs.skip != 'true' && steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all

      - name: Set up Android NDK
        if: steps.cache-valid.outputs.skip != 'true' && startsWith(matrix.label, 'android')
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27
      - name: Install cargo-ndk
        if: steps.cache-valid.outputs.skip != 'true' && startsWith(matrix.label, 'android')
        run: cargo install cargo-ndk --locked
      - name: Build libazul (Android)
        if: steps.cache-valid.outputs.skip != 'true' && startsWith(matrix.label, 'android')
        run: |
          # --platform 24 (Android 7.0): build.rs links libcamera2ndk/libmediandk
          # (API 24); AAudio (API 26) is dlopen'd, so it doesn't raise the floor.
          # NB: it MUST be `--platform` — cargo-ndk passes `-p` through to cargo as
          # `--package` (that's the "unknown package: 24" panic), and it goes
          # BEFORE the `build` subcommand.
          cargo ndk -t ${{ matrix.abi }} --platform 24 build --release -p azul-dll \
            --no-default-features --features "$MOBILE_FEATURES,android-activity"

      - name: Build libazul (iOS)
        if: steps.cache-valid.outputs.skip != 'true' && startsWith(matrix.label, 'ios')
        run: |
          cargo build --release --target ${{ matrix.target }} -p azul-dll \
            --no-default-features --features "$MOBILE_FEATURES"

      - name: Collect libazul + minimal link stubs
        shell: bash
        run: |
          set -e
          OUT="mobile/${{ matrix.label }}"
          mkdir -p "$OUT/stubs"
          T="target/${{ matrix.target }}/release"
          [ -f "$T/libazul.a" ] && cp "$T/libazul.a" "$OUT/" || true
          for ext in so dylib; do [ -f "$T/libazul.$ext" ] && cp "$T/libazul.$ext" "$OUT/" || true; done

          # Strip debug/line-table symbols. The mobile libs build with the
          # `release` profile (debug=1), so the static libazul.a + the .so/.dylib
          # carry line tables that bloat them to ~170 MB/bundle. --strip-debug
          # keeps the symbol table needed for linking but drops the debug info.
          # Android ELF -> the NDK's llvm-strip; iOS Mach-O -> macOS `strip -S`.
          if [[ "${{ matrix.label }}" == android* ]]; then
            HOST="$(uname -s | tr '[:upper:]' '[:lower:]')-x86_64"
            STRIP="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/$HOST/bin/llvm-strip"
            [ -x "$STRIP" ] || STRIP="$(command -v llvm-strip || echo true)"
          else
            STRIP="strip"
          fi
          for f in "$OUT/libazul.a" "$OUT/libazul.so" "$OUT/libazul.dylib"; do
            [ -f "$f" ] || continue
            b=$(wc -c < "$f")
            # Drop debug + LOCAL symbols (keep globals → still links). -x on
            # macOS/BSD strip, --discard-all on llvm-strip. The local symbol
            # table is what bloats the .a, so this is the real size win.
            if [ "$STRIP" = "strip" ]; then strip -S -x "$f" 2>/dev/null || true
            else "$STRIP" --strip-debug --discard-all "$f" 2>/dev/null || true; fi
            echo "  stripped $f ($b -> $(wc -c < "$f") bytes)"
          done

          # Belt with a hard failure mode (the loop above degrades to a no-op
          # when llvm-strip is missing): strip embedded LLVM bitcode + any
          # remaining debug info from the archive with llvm-objcopy, which
          # handles cross-ELF/Mach-O, and ASSERT no .llvmbc survived. The
          # shipped 0.2.0 android .a was 708 MB — 274 MB bitcode + 179 MB
          # DWARF that host `strip` had silently skipped (audit §2.4/§2.6).
          if [ -f "$OUT/libazul.a" ]; then bash scripts/strip_staticlib.sh "$OUT/libazul.a"; fi

          if [[ "${{ matrix.label }}" == android* ]]; then
            SYS="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/${{ matrix.target }}/24"
            for l in c m dl log android; do cp "$SYS/lib$l.so" "$OUT/stubs/" 2>/dev/null || true; done
            {
              echo "Android NDK r27 link stubs for ${{ matrix.target }} (API 24)."
              echo "Source: \$ANDROID_NDK/toolchains/llvm/prebuilt/<host>/sysroot/usr/lib/${{ matrix.target }}/24/"
              echo "These are empty linker stubs (real impls ship on-device). Link your azul"
              echo "app against these + libazul — no full NDK needed. See guide/mobile.md."
            } > "$OUT/stubs/PROVENANCE.txt"
          else
            SDK="$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null || true)"
            for f in Foundation UIKit CoreGraphics; do
              cp "$SDK/System/Library/Frameworks/$f.framework/$f.tbd" "$OUT/stubs/$f.tbd" 2>/dev/null || true
            done
            cp "$SDK/usr/lib/libSystem.tbd" "$OUT/stubs/" 2>/dev/null || true
            {
              echo "iOS SDK link stubs (.tbd) for ${{ matrix.target }}."
              echo "Source: \$(xcrun --sdk iphoneos --show-sdk-path)/System/Library/Frameworks/"
              echo "Text-based stubs; link your azul app against these + libazul. See guide/mobile.md."
            } > "$OUT/stubs/PROVENANCE.txt"
          fi
          ls -lR "$OUT"

      - name: Upload mobile libazul
        uses: actions/upload-artifact@v7
        with:
          name: azul-mobile-${{ matrix.label }}
          path: mobile/${{ matrix.label }}
          if-no-files-found: warn

  # ===========================================================================
  # Mobile demo apps — installable .app per example, so reviewers can sideload
  # and test touch features (pan/zoom, …) without Xcode/Studio.
  #
  # iOS: each demo is a normal bin whose main() runs App::run → UIApplicationMain,
  # so the binary IS the app — build it for the iOS target and bundle a .app
  # (build-ios.sh, AZ_IOS_DRYRUN=1 to bundle-but-not-deploy). Best-effort: a demo
  # that needs a platform dep just isn't shipped (same model as build_demos).
  #
  # ANDROID demo APKs are NOT built here yet: a NativeActivity needs a cdylib
  # (+ an android_main shim), and the demos are bin-only. Each demo opts into
  # Android by adding `crate-type=["cdylib","rlib"]` + the shim (see
  # guide/mobile.md); build-android.sh already accepts a crate name. The drop-in
  # libazul + NDK stubs shipped by build_mobile are what those APKs link against.
  # ===========================================================================
  build_mobile_apps:
    name: Mobile demo apps (iOS)
    timeout-minutes: 60
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    continue-on-error: true
    runs-on: macos-14
    # Hoist the signing secrets to job env so the optional cert-import step can
    # gate on `env.` (the `secrets.` context is not allowed in a step `if:`).
    env:
      APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          targets: aarch64-apple-ios, aarch64-apple-ios-sim
      - name: Cache codegen output
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate DLL API bindings
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all
      # Signing is OPTIONAL: only when the APPLE_* secrets are present do we import
      # the Developer cert and export IOS_SIGNING_IDENTITY, which makes build-ios.sh
      # codesign the DEVICE .app and lets us emit an installable .ipa. Without the
      # secrets this step is skipped and the device .app ships unsigned (as is) —
      # the Simulator .app never needs signing. (No Mac? the guide documents
      # rcodesign for signing off-host.)
      - name: Import Apple signing cert (optional)
        if: ${{ env.APPLE_CERT_P12 != '' }}
        run: |
          KCHAIN="$RUNNER_TEMP/azul.keychain-db"
          security create-keychain -p actions "$KCHAIN"
          security set-keychain-settings -lut 21600 "$KCHAIN"
          security unlock-keychain -p actions "$KCHAIN"
          echo "$APPLE_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$APPLE_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KCHAIN"
          security list-keychain -d user -s "$KCHAIN"
          IDENT=$(security find-identity -v -p codesigning "$KCHAIN" | awk '/Apple (Development|Distribution)|Developer ID/{print $2; exit}')
          echo "IOS_SIGNING_IDENTITY=$IDENT" >> "$GITHUB_ENV"
      - name: Build + bundle each demo as a .app — device + simulator (best-effort)
        shell: bash
        run: |
          set +e
          mkdir -p mobile-apps
          # Build BOTH the device slice (aarch64-apple-ios → <demo>-ios.app.zip,
          # needs signing to install on a phone) and the simulator slice
          # (aarch64-apple-ios-sim → <demo>-ios-sim.app.zip, runs UNSIGNED in the
          # iOS Simulator via `xcrun simctl install`).
          for demo in azul-paint azul-widgets azul-maps azul-vault azul-gamepad azul-camera-app azul-screenshare-app azul-video-app azul-meet azul-self-test; do
            for tgt in aarch64-apple-ios aarch64-apple-ios-sim; do
              echo "=== iOS .app: $demo ($tgt) ==="
              suffix="ios"; [ "$tgt" = "aarch64-apple-ios-sim" ] && suffix="ios-sim"
              AZ_IOS_DRYRUN=1 APP_NAME="$demo" bash scripts/build-ios.sh "$tgt" "$demo" \
                || { echo "::warning::$demo ($tgt) failed to bundle — skipping"; continue; }
              APP_DIR="target/ios-bundle/${demo}-${tgt}.app"
              if [ -d "$APP_DIR" ]; then
                ( cd "$(dirname "$APP_DIR")" && zip -qr "$OLDPWD/mobile-apps/${demo}-${suffix}.app.zip" "$(basename "$APP_DIR")" )
                # When the device .app was code-signed (IOS_SIGNING_IDENTITY set by
                # the optional cert-import step), also emit an installable .ipa
                # (Payload/<App>.app, zipped). Unsigned builds ship only the .app.
                if [ "$tgt" = "aarch64-apple-ios" ] && [ -n "${IOS_SIGNING_IDENTITY:-}" ]; then
                  rm -rf "$RUNNER_TEMP/Payload" && mkdir -p "$RUNNER_TEMP/Payload"
                  cp -R "$APP_DIR" "$RUNNER_TEMP/Payload/"
                  ( cd "$RUNNER_TEMP" && zip -qr "$OLDPWD/mobile-apps/${demo}-ios.ipa" Payload )
                fi
              fi
            done
          done
          ls -l mobile-apps || true
      - name: Upload mobile demo apps
        uses: actions/upload-artifact@v7
        with:
          name: azul-mobile-apps-ios
          path: mobile-apps
          if-no-files-found: warn

  # Android demo APKs — only the demos set up as a NativeActivity cdylib
  # (crate-type=cdylib + ctor android entry: azul-maps, azul-paint). CLI-only:
  # cargo + NDK clang (linker via env, overriding the macOS path in
  # .cargo/config.toml) → aapt2/zipalign/apksigner (build-android.sh). Other
  # demos light up as they adopt the cdylib+ctor pattern (see guide/mobile.md).
  build_mobile_apps_android:
    name: Mobile demo apps (Android)
    timeout-minutes: 60
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    continue-on-error: true
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          targets: aarch64-linux-android
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install SDK build-tools + platform
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27
      - name: Cache codegen output
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate DLL API bindings
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all
      - name: Build cdylib demos as APKs (best-effort)
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          set +e
          NDKBIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          # API 24 (Android 7.0): build.rs links camera2ndk/mediandk; AAudio is dlopen'd.
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$NDKBIN/aarch64-linux-android24-clang"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_AR="$NDKBIN/llvm-ar"
          mkdir -p mobile-apps
          for demo in azul-maps azul-paint azul-widgets azul-self-test; do
            echo "=== Android APK: $demo ==="
            AZ_ANDROID_NO_DEPLOY=1 AZ_ANDROID_NO_JAVA=1 \
              bash scripts/build-android.sh aarch64-linux-android "$demo" "com.azul.${demo//-/_}" "$demo" \
              || { echo "::warning::$demo failed to build an APK — skipping"; continue; }
            APK="target/android-bundle/${demo}-arm64-v8a/aligned.apk"
            [ -f "$APK" ] && cp "$APK" "mobile-apps/${demo}-android.apk"
          done
          ls -l mobile-apps || true
      - name: Upload mobile demo apps (Android)
        uses: actions/upload-artifact@v7
        with:
          name: azul-mobile-apps-android
          path: mobile-apps
          if-no-files-found: warn

  build_linux_packages:
    name: Build Linux Packages (.deb/.rpm)
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    # cross_build_binaries is added so the per-arch .so artifacts (aarch64 +
    # the exotic ppc64/s390x/riscv64) are available to package. Its experimental
    # legs are job-level continue-on-error, so a failed exotic build still lets
    # `needs` succeed and never blocks this job.
    needs: [build_binaries, build_website_skeleton, cross_build_binaries]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download Linux binaries
        uses: actions/download-artifact@v8
        with:
          name: azul-linux-amd64
          path: artifacts

      # Extra per-arch binaries to package (each optional / continue-on-error):
      # aarch64 is solid; ppc64/s390x/riscv64 are experimental and may be absent.
      - name: Download Linux aarch64 binaries
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-linux-aarch64
          path: artifacts-arch/arm64

      - name: Download Linux ppc64 binaries (experimental)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-linux-ppc64
          path: artifacts-arch/ppc64

      - name: Download Linux s390x binaries (experimental)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-linux-s390x
          path: artifacts-arch/s390x

      - name: Download Linux riscv64 binaries (experimental)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-linux-riscv64
          path: artifacts-arch/riscv64

      - name: Download NFPM config
        uses: actions/download-artifact@v8
        with:
          name: nfpm-config
          path: nfpm-config

      - name: Install NFPM
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm tree

      - name: Debug - Tree after download
        run: |
          echo "=== Downloaded artifacts ==="
          tree artifacts/ nfpm-config/ 2>/dev/null || ls -laR artifacts/ nfpm-config/

      - name: Prepare package files
        run: |
          mkdir -p target/packages
          find artifacts -name "libazul.so" -exec cp {} target/packages/ \;
          find nfpm-config -name "azul.h" -exec cp {} target/packages/ \;
          find nfpm-config -name "nfpm.yaml" -exec cp {} target/packages/ \;
          cp LICENSE target/packages/
          ls -la target/packages/

      - name: Build .deb and .rpm packages
        run: |
          cd target/packages
          nfpm pkg --packager deb --target .
          nfpm pkg --packager rpm --target .

      - name: Debug - Tree before upload
        run: |
          echo "=== target/packages ==="
          tree target/packages/ 2>/dev/null || ls -la target/packages/

      - name: Upload .deb package
        uses: actions/upload-artifact@v7
        with:
          name: azul-linux-amd64-deb
          path: target/packages/*.deb
          retention-days: 30
          if-no-files-found: error

      - name: Upload .rpm package
        uses: actions/upload-artifact@v7
        with:
          name: azul-linux-amd64-rpm
          path: target/packages/*.rpm
          retention-days: 30
          if-no-files-found: error

      # -----------------------------------------------------------------------
      # Per-arch .deb/.rpm for every NON-amd64 binary that actually built.
      # Entirely non-blocking (continue-on-error). For each arch we stage its
      # libazul.so, write a per-arch copy of the generated nfpm.yaml with the
      # `arch:` line set to the nfpm/GOARCH value (nfpm passes unknown arches
      # through to deb/rpm unchanged; arm64/s390x/ppc64le it maps natively),
      # then run nfpm into a per-arch output dir. Missing binaries are skipped.
      #
      # NOTE: this rewrites the `arch:` line of the DOWNLOADED config artifact
      # at build time — it does NOT edit azul-doc's generated source. The
      # cleaner long-term fix is to have `azul-doc nfpm` emit
      # `arch: ${NFPM_ARCH:-amd64}` so the env var alone selects the arch; see
      # the report. Until then this sed transform is self-contained here.
      - name: Build per-arch .deb/.rpm (experimental, non-blocking)
        id: pkg_multiarch
        continue-on-error: true
        run: |
          set -u
          BASE_YAML="target/packages/nfpm.yaml"
          if [ ! -f "$BASE_YAML" ]; then
            echo "::warning::nfpm.yaml not found - skipping per-arch packaging"
            exit 0
          fi
          mkdir -p target/packages-arch
          # arch dir : nfpm arch value
          for entry in arm64:arm64 ppc64:ppc64 s390x:s390x riscv64:riscv64; do
            dir="${entry%%:*}"
            nfpm_arch="${entry##*:}"
            so="$(find "artifacts-arch/$dir" -name 'libazul.so' 2>/dev/null | head -n1)"
            if [ -z "$so" ]; then
              echo "  [skip] no libazul.so for $dir (build absent or failed)"
              continue
            fi
            echo "=== Packaging $dir (nfpm arch=$nfpm_arch) from $so ==="
            outdir="target/packages-arch/$dir"
            mkdir -p "$outdir"
            cp "$so" "$outdir/libazul.so"
            # Co-locate the other contents (azul.h, LICENSE) next to the .so so
            # the relative `src:` paths in nfpm.yaml resolve from $outdir.
            find nfpm-config -name 'azul.h' -exec cp {} "$outdir/" \; 2>/dev/null || true
            cp LICENSE "$outdir/" 2>/dev/null || true
            # Per-arch config: replace the (hardcoded) `arch:` line.
            sed "s/^arch:.*/arch: ${nfpm_arch}/" "$BASE_YAML" > "$outdir/nfpm.yaml"
            ( cd "$outdir" && \
              nfpm pkg --config nfpm.yaml --packager deb --target . && \
              nfpm pkg --config nfpm.yaml --packager rpm --target . ) \
              || echo "::warning::nfpm packaging failed for $dir"
            ls -la "$outdir"/*.deb "$outdir"/*.rpm 2>/dev/null || true
          done
          echo "=== per-arch packages ==="
          find target/packages-arch -name '*.deb' -o -name '*.rpm' 2>/dev/null || true

      - name: Upload per-arch aarch64 packages
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: azul-linux-aarch64-packages
          path: |
            target/packages-arch/arm64/*.deb
            target/packages-arch/arm64/*.rpm
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload per-arch ppc64 packages (experimental)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: azul-linux-ppc64-packages
          path: |
            target/packages-arch/ppc64/*.deb
            target/packages-arch/ppc64/*.rpm
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload per-arch s390x packages (experimental)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: azul-linux-s390x-packages
          path: |
            target/packages-arch/s390x/*.deb
            target/packages-arch/s390x/*.rpm
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload per-arch riscv64 packages (experimental)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: azul-linux-riscv64-packages
          path: |
            target/packages-arch/riscv64/*.deb
            target/packages-arch/riscv64/*.rpm
          retention-days: 30
          if-no-files-found: ignore

      # -----------------------------------------------------------------------
      # Self-hosted apt (dpkg) mirror -> deployed to https://azul.rs/ui/apt.
      #
      # MUST run AFTER the per-arch packaging step above so the arm64 .deb
      # lands in the pool too (it used to run before it, so the pool only ever
      # saw amd64). Layout:
      #   pool/main/*.deb
      #   dists/stable/main/binary-{amd64,arm64}/Packages(.gz)
      #   dists/stable/Release (unsigned by default)
      # UNSIGNED default means clients opt in explicitly:
      #   echo "deb [trusted=yes] https://azul.rs/ui/apt stable main" | \
      #     sudo tee /etc/apt/sources.list.d/azul.list
      #   sudo apt update && sudo apt install azul
      # When the AZUL_APT_GPG_KEY secret (base64 `gpg --export-secret-keys`) is
      # present the Release is also signed (Release.gpg + InRelease) and the
      # public key exported as azul-archive-keyring.asc for signed-by= setups.
      - name: Assemble apt mirror (sign if AZUL_APT_GPG_KEY present)
        if: always()
        shell: bash
        env:
          AZUL_APT_GPG_KEY: ${{ secrets.AZUL_APT_GPG_KEY }}
        run: |
          set -e
          sudo apt-get update && sudo apt-get install -y dpkg-dev gnupg
          DIST=apt-repo/dists/stable
          POOL=apt-repo/pool/main
          mkdir -p "$POOL"
          find target/packages target/packages-arch -name '*.deb' -exec cp -n {} "$POOL/" \; 2>/dev/null || true
          if [ -z "$(ls -A "$POOL" 2>/dev/null)" ]; then
            echo "::warning::no .deb packages present — skipping apt mirror assembly"
            exit 0
          fi
          echo "pool contents:"; ls -la "$POOL"
          # Per-arch Packages indices. dpkg-scanpackages --arch selects that
          # arch (+ Architecture: all); an arch with no matching .deb yields an
          # empty-but-valid Packages file, which apt accepts, so a missing
          # arm64 build degrades gracefully instead of 404ing apt update.
          for arch in amd64 arm64; do
            mkdir -p "$DIST/main/binary-$arch"
            # || true: an arch with zero matching debs must yield an EMPTY
            # (valid) Packages file, not kill the step.
            ( cd apt-repo && dpkg-scanpackages --arch "$arch" --multiversion pool/main > "dists/stable/main/binary-$arch/Packages" ) || true
            gzip -kf "$DIST/main/binary-$arch/Packages"
            echo "binary-$arch: $(grep -c '^Package:' "$DIST/main/binary-$arch/Packages" || true) package(s)"
          done
          {
            echo "Origin: Azul"; echo "Label: Azul"; echo "Suite: stable"
            echo "Codename: stable"; echo "Architectures: amd64 arm64"
            echo "Components: main"
            echo "Description: Azul GUI framework apt repository (azul.rs)"
            echo "Date: $(date -Ru)"
            echo "SHA256:"
            for f in main/binary-amd64/Packages main/binary-amd64/Packages.gz \
                     main/binary-arm64/Packages main/binary-arm64/Packages.gz; do
              echo " $(sha256sum "$DIST/$f" | cut -d' ' -f1) $(stat -c%s "$DIST/$f") $f"
            done
          } > "$DIST/Release"
          if [ -n "${AZUL_APT_GPG_KEY:-}" ]; then
            echo "::notice::AZUL_APT_GPG_KEY present — signing apt Release"
            echo "$AZUL_APT_GPG_KEY" | base64 -d | gpg --batch --import
            gpg --batch --yes --armor --detach-sign -o "$DIST/Release.gpg" "$DIST/Release"
            gpg --batch --yes --clearsign -o "$DIST/InRelease" "$DIST/Release"
            gpg --batch --armor --export > apt-repo/azul-archive-keyring.asc
          else
            echo "::notice::AZUL_APT_GPG_KEY not set — apt repo built UNSIGNED (use [trusted=yes] in the sources.list entry)."
          fi

      - name: Upload apt mirror
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: apt-repo
          path: apt-repo
          retention-days: 30
          if-no-files-found: warn

  build_website_skeleton:
    name: Build Website Skeleton
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Cache codegen output
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate codegen and NFPM config
        run: |
          if [ "${{ steps.codegen-cache.outputs.cache-hit }}" != "true" ]; then
            cargo run -r -p azul-doc codegen all
          fi
          cargo run -r -p azul-doc nfpm

      - name: Create placeholder binaries
        run: |
          # Create placeholder files where real binaries will be inserted later
          mkdir -p doc/target/deploy/release/0.2.0
          touch doc/target/deploy/release/0.2.0/libazul.so
          touch doc/target/deploy/release/0.2.0/libazul.linux.a
          touch doc/target/deploy/release/0.2.0/azul.cpython.so
          touch doc/target/deploy/release/0.2.0/libazul.dylib
          touch doc/target/deploy/release/0.2.0/libazul.macos.a
          touch doc/target/deploy/release/0.2.0/azul.macos.so
          touch doc/target/deploy/release/0.2.0/azul.dll
          touch doc/target/deploy/release/0.2.0/azul.lib
          touch doc/target/deploy/release/0.2.0/azul.dll.lib
          touch doc/target/deploy/release/0.2.0/azul.pyd
          # Placeholder reftest
          mkdir -p doc/target/reftest/reftest_img
          echo '[]' > doc/target/reftest/results.json
          echo '<html><body>Placeholder</body></html>' > doc/target/reftest/index.html

      - name: Verify guide is up to date
        run: cargo run --manifest-path doc/Cargo.toml --release -- autoreview autodoc-check --strict

      - name: Render guide screenshots
        run: cargo run --manifest-path doc/Cargo.toml --release -- autoreview autodoc-screenshots

      - name: Build website with placeholders
        run: cargo run --manifest-path doc/Cargo.toml --release -- deploy

      - name: Debug - Tree before upload
        run: |
          sudo apt-get update && sudo apt-get install -y tree
          tree doc/target/deploy/ 2>/dev/null | head -100 || ls -laR doc/target/deploy/ | head -100

      - name: Upload website skeleton
        uses: actions/upload-artifact@v7
        with:
          name: website-skeleton
          path: doc/target/deploy/
          retention-days: 30
          if-no-files-found: error

      - name: Upload NFPM config and headers
        uses: actions/upload-artifact@v7
        with:
          name: nfpm-config
          path: |
            target/packages/nfpm.yaml
            target/codegen/azul.h
          retention-days: 30
          if-no-files-found: error

  # =============================================================================
  # Deploy Job - Only runs on manual 'deploy' mode
  # Downloads all artifacts and merges them (NO compilation)
  # =============================================================================

  deploy_pages:
    name: Deploy to GitHub Pages
    # Runs on BOTH 'website' (site-only) and 'deploy' (site + registry publishes).
    if: github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    # GATING: e2e_native is in `needs` so a SHIPPED-binding AZ_E2E failure on
    # any OS (the matrix runs `--gate-shipped`) BLOCKS the deploy — we do not
    # publish a release whose shipped language bindings are red. SKIP (missing
    # toolchain / unrunnable-on-this-OS) never trips the gate, so per-OS gaps
    # don't block; only a real FAILS does.
    # e2e_headless is likewise BLOCKING: it runs every e2e/*.json engine
    # scenario (damage / stale-screen / window-size / resource-leak invariants)
    # headlessly, and a red invariant must not ship.
    # pypi/npm/rubygems/nuget/maven-central are in `needs` so their package
    # artifacts are ready when this job lays out the self-hosted mirrors under
    # azul.rs/ui/{pypi,npm,gems,nuget,maven}. All five (plus their shared
    # build_dll_linux producer) are continue-on-error, so a packager failure
    # can delay but never block the deploy; a missing artifact just makes the
    # corresponding channel skip gracefully.
    needs: [test_heavy, build_binaries, cross_build_binaries, build_rust9x, build_linux_packages, build_website_skeleton, coverage, build_demos, docs_pdf, build_mobile, build_mobile_apps, build_mobile_apps_android, e2e_native, e2e_headless, pypi, npm, rubygems, nuget, maven-central]
    runs-on: ubuntu-22.04
    # The top-level workflow permissions are `contents: read`; the GitHub Release
    # step (`gh release create`/`upload`) needs `contents: write` or it 403s.
    # Re-declare the pages/id-token perms this job also needs (a job-level
    # `permissions:` block REPLACES, it does not merge with, the top-level one).
    permissions:
      contents: write
      pages: write
      id-token: write
      actions: write   # dispatch the azul-web-base docker build after publishing
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # This job downloads EVERY build artifact (15+ arch binaries, 200MB+ static
      # libs, demos x3 OS, mobile libs, coverage HTML, docs PDF, apt mirror) onto
      # one runner and merges them into the Pages tree. That overflows the stock
      # ~14 GB runner disk (the merge step crashed with ENOSPC). Reclaim the
      # ~25-30 GB of preinstalled toolchains we don't need here FIRST.
      - name: Free disk space
        run: |
          echo "Before:"; df -h / | tail -1
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" 2>/dev/null || true
          sudo docker image prune --all --force 2>/dev/null || true
          echo "After:"; df -h / | tail -1

      - name: Checkout repository (for fallback assets)
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            examples/assets/screenshots
          sparse-checkout-cone-mode: false

      - name: Download website skeleton
        uses: actions/download-artifact@v8
        with:
          name: website-skeleton
          path: website

      - name: Download Linux binaries
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-linux-amd64
          path: artifacts-linux

      - name: Download macOS binaries
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-macos-amd64
          path: artifacts-macos

      - name: Download Windows binaries
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-windows-amd64
          path: artifacts-windows

      # Cross-built architecture artifacts
      - name: Download Linux i686 binaries
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-linux-i686
          path: artifacts-linux-i686

      - name: Download Linux aarch64 binaries
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-linux-aarch64
          path: artifacts-linux-aarch64

      - name: Download Linux armv7 binaries
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-linux-armv7
          path: artifacts-linux-armv7

      # Exotic Linux arches (experimental, may be absent if cross couldn't build)
      - name: Download Linux ppc64 binaries (experimental)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-linux-ppc64
          path: artifacts-linux-ppc64

      - name: Download Linux s390x binaries (experimental)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-linux-s390x
          path: artifacts-linux-s390x

      - name: Download Linux riscv64 binaries (experimental)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-linux-riscv64
          path: artifacts-linux-riscv64

      - name: Download Windows i686 binaries
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-windows-i686
          path: artifacts-windows-i686

      - name: Download macOS x86_64 binaries
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-macos-x86_64
          path: artifacts-macos-x86_64

      - name: Download rust9x binaries (experimental)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-windows-i686-rust9x
          path: artifacts-windows-rust9x

      - name: Download .deb package
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-linux-amd64-deb
          path: artifacts-deb

      - name: Download .rpm package
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-linux-amd64-rpm
          path: artifacts-rpm

      # Per-arch .deb/.rpm packages (each optional; aarch64 solid, rest experimental)
      - name: Download aarch64 packages
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-linux-aarch64-packages
          path: artifacts-pkg-aarch64

      - name: Download ppc64 packages (experimental)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-linux-ppc64-packages
          path: artifacts-pkg-ppc64

      - name: Download s390x packages (experimental)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-linux-s390x-packages
          path: artifacts-pkg-s390x

      - name: Download riscv64 packages (experimental)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-linux-riscv64-packages
          path: artifacts-pkg-riscv64

      - name: Download headers
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-headers
          path: artifacts-headers

      - name: Download reftest results
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: reftest-results
          path: artifacts-reftest

      - name: Download Linux screenshots
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: screenshots-ubuntu-22.04
          path: artifacts-screenshots-linux

      - name: Download macOS screenshots
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: screenshots-macos-14
          path: artifacts-screenshots-macos

      - name: Download Windows screenshots
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: screenshots-windows-2022
          path: artifacts-screenshots-windows

      # Demo "goal app" binaries (best-effort; each OS optional — the build_demos
      # job is non-blocking, so an OS whose demos all failed simply has no
      # artifact). Laid out flat into release/0.2.0/demos/ below.
      - name: Download Linux demo binaries
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-demos-ubuntu
          path: artifacts-demos-linux

      - name: Download macOS demo binaries
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-demos-macos
          path: artifacts-demos-macos

      - name: Download Windows demo binaries
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-demos-windows
          path: artifacts-demos-windows

      # Code-coverage HTML report (grcov) from the `coverage` job. Optional:
      # a missing artifact is a clean skip (the release page link just 404s).
      - name: Download coverage report
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: coverage-report
          path: artifacts-coverage

      - name: Download docs PDF
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-documentation-pdf
          path: artifacts-pdf

      - name: Download apt mirror
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: apt-repo
          path: artifacts-apt

      # Statistics / CI reports → release/{V}/statistics/ (Statistics section on
      # the release page). Each is best-effort: the producing job is NOT in this
      # job's needs[] (so an informational/gating stats job can never block the
      # deploy), and a missing report 404s on the page rather than failing here.
      - name: Download cargo-deny report
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: stats-cargo-deny
          path: artifacts-stats
      - name: Download cargo-geiger report
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: stats-cargo-geiger
          path: artifacts-stats
      - name: Download clippy report
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: stats-clippy
          path: artifacts-stats
      - name: Download sanitizers report
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: stats-sanitizers
          path: artifacts-stats
      # The E2E board is now produced per (OS, family): artifacts named
      # stats-language-board-<os>-<family>. Pull them all with one pattern
      # download (merge-multiple flattens them into one dir); the merge step
      # concatenates per OS into language-bindings-<os>.txt.
      - name: Download language boards (all families/OSes)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: stats-language-board-*
          merge-multiple: true
          path: artifacts-stats-board
      - name: Download dependency trees (Linux)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: dependency-trees-ubuntu-22.04
          path: artifacts-deptree-ubuntu
      - name: Download dependency trees (macOS)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: dependency-trees-macos-14
          path: artifacts-deptree-macos
      - name: Download dependency trees (Windows)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: dependency-trees-windows-2022
          path: artifacts-deptree-windows

      # Package artifacts for the self-hosted registry mirrors (azul.rs/ui/maven,
      # /ui/azul, /ui/npm, /ui/nuget, /ui/gems, /ui/rpm). Produced by the
      # packager jobs in BOTH run_mode==deploy and run_mode==website (they are
      # in this job's needs), but still best-effort: a failed/missing one just
      # skips that registry.
      - name: Download maven jar
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: maven-jar
          path: artifacts-registry/maven-jar
      - name: Download pypi dist
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: pypi-dist
          path: artifacts-registry/pypi-dist
      - name: Download npm package
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: npm-package
          path: artifacts-registry/npm-package
      - name: Download nuget package
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: nuget-package
          path: artifacts-registry/nuget-package
      - name: Download ruby gem
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: ruby-gem
          path: artifacts-registry/ruby-gem
      - name: Download alpine apk package
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-linux-amd64-apk
          path: artifacts-registry/artifacts-apk
      - name: Download archlinux package
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-linux-amd64-arch
          path: artifacts-registry/artifacts-arch

      - name: Download mobile libazul
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: azul-mobile-android-*
          path: artifacts-mobile

      - name: Download mobile libazul (iOS)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: azul-mobile-ios-*
          path: artifacts-mobile

      - name: Download mobile demo apps
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-mobile-apps-ios
          path: artifacts-mobile-apps

      - name: Download mobile demo apps (Android)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: azul-mobile-apps-android
          path: artifacts-mobile-apps

      - name: Debug - Tree after download
        run: |
          sudo apt-get update && sudo apt-get install -y tree
          echo "=== Website skeleton ==="
          tree website/ 2>/dev/null | head -50 || ls -laR website/ | head -50
          echo ""
          echo "=== Artifacts ==="
          tree artifacts-* 2>/dev/null || ls -laR artifacts-* 2>/dev/null || true

      - name: Merge real artifacts into website
        run: |
          RELEASE_DIR="website/ui/release/0.2.0"
          mkdir -p "$RELEASE_DIR"

          # Guide + API reference PDF (rendered by the docs_pdf job). The release
          # page links it as release/0.2.0/guide.pdf.
          find artifacts-pdf -name "azul-documentation.pdf" -exec cp {} "$RELEASE_DIR/guide.pdf" \; 2>/dev/null || true

          # NOTE: the self-hosted package channels (brew tap, apt repo, registry
          # mirrors under azul.rs/ui/...) are built in the dedicated step BELOW
          # this merge — they sha256 the real release files this step stages.

          # Prebuilt drop-in mobile libazul + link stubs → release/0.2.0/mobile/<label>/
          # (label = android-arm64 / android-x64 / ios-arm64 / ios-sim-arm64).
          for d in artifacts-mobile/azul-mobile-*; do
            [ -d "$d" ] || continue
            label="${d##*azul-mobile-}"
            mkdir -p "$RELEASE_DIR/mobile/$label"
            cp -r "$d/." "$RELEASE_DIR/mobile/$label/" 2>/dev/null || true
          done

          # Installable per-demo mobile apps (iOS .app zips) → release/0.2.0/mobile-apps/
          # (Pages-hosted; the demo grouping links them per binary).
          if [ -d artifacts-mobile-apps ] && [ -n "$(ls -A artifacts-mobile-apps 2>/dev/null)" ]; then
            mkdir -p "$RELEASE_DIR/mobile-apps"
            cp artifacts-mobile-apps/*.zip artifacts-mobile-apps/*.apk "$RELEASE_DIR/mobile-apps/" 2>/dev/null || true
          fi

          # Replace placeholder binaries with real ones
          # Linux
          find artifacts-linux -name "libazul.so" -exec cp {} "$RELEASE_DIR/" \; 2>/dev/null || true
          find artifacts-linux -name "libazuldbg.so" -exec cp {} "$RELEASE_DIR/" \; 2>/dev/null || true
          find artifacts-linux -name "libazul.a" -exec cp {} "$RELEASE_DIR/libazul.linux.a" \; 2>/dev/null || true
          find artifacts-linux -name "azul.so" -exec cp {} "$RELEASE_DIR/azul.cpython.so" \; 2>/dev/null || true

          # macOS
          find artifacts-macos -name "libazul.dylib" -exec cp {} "$RELEASE_DIR/" \; 2>/dev/null || true
          find artifacts-macos -name "libazuldbg.dylib" -exec cp {} "$RELEASE_DIR/" \; 2>/dev/null || true
          find artifacts-macos -name "libazul.a" -exec cp {} "$RELEASE_DIR/libazul.macos.a" \; 2>/dev/null || true
          find artifacts-macos -name "azul.so" -exec cp {} "$RELEASE_DIR/azul.so" \; 2>/dev/null || true

          # Windows
          find artifacts-windows -name "azul.dll" ! -name "*.lib" -exec cp {} "$RELEASE_DIR/" \; 2>/dev/null || true
          find artifacts-windows -name "azuldbg.dll" -exec cp {} "$RELEASE_DIR/" \; 2>/dev/null || true
          find artifacts-windows -name "azul.lib" ! -name "azul.dll.lib" -exec cp {} "$RELEASE_DIR/" \; 2>/dev/null || true
          find artifacts-windows -name "azul.dll.lib" -exec cp {} "$RELEASE_DIR/" \; 2>/dev/null || true
          find artifacts-windows -name "azul.pyd" -exec cp {} "$RELEASE_DIR/" \; 2>/dev/null || true
          
          # Cross-built architectures
          # Linux i686 (32-bit x86)
          find artifacts-linux-i686 -name "libazul.so" -exec cp {} "$RELEASE_DIR/libazul.linux-i686.so" \; 2>/dev/null || true
          find artifacts-linux-i686 -name "libazul.a" -exec cp {} "$RELEASE_DIR/libazul.linux-i686.a" \; 2>/dev/null || true
          # Linux aarch64 (ARM64)
          find artifacts-linux-aarch64 -name "libazul.so" -exec cp {} "$RELEASE_DIR/libazul.linux-aarch64.so" \; 2>/dev/null || true
          find artifacts-linux-aarch64 -name "libazul.a" -exec cp {} "$RELEASE_DIR/libazul.linux-aarch64.a" \; 2>/dev/null || true
          # Linux armv7 (Raspberry Pi)
          find artifacts-linux-armv7 -name "libazul.so" -exec cp {} "$RELEASE_DIR/libazul.linux-armv7.so" \; 2>/dev/null || true
          find artifacts-linux-armv7 -name "libazul.a" -exec cp {} "$RELEASE_DIR/libazul.linux-armv7.a" \; 2>/dev/null || true
          # Linux ppc64 (PowerPC64, big-endian) — experimental, may be absent
          find artifacts-linux-ppc64 -name "libazul.so" -exec cp {} "$RELEASE_DIR/libazul.linux-ppc64.so" \; 2>/dev/null || true
          find artifacts-linux-ppc64 -name "libazul.a" -exec cp {} "$RELEASE_DIR/libazul.linux-ppc64.a" \; 2>/dev/null || true
          # Linux s390x (IBM Z, big-endian) — experimental, may be absent
          find artifacts-linux-s390x -name "libazul.so" -exec cp {} "$RELEASE_DIR/libazul.linux-s390x.so" \; 2>/dev/null || true
          find artifacts-linux-s390x -name "libazul.a" -exec cp {} "$RELEASE_DIR/libazul.linux-s390x.a" \; 2>/dev/null || true
          # Linux riscv64 (RISC-V 64) — experimental, may be absent
          find artifacts-linux-riscv64 -name "libazul.so" -exec cp {} "$RELEASE_DIR/libazul.linux-riscv64.so" \; 2>/dev/null || true
          find artifacts-linux-riscv64 -name "libazul.a" -exec cp {} "$RELEASE_DIR/libazul.linux-riscv64.a" \; 2>/dev/null || true
          # Windows i686 (32-bit, Win7+/XP compat)
          find artifacts-windows-i686 -name "azul.dll" -exec cp {} "$RELEASE_DIR/azul.i686.dll" \; 2>/dev/null || true
          find artifacts-windows-i686 -name "azul.lib" ! -name "azul.dll.lib" -exec cp {} "$RELEASE_DIR/azul.i686.lib" \; 2>/dev/null || true
          # macOS x86_64 (Intel)
          find artifacts-macos-x86_64 -name "libazul.dylib" -exec cp {} "$RELEASE_DIR/libazul.x86_64.dylib" \; 2>/dev/null || true
          find artifacts-macos-x86_64 -name "libazul.a" -exec cp {} "$RELEASE_DIR/libazul.macos-x86_64.a" \; 2>/dev/null || true

          # rust9x (Win98/XP experimental)
          find artifacts-windows-rust9x -name "azul.dll" -exec cp {} "$RELEASE_DIR/azul.rust9x.dll" \; 2>/dev/null || true
          find artifacts-windows-rust9x -name "azul.lib" -exec cp {} "$RELEASE_DIR/azul.rust9x.lib" \; 2>/dev/null || true

          # Demo "goal app" binaries → release/0.2.0/demos/. Already named
          # <demo>-<os>[.exe] by the build_demos job; each OS optional (a missing
          # artifact dir is a clean skip). Served at /release/0.2.0/demos/<file>.
          mkdir -p "$RELEASE_DIR/demos"
          for demodir in artifacts-demos-linux artifacts-demos-macos artifacts-demos-windows; do
            if [ -d "$demodir" ]; then
              find "$demodir" -type f -exec cp {} "$RELEASE_DIR/demos/" \; 2>/dev/null || true
            fi
          done
          echo "=== Demo binaries ==="
          ls -la "$RELEASE_DIR/demos/" 2>/dev/null || echo "  (no demo binaries shipped)"

          # Coverage HTML report (grcov) → release/0.2.0/coverage/. The release
          # page links coverage/index.html. Also stash the text summaries next
          # to it. Optional: a missing artifact-coverage dir is a clean skip.
          if [ -d artifacts-coverage/coverage ]; then
            rm -rf "$RELEASE_DIR/coverage"
            cp -r artifacts-coverage/coverage "$RELEASE_DIR/coverage"
            cp artifacts-coverage/coverage.txt "$RELEASE_DIR/coverage/" 2>/dev/null || true
            cp artifacts-coverage/coverage_analysis.txt "$RELEASE_DIR/coverage/" 2>/dev/null || true
            echo "  [OK] Copied coverage HTML report"
          else
            echo "  (no coverage report shipped)"
          fi

          # Statistics / CI reports → release/{V}/statistics/ (Statistics section
          # on the release page). Each input is optional — a missing report just
          # 404s on the page. Mirrors the download steps added in deploy_pages.
          STATS_DIR="$RELEASE_DIR/statistics"
          mkdir -p "$STATS_DIR"
          # Flat text reports (cargo-deny / cargo-geiger / clippy / sanitizers).
          cp artifacts-stats/cargo-deny.txt    "$STATS_DIR/" 2>/dev/null || true
          cp artifacts-stats/cargo-geiger.txt  "$STATS_DIR/" 2>/dev/null || true
          cp artifacts-stats/clippy.txt        "$STATS_DIR/" 2>/dev/null || true
          cp artifacts-stats/sanitizers.txt    "$STATS_DIR/" 2>/dev/null || true
          # Per-OS language binding boards: concatenate the per-family files
          # (language-bindings-<os>-<family>.txt) into one language-bindings-<os>.txt
          # per OS, which is what the release page links.
          for osslug in ubuntu macos windows; do
            if ls artifacts-stats-board/language-bindings-"$osslug"-*.txt >/dev/null 2>&1; then
              { for b in artifacts-stats-board/language-bindings-"$osslug"-*.txt; do
                  echo "===== $(basename "$b") ====="; cat "$b"; echo;
                done; } > "$STATS_DIR/language-bindings-$osslug.txt"
            fi
          done
          # Per-OS dependency trees: concatenate the per-member *.tree.txt the
          # dep_tree job uploaded into one dependency-tree-<os>.txt.
          for osslug in ubuntu macos windows; do
            d="artifacts-deptree-$osslug"
            if [ -d "$d" ] && ls "$d"/*.tree.txt >/dev/null 2>&1; then
              { for t in "$d"/*.tree.txt; do echo "===== $(basename "$t") ====="; cat "$t"; echo; done; } \
                > "$STATS_DIR/dependency-tree-$osslug.txt"
            fi
          done
          # Dependency justifications: render the committed TOML to a simple HTML
          # page (escaped, in a <pre>) so the release page can link it.
          if [ -f scripts/dependency-justifications.toml ]; then
            {
              echo '<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">'
              echo '<title>Azul dependency justifications</title>'
              echo '<style>body{font-family:monospace;max-width:900px;margin:2em auto;padding:0 1em;}'
              echo 'h1{font-family:Georgia,serif;}pre{white-space:pre-wrap;word-wrap:break-word;}</style>'
              echo '</head><body><h1>Dependency justifications</h1>'
              echo '<p>Why each crate is present in the dependency tree (the supply-chain gate'
              echo 'requires a one-line justification for every direct and transitive dependency).</p><pre>'
              sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g' scripts/dependency-justifications.toml
              echo '</pre></body></html>'
            } > "$STATS_DIR/dependency-justifications.html"
          fi
          echo "=== Statistics ==="
          ls -la "$STATS_DIR/" 2>/dev/null || echo "  (no statistics shipped)"

          # Headers
          find artifacts-headers -name "*.h" -exec cp {} "$RELEASE_DIR/" \; 2>/dev/null || true
          find artifacts-headers -name "*.hpp" -exec cp {} "$RELEASE_DIR/" \; 2>/dev/null || true
          
          # Packages
          find artifacts-deb -name "*.deb" -exec cp {} "$RELEASE_DIR/" \; 2>/dev/null || true
          find artifacts-rpm -name "*.rpm" -exec cp {} "$RELEASE_DIR/" \; 2>/dev/null || true
          # Per-arch packages (nfpm already encodes the arch in the filename,
          # e.g. azul_<ver>_arm64.deb / azul-<ver>.riscv64.rpm); each optional.
          for pkgdir in artifacts-pkg-aarch64 artifacts-pkg-ppc64 artifacts-pkg-s390x artifacts-pkg-riscv64; do
            find "$pkgdir" -name "*.deb" -exec cp {} "$RELEASE_DIR/" \; 2>/dev/null || true
            find "$pkgdir" -name "*.rpm" -exec cp {} "$RELEASE_DIR/" \; 2>/dev/null || true
          done
          
          # Replace placeholder reftest with real results. The sidebar links to
          # /ui/reftest (azul.rs/ui/reftest); deploy there too, not just the legacy
          # /reftest path, or the link shows the placeholder.
          if [ -d artifacts-reftest ]; then
            rm -rf website/reftest website/ui/reftest 2>/dev/null || true
            mkdir -p website/reftest website/ui/reftest
            cp -r artifacts-reftest/* website/reftest/
            cp -r artifacts-reftest/* website/ui/reftest/
            # Also copy index.html to reftest.html in website root
            if [ -f website/reftest/index.html ]; then
              cp website/reftest/index.html website/reftest.html
              # /ui/reftest (no trailing slash, the sidebar's link) resolves to
              # website/ui/reftest.html — a skeleton placeholder that shadows the
              # ui/reftest/ dir. Overwrite it (and its images) with the real results.
              cp website/ui/reftest/index.html website/ui/reftest.html
              [ -d website/ui/reftest/reftest_img ] && cp -r website/ui/reftest/reftest_img website/ui/reftest_img
              echo "  [OK] Created reftest.html + ui/reftest.html from reftest results"
            fi
            # Copy reftest_img to website root so ./reftest_img/ paths work from reftest.html
            if [ -d website/reftest/reftest_img ]; then
              cp -r website/reftest/reftest_img website/reftest_img
              echo "  [OK] Copied reftest_img to website root"
            fi
          fi
          
          # Copy screenshots to website images directory
          # Screenshots are named like "hello-world-linux.png" and need to be renamed to "hello-world.linux.png"
          mkdir -p website/images
          
          # First, copy CI-generated screenshots
          for screenshot_dir in artifacts-screenshots-linux artifacts-screenshots-macos artifacts-screenshots-windows; do
            if [ -d "$screenshot_dir" ]; then
              for png in "$screenshot_dir"/*.png; do
                if [ -f "$png" ]; then
                  filename=$(basename "$png")
                  # Extract OS from directory name
                  case "$screenshot_dir" in
                    *linux*) os="linux" ;;
                    *macos*) os="mac" ;;
                    *windows*) os="windows" ;;
                  esac
                  # Convert "hello-world-linux.png" to "hello-world.linux.png"
                  # The filename already has the OS in it, so we just rename
                  newname=$(echo "$filename" | sed "s/-${os}/.${os}/")
                  cp "$png" "website/images/$newname"
                  echo "  [OK] Copied screenshot: $newname"
                fi
              done
            fi
          done
          
          # Then, copy fallback screenshots from examples/assets/screenshots for any missing images
          echo "Checking for missing screenshots, using fallbacks from examples/assets/screenshots..."
          for example in hello-world widgets opengl infinity async xhtml calc; do
            for os in linux mac windows; do
              target="website/images/${example}.${os}.png"
              if [ ! -f "$target" ]; then
                # Try to find a fallback
                fallback="examples/assets/screenshots/${example}.${os}.png"
                if [ -f "$fallback" ]; then
                  cp "$fallback" "$target"
                  echo "  [FALLBACK] Copied $fallback -> $target"
                else
                  # Try mac screenshot as fallback for all platforms
                  mac_fallback="examples/assets/screenshots/${example}.mac.png"
                  if [ -f "$mac_fallback" ]; then
                    cp "$mac_fallback" "$target"
                    echo "  [FALLBACK] Copied $mac_fallback -> $target (mac as fallback)"
                  else
                    echo "  [MISSING] No screenshot for ${example}.${os}.png"
                  fi
                fi
              fi
            done
          done
          
          ls -la website/images/ || echo "No images directory"
          
          # Update file sizes in release HTML
          # The HTML contains placeholder sizes like "86B" that need to be replaced with real sizes
          # Format in HTML: "filename - 86B)" needs to become "filename - 80.5MB)"
          if [ -d "$RELEASE_DIR" ]; then
            echo "Updating file sizes in release HTML..."
            for file in "$RELEASE_DIR"/*; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                # Get size in bytes and format it
                size_bytes=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null || echo "0")
                if [ "$size_bytes" -lt 1024 ]; then
                  size="${size_bytes}B"
                elif [ "$size_bytes" -lt 1048576 ]; then
                  size="$(echo "scale=1; $size_bytes / 1024" | bc)KB"
                else
                  size="$(echo "scale=1; $size_bytes / 1048576" | bc)MB"
                fi
                echo "  $filename: $size"
                # Find and update the size in release HTML files
                # Match pattern: "filename - XXXB)" or "filename - X.XKB)" etc.
                for html in website/ui/release/*.html; do
                  if [ -f "$html" ]; then
                    # Use sed to replace any size pattern for this filename
                    sed -i "s|${filename} - [0-9.]*[BKMG]B*)|${filename} - ${size})|g" "$html" 2>/dev/null || \
                    sed -i '' "s|${filename} - [0-9.]*[BKMG]B*)|${filename} - ${size})|g" "$html" 2>/dev/null || true
                    # Also replace "not available"
                    sed -i "s|${filename} - not available|${filename} - ${size}|g" "$html" 2>/dev/null || \
                    sed -i '' "s|${filename} - not available|${filename} - ${size}|g" "$html" 2>/dev/null || true
                  fi
                done
              fi
            done
          fi
          
          echo "=== Final release artifacts ==="
          ls -la "$RELEASE_DIR/"

      # -----------------------------------------------------------------------
      # SELF-HOSTED PACKAGE CHANNELS — served from the Pages site so installs
      # never depend on external registries (no PyPI/npm/NuGet/Maven Central/
      # homebrew-core accounts). IN ADDITION to the manual download links.
      #
      #   Homebrew  azul.rs/ui/homebrew-azul.git  real bare git repo (dumb HTTP):
      #             brew tap fschutt/azul https://azul.rs/ui/homebrew-azul.git
      #             brew install fschutt/azul/azul
      #   apt       azul.rs/ui/apt   pool/ + dists/stable (amd64+arm64), unsigned:
      #             deb [trusted=yes] https://azul.rs/ui/apt stable main
      #   PyPI      azul.rs/ui              PEP 503 index; wheels under /ui/azul/
      #   Maven     azul.rs/ui/maven        maven2 layout (rs.azul:azul:<V>)
      #   npm       azul.rs/ui/npm/azul-<V>.tgz          stable tarball URL
      #   NuGet     azul.rs/ui/nuget        static v3 feed (+ choco libazul)
      #   RubyGems  azul.rs/ui/gems         hosted .gem (+ legacy index)
      #   dnf/arch/apk  azul.rs/ui/{rpm,arch,alpine}
      #
      # MUST run AFTER "Merge real artifacts" (the brew formula embeds sha256s
      # of the staged libazul.dylib / libazul.x86_64.dylib / azul.h and the
      # choco package the staged azul.dll) and BEFORE upload-pages-artifact.
      # Every channel skips gracefully when its input artifact is missing.
      - name: Build self-hosted package channels (brew tap, apt, registry mirrors)
        run: |
          set -u
          # apt mirror: assembled (and optionally signed) in build_linux_packages,
          # downloaded above into artifacts-apt. /ui/apt is the documented
          # endpoint; the legacy top-level /apt copy is kept for old sources.
          if [ -d artifacts-apt ] && [ -n "$(ls -A artifacts-apt 2>/dev/null)" ]; then
            mkdir -p website/apt website/ui/apt
            cp -r artifacts-apt/. website/apt/
            cp -r artifacts-apt/. website/ui/apt/
            echo "[live] apt mirror -> /ui/apt (and legacy /apt)"
          else
            echo "[skip] apt mirror (no apt-repo artifact in this run)"
          fi

          # Registry mirrors + Homebrew tap. The script reads package inputs
          # from artifacts-registry/* and the staged release files from
          # website/ui/release/<V>/; each missing input skips its channel.
          sudo apt-get install -y createrepo-c >/dev/null 2>&1 || true
          mkdir -p artifacts-registry
          cp -r artifacts-rpm artifacts-registry/artifacts-rpm 2>/dev/null || true
          bash scripts/build_registry_mirrors.sh website "${AZUL_VERSION}" artifacts-registry || true

          echo "=== self-hosted channel summary ==="
          for d in website/ui/homebrew-azul.git website/ui/apt website/ui/azul \
                   website/ui/maven website/ui/npm website/ui/nuget \
                   website/ui/gems website/ui/rpm website/ui/arch website/ui/alpine; do
            if [ -d "$d" ]; then echo "[live] ${d#website/}"; else echo "[skip] ${d#website/}"; fi
          done

      # Fold the real shared libraries + the compiled demo binaries into
      # examples.zip so the one download demonstrates the "one dll, many small
      # binaries" model: a single libazul + a fistful of tiny app executables +
      # every language's source. Runs AFTER the merge (libs/demos present) and
      # BEFORE the large-asset trim (which moves demos to the GitHub Release).
      # Best-effort + non-fatal: a missing lib/demo just isn't bundled.
      - name: Bundle dll + demos into examples.zip
        run: |
          set -u
          REL="website/ui/release/0.2.0"
          ZIP="$REL/examples.zip"
          if [ ! -f "$ZIP" ]; then echo "no $ZIP — skipping"; exit 0; fi
          ( cd "$REL" && \
            for lib in libazul.so libazul.dylib azul.dll; do
              [ -s "$lib" ] && zip -gj examples.zip "$lib" || true
            done
            if [ -d demos ]; then zip -gr examples.zip demos || true; fi )
          echo "examples.zip after bundling:"; du -h "$ZIP" || true

      - name: Debug - Final website tree
        run: tree website/ 2>/dev/null | head -100 || ls -laR website/ | head -100

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Host LARGE assets on the GitHub Release + trim them from the Pages artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REL="website/ui/release/${AZUL_VERSION}"
          [ -d "$REL" ] || { echo "no $REL — skipping"; exit 0; }
          echo "release dir before:"; du -sh "$REL" || true

          # The static .a libs are 200 MB+ each and the demo binaries are large;
          # together they blow past GitHub Pages' 1 GB artifact limit (and a
          # future Cloudflare Pages target caps single files at 25 MiB). Host the
          # LARGE assets on the GitHub Release (≤2 GB/asset) instead, then drop
          # them from the Pages artifact. deploy.rs links these to
          # github.com/fschutt/azul/releases/download/<ver>/<file> (is_large()).
          # SMALL assets (~16 MB .so/.dll/.dylib, headers, bindings, examples.zip,
          # api.json, licenses, PDF) stay on Pages.

          # Collect every LARGE file: each *.a, the demo binaries, the .deb/.rpm
          # packages, plus any built language packages staged into the release dir
          # (whl/nupkg/gem/jar/tgz). GitHub Release assets are flat, so the demo
          # binaries upload as their bare basenames (matching deploy.rs, which
          # strips the demos/ prefix from the link).
          LARGE=()
          while IFS= read -r f; do LARGE+=("$f"); done < <(
            {
              find "$REL" -maxdepth 1 -type f \( -name '*.a' -o -name '*.deb' -o -name '*.rpm' \
                -o -name '*.whl' -o -name '*.nupkg' -o -name '*.gem' -o -name '*.jar' -o -name '*.tgz' \)
              [ -d "$REL/demos" ] && find "$REL/demos" -type f
            } 2>/dev/null | sort -u
          )

          if [ "${#LARGE[@]}" -eq 0 ]; then
            echo "no LARGE assets present — nothing to upload or trim"
          else
            echo "=== LARGE assets (-> GitHub Release ${AZUL_VERSION}) ==="
            printf '  %s\n' "${LARGE[@]}"

            # Create the release if it doesn't exist yet (idempotent: a 2nd deploy
            # of the same version just reuses it), then upload/clobber the assets.
            gh release create "${AZUL_VERSION}" \
              --title "Azul ${AZUL_VERSION}" \
              --notes "Azul ${AZUL_VERSION} release. Binaries attached; docs + small assets at https://azul.rs/ui/release/${AZUL_VERSION}/." \
              2>/dev/null || true
            # tar.gz the uncompressed big binaries (.a static libs + demo
            # executables) before upload — they compress ~2-3x. Already-compressed
            # packages (.deb/.rpm/.whl/.nupkg/.gem/.jar/.tgz) upload raw so users
            # install them directly. deploy.rs links the .tar.gz for the former
            # (asset_url -> <basename>.tar.gz when is_tarred()).
            UPLOAD=()
            for f in "${LARGE[@]}"; do
              case "$f" in
                */demos/*-macos)
                  # macOS demo: bundle a preconfigured launcher next to the
                  # binary so a non-technical user can just double-click it.
                  # `.command` (not `.sh`) is what Finder runs in Terminal on
                  # double-click; it clears the Gatekeeper download quarantine
                  # on the adjacent ad-hoc-signed binary and launches it.
                  bn="$(basename "$f")"; dir="$(dirname "$f")"
                  printf '%s\n' \
                    '#!/bin/bash' \
                    "# Double-click me — I live next to $bn. I clear the macOS" \
                    '# download quarantine on that azul demo, then launch it.' \
                    'cd "$(dirname "$0")" || exit 1' \
                    "xattr -dr com.apple.quarantine \"./$bn\" 2>/dev/null || true" \
                    "chmod +x \"./$bn\" 2>/dev/null || true" \
                    "echo \"Unquarantined ./$bn — launching…\"" \
                    "exec \"./$bn\"" \
                    > "$dir/unquarantine.command"
                  chmod +x "$dir/unquarantine.command"
                  tar -czf "$f.tar.gz" -C "$dir" "$bn" unquarantine.command
                  rm -f "$dir/unquarantine.command"
                  UPLOAD+=("$f.tar.gz")
                  echo "tar.gz $bn (+ unquarantine.command)"
                  ;;
                *.a|*/demos/*)
                  tar -czf "$f.tar.gz" -C "$(dirname "$f")" "$(basename "$f")"
                  UPLOAD+=("$f.tar.gz")
                  echo "tar.gz $(basename "$f") -> $(du -h "$f.tar.gz" | cut -f1)"
                  ;;
                *) UPLOAD+=("$f");;
              esac
            done
            gh release upload "${AZUL_VERSION}" "${UPLOAD[@]}" --clobber

            # Drop the LARGE originals (+ any .tar.gz) from the Pages artifact so
            # it stays < 1 GB.
            echo "=== trimming LARGE assets from the Pages artifact ==="
            for f in "${LARGE[@]}"; do rm -f "$f" "$f.tar.gz" && echo "removed $f"; done
            rmdir "$REL/demos" 2>/dev/null || true
          fi

          # Mobile static .a libs live at mobile/<label>/libazul.a (depth 3, so
          # the maxdepth-1 collector above misses them) and were the ~480 MB that
          # pushed the Pages artifact over its 1 GB limit. Offload them to the
          # Release too, named per-label (the Release is FLAT, so all four bare
          # "libazul.a" would collide) as libazul-<label>.a.tar.gz, then trim.
          # The mobile/<label>/ dir keeps its .so/.dylib + link stubs on Pages.
          # deploy.rs links these via the mobile section (is_tarred mobile .a).
          for adir in "$REL"/mobile/*/; do
            a="$adir/libazul.a"
            [ -f "$a" ] || continue
            label="$(basename "$adir")"
            tgz="$REL/libazul-${label}.a.tar.gz"
            tar -czf "$tgz" -C "$adir" libazul.a
            echo "mobile .a $label -> $(du -h "$tgz" | cut -f1)"
            gh release upload "${AZUL_VERSION}" "$tgz" --clobber || true
            rm -f "$a" "$tgz"
          done

          echo "release dir after:"; du -sh "$REL" || true
          echo "total website size:"; du -sh website || true

      - name: Repack the Pages artifact as plain files (Pages forbids symlinks + hard links)
        run: |
          set -euo pipefail
          echo "::group::symlinks + hard-linked files before repack"
          find website -type l -print 2>/dev/null || true
          find website -type f -links +1 -print 2>/dev/null | head -20 || true
          echo "::endgroup::"
          # GitHub Pages rejects an artifact containing ANY symlink OR hard link.
          # The previous symlink-only strip cleared symlinks but the deploy still
          # failed, so a merged CI artifact also ships hard links. Drop broken
          # symlinks (a dereferencing copy chokes on them), then deep-copy with
          # -L (dereference symlinks → real files) using a plain cp (NO
          # --preserve=links, so hard-linked files become independent regular
          # files). Result: website/ is plain files + dirs only.
          find website -type l | while IFS= read -r l; do [ -e "$l" ] || { echo "drop broken symlink: $l"; rm -f "$l"; }; done
          cp -rL website website.__pages_clean__
          rm -rf website
          mv website.__pages_clean__ website
          echo "symlinks remaining:   $(find website -type l 2>/dev/null | wc -l | tr -d ' ')"
          echo "hard-linked remaining: $(find website -type f -links +1 2>/dev/null | wc -l | tr -d ' ')"
          echo "artifact size:"; du -sh website 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'website'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      # Rebuild + publish the pre-lifted web Docker base image on EVERY website
      # publish (not just release tags) so ghcr.io/…/azul-web-base tracks the
      # site. dockery.yml builds libazul from this same ref and warms the lift
      # cache via AZ_BACKEND=web-prelift. Best-effort: a docker failure must not
      # fail the just-completed site deploy.
      - name: Trigger azul-web-base docker build
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run dockery.yml \
            --ref "${{ github.ref_name }}" \
            -f ref="${{ github.ref_name }}" \
            -f push_image=true \
            && echo "dispatched dockery.yml on ${{ github.ref_name }}" \
            || echo "::warning::could not dispatch dockery.yml (non-fatal)"

  # ───────────────────────────── Quality & Security ─────────────────────────
  # Merged in from the former quality.yml so there is ONE push-triggered
  # workflow. Every job is continue-on-error (informational, never blocks) and
  # writes its output to the GitHub run **Summary** via $GITHUB_STEP_SUMMARY —
  # open any run to see cargo-deny, cargo-geiger, clippy, sanitizers and the
  # dependency tree at a glance, next to the coverage report.

  supply_chain:
    name: Supply chain (cargo-deny)
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked || cargo install cargo-deny
      - name: cargo-deny + summary
        shell: bash
        run: |
          # Plain-text report for the release page Statistics section, plus the
          # rich <details> summary for the run page.
          mkdir -p stats
          {
            echo '# Supply chain — cargo-deny'
            echo ''
            for chk in advisories bans licenses sources; do
              echo "=== cargo deny check $chk ==="
              cargo deny --color never check "$chk" 2>&1 || true
              echo ''
            done
          } > stats/cargo-deny.txt
          {
            echo '## 🔒 Supply chain — cargo-deny'
            echo ''
            for chk in advisories bans licenses sources; do
              echo "<details><summary><b>cargo deny check $chk</b></summary>"
              echo ''
              echo '```'
              cargo deny --color never check "$chk" 2>&1 || true
              echo '```'
              echo '</details>'
              echo ''
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload cargo-deny report
        uses: actions/upload-artifact@v7
        with:
          name: stats-cargo-deny
          path: stats/cargo-deny.txt
          if-no-files-found: warn
          retention-days: 30

  unsafe_audit:
    name: Unsafe audit (cargo-geiger)
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Cache codegen output
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate DLL API bindings
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all
      - name: Install cargo-geiger
        run: cargo install cargo-geiger --locked || cargo install cargo-geiger
      - name: cargo-geiger + summary
        shell: bash
        run: |
          # cargo-geiger refuses a virtual-manifest root AND requires an
          # ABSOLUTE --manifest-path; point it at the azul-dll package manifest.
          #
          # cargo-geiger's bundled cargo (0.86.0) panics with
          # `assertion failed: self.pending_ids.insert(id)` during its
          # "Downloading crates" phase on this dep graph — which is why the
          # 0.2.0 release shipped a 287-byte file that was just the panic dump.
          # The panic is ONLY in the download path, so we pre-fetch every crate
          # with cargo (which doesn't have the bug) and run geiger --offline so
          # it never enters that phase. --locked keeps it on the committed
          # lockfile. We then VALIDATE the output actually contains the report
          # table before publishing it; if geiger still failed, we ship an
          # honest "unavailable" note instead of a misleading empty/panic file.
          mkdir -p stats
          cargo fetch --locked --manifest-path "$PWD/dll/Cargo.toml" || true
          cargo geiger --offline --locked --manifest-path "$PWD/dll/Cargo.toml" \
            --output-format Ascii 2>&1 \
            | grep -v 'Failed to match (ignoring source)' > geiger.txt || true

          # A real report has the legend/table header ("Functions  Expressions"
          # or the ☢️/:) rows). If it's missing, geiger failed (panic/empty).
          if grep -qE 'Functions +Expressions|Rusty' geiger.txt; then
            cp geiger.txt stats/cargo-geiger.txt
            REPORT_OK=1
          else
            {
              echo "cargo-geiger report unavailable for this build."
              echo ""
              echo "cargo-geiger 0.13.x (bundled cargo 0.86.0) panics"
              echo "(assertion failed: self.pending_ids.insert(id)) on azul's"
              echo "dependency graph. Tracking a fix / newer cargo-geiger; until"
              echo "then this report is intentionally omitted rather than shipped"
              echo "as an empty/garbage file. Raw tool output below."
              echo ""
              echo "---- raw output ----"
              cat geiger.txt
            } > stats/cargo-geiger.txt
            REPORT_OK=0
          fi

          {
            echo '## ☢️ Unsafe surface — cargo-geiger (azul-dll)'
            echo ''
            if [ "$REPORT_OK" = "1" ]; then
              echo '<details><summary>full report</summary>'
              echo ''
              echo '```'
              tail -250 stats/cargo-geiger.txt
              echo '```'
              echo '</details>'
            else
              echo '⚠️ cargo-geiger could not run on this dep graph (bundled-cargo panic). See stats/cargo-geiger.txt.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload cargo-geiger report
        uses: actions/upload-artifact@v7
        with:
          name: stats-cargo-geiger
          path: stats/cargo-geiger.txt
          if-no-files-found: warn
          retention-days: 30

  clippy:
    name: Clippy
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ubuntu-22.04
    # NOT continue-on-error: azul-core / azul-css / azul-layout are kept
    # clippy-clean under the pedantic+nursery lint set, so this gate MUST stay
    # green. A red here is a real regression to fix, not triage debt.
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: clippy
      - name: Cache codegen output
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate DLL API bindings
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all
      - name: clippy (extreme lints — enforced as -D warnings)
        shell: bash
        run: |
          set -o pipefail
          # "Extreme lints" lockdown (2026-06-20): the crates declare a maximal
          # opt-in lint set (clippy all/pedantic/nursery/cargo + opt-in rustc
          # lints) at warn-level. Enforce them as ERRORS here so CI surfaces the
          # full outstanding lint debt as a triage report. EXPECTED TO BE RED
          # until the lints are fixed/scoped — that red IS the report. Builds and
          # other jobs stay green (the lints are warn-level outside this gate).
          cargo clippy -p azul-core -p azul-css -p azul-layout --all-targets -- -D warnings 2>&1 | tee clippy.txt

      - name: clippy summary
        if: always()
        shell: bash
        run: |
          mkdir -p stats && cp clippy.txt stats/clippy.txt 2>/dev/null || true
          {
            echo '## 📎 Clippy (extreme lints — azul-core / azul-css / azul-layout)'
            echo ''
            echo "Findings: **$(grep -cE '^(warning|error):' clippy.txt 2>/dev/null || echo 0)**"
            echo ''
            echo '<details><summary>output (tail)</summary>'
            echo ''
            echo '```'
            tail -200 clippy.txt 2>/dev/null || true
            echo '```'
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload clippy report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stats-clippy
          path: stats/clippy.txt
          if-no-files-found: warn
          retention-days: 30

  sanitizers:
    name: Sanitizers (C examples)
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ubuntu-22.04
    continue-on-error: true
    env:
      AZ_BACKEND: headless
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Install clang + headless deps
        run: sudo apt-get update && sudo apt-get install -y clang libgl1-mesa-dev libx11-dev
      - name: Cache codegen output
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate DLL API bindings
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all
      - name: Build azul-dll (debug)
        run: cargo build -p azul-dll --features build-dll
      - name: Run sanitizers + summary
        shell: bash
        run: |
          mkdir -p stats
          # Plain-text report for the release-page Statistics section + the run
          # Summary table. emit() writes one row to both.
          {
            echo '# Sanitizers (C examples, headless)'
            echo ''
            printf '%-14s %-12s %s\n' "example" "sanitizer" "result"
          } > stats/sanitizers.txt
          {
            echo '## 🧪 Sanitizers (C examples, headless)'
            echo ''
            echo '| example | sanitizer | result |'
            echo '|---|---|---|'
          } >> "$GITHUB_STEP_SUMMARY"
          emit() { # <example> <label> <result>
            printf '%-14s %-12s %s\n' "$1" "$2" "$3" >> stats/sanitizers.txt
            echo "| $1 | $2 | $3 |" >> "$GITHUB_STEP_SUMMARY"
          }
          run_san() { # <example> <label> <san-flags>
            local ex="$1" label="$2" flags="$3"
            if ! clang -g -O1 $flags -fno-omit-frame-pointer -I target/codegen \
                 "examples/c/$ex.c" -L target/debug -lazul -o "/tmp/$ex-san" 2>/tmp/cc.log; then
              emit "$ex" "$label" "build-fail"; return
            fi
            local rc=0
            ASAN_OPTIONS=detect_leaks=0:abort_on_error=1 UBSAN_OPTIONS=halt_on_error=1 \
            TSAN_OPTIONS=halt_on_error=0 LD_LIBRARY_PATH=target/debug \
              timeout 30 "/tmp/$ex-san" || rc=$?
            if [ "$rc" -eq 0 ] || [ "$rc" -eq 124 ]; then
              emit "$ex" "$label" "pass"
            else
              emit "$ex" "$label" "FAIL rc=$rc"
            fi
          }
          run_san hello-world "ASan+UBSan" "-fsanitize=address,undefined"
          run_san async       "ASan+UBSan" "-fsanitize=address,undefined"
          run_san async       "ThreadSan"  "-fsanitize=thread"

      - name: Upload sanitizers report
        uses: actions/upload-artifact@v7
        with:
          name: stats-sanitizers
          path: stats/sanitizers.txt
          if-no-files-found: warn
          retention-days: 30

  dep_tree:
    name: Dependency tree (${{ matrix.os }})
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ${{ matrix.os }}
    # The tree-rendering steps below are individually continue-on-error
    # (informational — they just populate the run Summary + an artifact). The
    # final "Check dependency justifications" step is BLOCKING: every crate in
    # the tree must be justified in scripts/dependency-justifications.toml.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Cache codegen output
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-
      - name: Generate DLL API bindings
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        run: cargo run -r -p azul-doc codegen all
      - name: cargo tree (generate crate lists)
        continue-on-error: true
        shell: bash
        run: |
          # Generate the per-member crate list + full tree for each member. The
          # "Check dependency justifications" step below renders the annotated
          # tables (crate + its justification) into the Summary and enforces the
          # gate — so we don't write the bare list here anymore.
          os="${{ matrix.os }}"
          mkdir -p deptree
          gen() { # <label> <cargo-tree args...>
            local label="$1"; shift
            cargo tree "$@" -e normal,build > "deptree/${label}.${os}.tree.txt" 2>/dev/null || true
            cargo tree "$@" -e normal,build --prefix none 2>/dev/null \
              | sed -E 's/ \(.*\)//; s/ v[0-9].*//' | grep -E '^[a-z0-9]' | sort -u \
              > "deptree/${label}.${os}.crates.txt" || true
          }
          gen azul-css    -p azul-css
          gen azul-core   -p azul-core
          gen azul-layout -p azul-layout
          gen azul-dll    -p azul-dll --features build-dll
      - name: Upload dependency trees
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: dependency-trees-${{ matrix.os }}
          path: deptree/
          if-no-files-found: warn

      # BLOCKING supply-chain gate: every crate present in the dependency tree
      # (the deptree/*.crates.txt the step above generated) must carry a
      # one-line justification in scripts/dependency-justifications.toml, or the
      # build fails listing the offenders. So adding a dependency — direct or
      # transitive — requires a deliberate, reviewable "why is this here" line.
      - name: Check dependency justifications
        shell: bash
        run: python3 scripts/check_dep_justifications.py deptree --os "${{ matrix.os }}"

  # Render the full guide (all three books) to a single PDF and upload it as a
  # build artifact, so every push produces a downloadable offline/paper copy.
  # Non-blocking: the headless-Chrome/CDP render is best-effort and must never
  # fail the pipeline. The @media print CSS (docgen/guide.rs) gives light code
  # blocks in the PDF while the web keeps the dark theme.
  docs_pdf:
    name: Docs PDF (artifact)
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode == 'ci' || github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      # Skip the entire PDF render if guide content hasn't changed. Only an EXACT
      # key hit skips it (the render steps gate on cache-hit); a restore-keys hit
      # just drops the previous PDF on disk, which the re-render then overwrites.
      - name: Check docs PDF cache
        id: pdf-cache
        uses: actions/cache@v5
        with:
          path: target/azul-documentation.pdf
          key: docs-pdf-${{ env.CACHE_BUST }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/working/**', 'doc/guide/**', 'doc/src/docgen/**/*.rs', 'doc/src/main.rs', 'scripts/docs_to_pdf.sh') }}
          restore-keys: |
            docs-pdf-${{ env.CACHE_BUST }}-${{ hashFiles('Cargo.lock') }}-
            docs-pdf-${{ env.CACHE_BUST }}-

      # The CDP driver (scripts/docs_pdf_cdp.mjs) uses Node's built-in global
      # WebSocket, which is only available on Node 22+ (runners default lower).
      - name: Install Node 24
        if: steps.pdf-cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install Chrome
        if: steps.pdf-cache.outputs.cache-hit != 'true'
        id: setup_chrome
        uses: browser-actions/setup-chrome@v2
      - name: Install pdfunite (poppler-utils)
        if: steps.pdf-cache.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Render docs → target/azul-documentation.pdf
        if: steps.pdf-cache.outputs.cache-hit != 'true'
        env:
          CHROME_BIN: ${{ steps.setup_chrome.outputs.chrome-path }}
        run: bash scripts/docs_to_pdf.sh --no-open
      - name: Upload docs PDF
        uses: actions/upload-artifact@v7
        with:
          name: azul-documentation-pdf
          path: target/azul-documentation.pdf
          if-no-files-found: warn

  # ===========================================================================
  # Multi-registry publishing (inlined from the former publish.yml). Each job
  # ALWAYS builds/packages its artifact and PUBLISHES only when its registry
  # secret is set (else a ::notice:: skip + exit 0). Gated to the manual
  # deploy run so you can SEE which platform deployments are skipped for
  # missing secrets, in this one workflow file.
  # ===========================================================================
  # ---------------------------------------------------------------------------
  # 1. crates.io — pure-Rust libraries only (NOT azul-dll).
  #
  #    Published in dependency order: azul-css → azul-core → azul-layout.
  #    `--dry-run` always validates packaging; the real publish runs only when
  #    CARGO_REGISTRY_TOKEN is set.
  # ---------------------------------------------------------------------------
  crates-io:
    name: crates.io (azul-css / azul-core / azul-layout)
    if: github.event.inputs.run_mode == 'deploy'
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y clang libgl1-mesa-dev libx11-dev libv4l-dev

      - name: Package (dry-run, always)
        run: |
          set -euo pipefail
          # Validate packaging of each crate in dependency order. --no-verify
          # avoids a full from-scratch compile of dependents during dry-run;
          # the real publish below verifies.
          # NOTE: azul-core/azul-layout carry path+version deps on the crates
          # ahead of them in this list, which are not on crates.io until the
          # real publish below runs. A dry-run of a dependent may therefore
          # warn about an unresolved registry dep — tolerated here so all three
          # are still exercised.
          for crate in azul-css azul-core azul-layout; do
            echo "::group::cargo publish --dry-run -p $crate"
            cargo publish --dry-run -p "$crate" --allow-dirty --no-verify || \
              echo "::warning::dry-run packaging of $crate reported an issue (likely an as-yet-unpublished sibling dep)."
            echo "::endgroup::"
          done

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::notice::CARGO_REGISTRY_TOKEN not set — packaged the crates (dry-run) but skipping publish."
            exit 0
          fi
          # Publish in dependency order. Sleep between crates so the index has
          # time to expose each new version to the next crate's resolver.
          for crate in azul-css azul-core azul-layout; do
            echo "::group::cargo publish -p $crate"
            cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN" || {
              echo "::warning::cargo publish -p $crate failed (already published, or needs version bump?)"
            }
            echo "::endgroup::"
            sleep 20
          done

  # ---------------------------------------------------------------------------
  # 2. PyPI — native pyo3 extension (the `dll` crate with python-extension).
  #
  #    cibuildwheel drives maturin under the hood across the CPython matrix and
  #    bundles the native lib into an importable `azul` wheel. An sdist is also
  #    built. Publish via the official PyPA action, gated on PYPI_API_TOKEN.
  # ---------------------------------------------------------------------------
  pypi:
    name: PyPI (python wheel via maturin/cibuildwheel)
    # website mode BUILDS the wheels too (they feed the self-hosted
    # azul.rs/ui index, wheels at /ui/azul/); publishing to pypi.org stays deploy-only.
    if: github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y clang libgl1-mesa-dev libx11-dev libv4l-dev

      - name: Cache codegen output
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate Python binding source (codegen)
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all

      - name: Stage pyproject.toml at workspace root
        run: |
          set -euo pipefail
          # maturin's manifest-path in the template is relative to the repo
          # root, so place the packaging pyproject + its README there for the
          # build. This is an ephemeral CI checkout — overwriting the root
          # README.md here does not affect the committed tree.
          cp packaging/pypi/pyproject.toml ./pyproject.toml
          cp packaging/pypi/README.md ./README.md

      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v2.21.3
        env:
          # maturin reads pyproject.toml at the repo root (staged above).
          CIBW_BUILD_FRONTEND: "build"
          # pyo3 is abi3-py310, so the building interpreter must be >= 3.10 (you
          # cannot emit an abi3-py310 wheel from an older Python — it references
          # e.g. PyInterpreterState_Get, added to the limited API in 3.10). One
          # cp310 build yields a cp310-abi3 wheel that pip installs on 3.10+.
          CIBW_BUILD: "cp310-*"
          CIBW_SKIP: "*-musllinux* *_i686 pp*"
          # The manylinux image needs the native build deps + a Rust toolchain.
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y clang mesa-libGL-devel libX11-devel ||
            (apt-get update && apt-get install -y clang libgl1-mesa-dev libx11-dev libv4l-dev);
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          CIBW_ENVIRONMENT_LINUX: 'PATH="$HOME/.cargo/bin:$PATH"'
          # Install each built wheel into a fresh env and prove it actually
          # imports + tears down — the regressions THIS release fixed:
          #   import azul        -> abi3 dso_local Py* stub SIGILL / OOM (undefined-Py* fix)
          #   ColorU create/del  -> pyclass teardown SIGSEGV (stub-folding dealloc)
          #   AppConfig create/del -> codegen double-drop (#16/#29, field-glue delegation)
          # Headless (pure-data ops, no GL/display). A broken wheel fails HERE and is
          # never uploaded, so the self-hosted index only ever serves an importable wheel.
          CIBW_TEST_COMMAND: >
            python -c "import azul; c = azul.ColorU.create(1, 2, 3, 4); del c;
            a = azul.AppConfig.create(); del a;
            print('wheel import + pyclass teardown OK')"
        with:
          output-dir: dist

      - name: Build sdist (maturin)
        run: |
          set -euo pipefail
          python -m pip install --upgrade maturin
          maturin sdist -m dll/Cargo.toml -o dist || \
            echo "::warning::maturin sdist failed (sdist is optional for a native extension)"

      - name: List built artifacts
        run: ls -la dist/ || echo "no dist/"

      - name: Upload built wheels (artifact)
        uses: actions/upload-artifact@v7
        with:
          name: pypi-dist
          path: dist/*
          if-no-files-found: warn
          retention-days: 7

      - name: Publish to PyPI
        # NEVER publish externally in website mode (build-only for the mirror).
        if: github.event.inputs.run_mode == 'deploy'
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${PYPI_API_TOKEN:-}" ]; then
            echo "::notice::PYPI_API_TOKEN not set — built the wheels but skipping publish."
            exit 0
          fi
          echo "PUBLISH_PYPI=1" >> "$GITHUB_ENV"

      - name: Upload to PyPI (gh-action-pypi-publish)
        if: env.PUBLISH_PYPI == '1'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
          skip-existing: true

  # ---------------------------------------------------------------------------
  # build_dll_linux — SHARED producer for the Linux language-binding packagers.
  #
  # npm / rubygems / nuget / maven all ran the SAME two slow steps
  # (`codegen all` + `cargo build --release -p azul-dll --features build-dll`)
  # just to copy target/codegen/* + target/release/libazul.so into their
  # package. That's the workspace compiled FOUR redundant times. Build it ONCE
  # here, upload codegen + libazul.so as `azul-dll-linux`, and let those jobs
  # download it (they then need no Rust toolchain at all — pure packagers).
  # Deploy-gated to match its consumers.
  # ---------------------------------------------------------------------------
  build_dll_linux:
    name: Build libazul (linux, shared by binding packagers)
    # Needs build_binaries for the macOS .dylib (arm64) + Windows .dll (x64)
    # artifacts, so the binding packages ship all three platforms — not just the
    # Linux .so this job builds. build_binaries is already required for the Pages
    # deploy, so this adds no new hard gate.
    needs: build_binaries
    # Also runs in website mode: its consumers (npm/rubygems/nuget/maven) feed
    # the self-hosted azul.rs/ui/* mirrors. continue-on-error so a packaging
    # failure can never block the Pages deploy (which `needs` the consumers).
    if: github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    continue-on-error: true
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y clang libgl1-mesa-dev libx11-dev libv4l-dev

      - name: Cache codegen output
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate bindings (codegen)
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all

      - name: Build native library (lean release)
        run: cargo build --release -p azul-dll --features build-dll

      - name: Stage shared codegen + libazul.so
        run: |
          set -euo pipefail
          rm -rf dll-share && mkdir -p dll-share
          cp -a target/codegen dll-share/codegen
          cp target/release/libazul.so dll-share/libazul.so

      # Pull the other-platform native libs built by build_binaries so the
      # binding packages are cross-platform. Best-effort: a missing platform
      # just drops that slot (the package still ships whatever built).
      - name: Download macOS native lib (arm64)
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: azul-macos-amd64
          path: native-macos
      - name: Download Windows native lib (x64)
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: azul-windows-amd64
          path: native-windows
      - name: Stage macOS + Windows native libs into the shared dir
        run: |
          set -u
          if [ -f native-macos/libazul.dylib ]; then
            cp native-macos/libazul.dylib dll-share/libazul.dylib
            echo "[dll-share] + libazul.dylib (macOS arm64)"
          else
            echo "[dll-share] no macOS dylib — package will be Linux/Windows only"
          fi
          if [ -f native-windows/azul.dll ]; then
            cp native-windows/azul.dll dll-share/azul.dll
            echo "[dll-share] + azul.dll (Windows x64)"
          else
            echo "[dll-share] no Windows dll — package will omit the win slot"
          fi

      - name: Upload shared libazul + codegen
        uses: actions/upload-artifact@v7
        with:
          name: azul-dll-linux
          path: dll-share
          retention-days: 7
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 3. npm — Node binding (FFI loader via koffi). Packages the GENERATED
  #    binding (target/codegen/node/{package.json,azul.js}) plus the native
  #    library, NOT the example. `npm pack` always; `npm publish` if NPM_TOKEN.
  # ---------------------------------------------------------------------------
  npm:
    name: npm (node binding)
    needs: build_dll_linux
    # website mode builds the tarball for azul.rs/ui/npm; npmjs publish stays
    # deploy-only.
    if: github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Pure packager: no Rust toolchain / cargo build. Pull the prebuilt
      # libazul.so + codegen from the shared build_dll_linux producer.
      - name: Download shared libazul + codegen
        uses: actions/download-artifact@v7
        with:
          name: azul-dll-linux
          path: dll-share

      - name: Place shared libazul + codegen
        run: |
          set -euo pipefail
          mkdir -p target/codegen target/release
          cp -a dll-share/codegen/. target/codegen/
          cp dll-share/libazul.so target/release/libazul.so

      - name: Assemble npm package
        run: |
          set -euo pipefail
          pkg=target/package/npm
          rm -rf "$pkg" && mkdir -p "$pkg"
          # The generated node binding + its package.json.
          cp target/codegen/node/azul.js "$pkg/azul.js"
          cp target/codegen/node/package.json "$pkg/package.json"
          cp examples/node/README.md "$pkg/README.md" || echo "(no node README)"
          # Bundle every built native lib alongside azul.js — koffi loads the
          # platform-appropriate one (libazul.so / libazul.dylib / azul.dll).
          cp target/release/libazul.so "$pkg/libazul.so"
          [ -f dll-share/libazul.dylib ] && cp dll-share/libazul.dylib "$pkg/libazul.dylib" && echo "npm: + libazul.dylib" || true
          [ -f dll-share/azul.dll ] && cp dll-share/azul.dll "$pkg/azul.dll" && echo "npm: + azul.dll" || true
          # Sync version + ensure the native lib ships in the tarball.
          node -e '
            const fs=require("fs"), p="'"$pkg"'/package.json";
            const j=JSON.parse(fs.readFileSync(p,"utf8"));
            j.version=process.env.AZUL_VERSION;
            j.files=Array.from(new Set([...(j.files||[]),"azul.js","README.md","libazul.so","libazul.dylib","azul.dll"]));
            fs.writeFileSync(p, JSON.stringify(j,null,2));
            console.log("npm package.json version =>", j.version);
          '

      - name: Pack (always — validates packaging)
        working-directory: target/package/npm
        run: npm pack

      - name: Upload npm tarball (artifact)
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: target/package/npm/*.tgz
          if-no-files-found: warn
          retention-days: 7

      - name: Publish to npm
        # NEVER publish externally in website mode (build-only for the mirror).
        if: github.event.inputs.run_mode == 'deploy'
        working-directory: target/package/npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::notice::NPM_TOKEN not set — packed the binding but skipping publish."
            exit 0
          fi
          npm publish --access public

  # ---------------------------------------------------------------------------
  # 4. RubyGems — Ruby binding (FFI loader via the `ffi` gem). Uses the
  #    GENERATED gemspec (target/codegen/azul.gemspec), which expects
  #    lib/azul.rb + lib/native/<rid>/<lib>. `gem build` always; `gem push`
  #    if RUBYGEMS_API_KEY.
  # ---------------------------------------------------------------------------
  rubygems:
    name: RubyGems (ruby binding)
    needs: build_dll_linux
    # website mode builds the .gem for azul.rs/ui/gems; rubygems.org push stays
    # deploy-only.
    if: github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      # Pure packager: pull the prebuilt libazul.so + codegen from build_dll_linux.
      - name: Download shared libazul + codegen
        uses: actions/download-artifact@v7
        with:
          name: azul-dll-linux
          path: dll-share

      - name: Place shared libazul + codegen
        run: |
          set -euo pipefail
          mkdir -p target/codegen target/release
          cp -a dll-share/codegen/. target/codegen/
          cp dll-share/libazul.so target/release/libazul.so

      - name: Assemble gem
        run: |
          set -euo pipefail
          pkg=target/package/ruby
          rm -rf "$pkg" && mkdir -p "$pkg/lib"
          cp target/codegen/azul.gemspec "$pkg/azul.gemspec"
          cp target/codegen/azul.rb "$pkg/lib/azul.rb"
          cp examples/ruby/README.md "$pkg/README.md" || true
          # azul.rb searches its OWN dir (lib/) by filename, so put every built
          # native lib flat next to it and FFI loads the platform-appropriate one.
          # (The old lib/native/<rid>/ path was never on azul.rb's search path.)
          cp target/release/libazul.so "$pkg/lib/libazul.so"
          [ -f dll-share/libazul.dylib ] && cp dll-share/libazul.dylib "$pkg/lib/libazul.dylib" && echo "ruby: + libazul.dylib" || true
          [ -f dll-share/azul.dll ] && cp dll-share/azul.dll "$pkg/lib/azul.dll" && echo "ruby: + azul.dll" || true
          # Pin version + restrict files to what exists so `gem build` passes.
          ruby -e '
            v = ENV["AZUL_VERSION"]
            path = "'"$pkg"'/azul.gemspec"
            s = File.read(path)
            s = s.sub(/s\.version\s*=\s*.*/, "s.version     = \x27#{v}\x27")
            s = s.sub(/s\.files\s*=\s*\[.*?\]/m,
                      "s.files = Dir[\x27lib/**/*\x27]")
            File.write(path, s)
            puts "gemspec version => #{v}"
          '

      - name: Build gem (always — validates packaging)
        working-directory: target/package/ruby
        run: gem build azul.gemspec

      - name: Upload gem (artifact)
        uses: actions/upload-artifact@v7
        with:
          name: ruby-gem
          path: target/package/ruby/*.gem
          if-no-files-found: warn
          retention-days: 7

      - name: Publish to RubyGems
        # NEVER publish externally in website mode (build-only for the mirror).
        if: github.event.inputs.run_mode == 'deploy'
        working-directory: target/package/ruby
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${RUBYGEMS_API_KEY:-}" ]; then
            echo "::notice::RUBYGEMS_API_KEY not set — built the gem but skipping publish."
            exit 0
          fi
          mkdir -p "$HOME/.gem"
          printf -- '---\n:rubygems_api_key: %s\n' "$RUBYGEMS_API_KEY" > "$HOME/.gem/credentials"
          chmod 0600 "$HOME/.gem/credentials"
          gem push ./*.gem

  # ---------------------------------------------------------------------------
  # 5. NuGet — C# binding (P/Invoke). Uses the GENERATED csproj
  #    (target/codegen/Azul.csproj), which packs Azul.cs + runtimes/<rid>/native.
  #    `dotnet pack` always; `dotnet nuget push` if NUGET_API_KEY.
  # ---------------------------------------------------------------------------
  nuget:
    name: NuGet (csharp binding)
    needs: build_dll_linux
    # website mode builds the .nupkg for azul.rs/ui/nuget; nuget.org push stays
    # deploy-only.
    if: github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Pure packager: pull the prebuilt libazul.so + codegen from build_dll_linux.
      - name: Download shared libazul + codegen
        uses: actions/download-artifact@v7
        with:
          name: azul-dll-linux
          path: dll-share

      - name: Place shared libazul + codegen
        run: |
          set -euo pipefail
          mkdir -p target/codegen target/release
          cp -a dll-share/codegen/. target/codegen/
          cp dll-share/libazul.so target/release/libazul.so

      - name: Assemble NuGet package layout
        run: |
          set -euo pipefail
          pkg=target/package/nuget
          rm -rf "$pkg" && mkdir -p "$pkg/runtimes/linux-x64/native"
          cp target/codegen/Azul.csproj "$pkg/Azul.csproj"
          cp target/codegen/Azul.cs "$pkg/Azul.cs"
          cp examples/csharp/README.md "$pkg/README.md" || true
          # Native runtime payloads. The csproj lists win-x64/linux-x64/osx-x64/
          # osx-arm64 each Condition="Exists()", so drop in whatever built and
          # .NET picks the right RID at runtime. (The macOS runner is arm64.)
          cp target/release/libazul.so "$pkg/runtimes/linux-x64/native/libazul.so"
          if [ -f dll-share/libazul.dylib ]; then mkdir -p "$pkg/runtimes/osx-arm64/native"; cp dll-share/libazul.dylib "$pkg/runtimes/osx-arm64/native/libazul.dylib"; echo "nuget: + osx-arm64"; fi
          if [ -f dll-share/azul.dll ]; then mkdir -p "$pkg/runtimes/win-x64/native"; cp dll-share/azul.dll "$pkg/runtimes/win-x64/native/azul.dll"; echo "nuget: + win-x64"; fi

      - name: Pack (always — validates packaging)
        working-directory: target/package/nuget
        run: dotnet pack Azul.csproj -c Release -p:Version="${AZUL_VERSION}" -o ./out

      - name: Upload nupkg (artifact)
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: target/package/nuget/out/*.nupkg
          if-no-files-found: warn
          retention-days: 7

      - name: Publish to NuGet
        # NEVER publish externally in website mode (build-only for the mirror).
        if: github.event.inputs.run_mode == 'deploy'
        working-directory: target/package/nuget
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "::notice::NUGET_API_KEY not set — packed the .nupkg but skipping publish."
            exit 0
          fi
          dotnet nuget push ./out/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  # ---------------------------------------------------------------------------
  # 6. Maven Central — Java/Kotlin binding (JNA loader). Builds a JAR (Java
  #    binding from target/codegen/java + the native lib as a JNA resource),
  #    GPG-signs it, and deploys to OSSRH. Gated on the OSSRH creds AND the GPG
  #    key — if ANY of the four secrets is missing, the deploy is skipped.
  #
  #    A self-contained publishing pom is generated in this step (the codegen
  #    pom is a plain build pom without the signing/staging plugins).
  # ---------------------------------------------------------------------------
  maven-central:
    name: Maven Central (java / kotlin binding)
    needs: build_dll_linux
    # website mode builds the jar for azul.rs/ui/maven; OSSRH deploy stays
    # deploy-only.
    if: github.event.inputs.run_mode == 'deploy' || github.event.inputs.run_mode == 'website'
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Pure packager: pull the prebuilt libazul.so + codegen from build_dll_linux.
      - name: Download shared libazul + codegen
        uses: actions/download-artifact@v7
        with:
          name: azul-dll-linux
          path: dll-share

      - name: Place shared libazul + codegen
        run: |
          set -euo pipefail
          mkdir -p target/codegen target/release
          cp -a dll-share/codegen/. target/codegen/
          cp dll-share/libazul.so target/release/libazul.so

      - name: Assemble Maven project (sources + native resource + publish pom)
        run: |
          set -euo pipefail
          pkg=target/package/maven
          # JNA resource folder name for linux x86-64 (Platform.RESOURCE_PREFIX).
          res="$pkg/src/main/resources/linux-x86-64"
          src="$pkg/src/main/java"
          rm -rf "$pkg" && mkdir -p "$res" "$src/com/azul"
          # Generated Java bindings (flat *.java in package com.azul).
          cp target/codegen/java/*.java "$src/com/azul/" 2>/dev/null || \
            echo "::warning::no generated java sources found"
          # Native libs as JNA-resolvable resources: one folder per
          # Platform.RESOURCE_PREFIX; JNA loads the one matching the host at
          # runtime. maven packs everything under src/main/resources/ into the
          # jar, so no pom change is needed. (The macOS runner is arm64.)
          cp target/release/libazul.so "$res/libazul.so"
          if [ -f dll-share/libazul.dylib ]; then mkdir -p "$pkg/src/main/resources/darwin-aarch64"; cp dll-share/libazul.dylib "$pkg/src/main/resources/darwin-aarch64/libazul.dylib"; echo "maven: + darwin-aarch64"; fi
          if [ -f dll-share/azul.dll ]; then mkdir -p "$pkg/src/main/resources/win32-x86-64"; cp dll-share/azul.dll "$pkg/src/main/resources/win32-x86-64/azul.dll"; echo "maven: + win32-x86-64"; fi
          # Self-contained publishing pom (signing + OSSRH staging plugins).
          cat > "$pkg/pom.xml" <<POM
          <?xml version="1.0" encoding="UTF-8"?>
          <project xmlns="http://maven.apache.org/POM/4.0.0"
                   xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>
            <groupId>rs.azul</groupId>
            <artifactId>azul</artifactId>
            <version>${AZUL_VERSION}</version>
            <packaging>jar</packaging>
            <name>Azul Java Bindings</name>
            <description>Java/Kotlin (JNA) bindings for the Azul GUI framework.</description>
            <url>https://azul.rs/</url>
            <licenses>
              <license><name>MIT</name><url>https://opensource.org/licenses/MIT</url></license>
            </licenses>
            <developers>
              <developer><name>Felix Schütt</name><email>felix.schuett@maps4print.com</email></developer>
            </developers>
            <scm>
              <connection>scm:git:https://github.com/maps4print/azul.git</connection>
              <url>https://github.com/maps4print/azul</url>
            </scm>
            <properties>
              <maven.compiler.source>11</maven.compiler.source>
              <maven.compiler.target>11</maven.compiler.target>
              <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>
            </properties>
            <dependencies>
              <dependency>
                <groupId>net.java.dev.jna</groupId>
                <artifactId>jna</artifactId>
                <version>5.14.0</version>
              </dependency>
            </dependencies>
            <distributionManagement>
              <snapshotRepository>
                <id>ossrh</id>
                <url>https://s01.oss.sonatype.org/content/repositories/snapshots</url>
              </snapshotRepository>
              <repository>
                <id>ossrh</id>
                <url>https://s01.oss.sonatype.org/service/local/staging/deploy/maven2/</url>
              </repository>
            </distributionManagement>
            <build>
              <plugins>
                <plugin>
                  <groupId>org.apache.maven.plugins</groupId>
                  <artifactId>maven-source-plugin</artifactId>
                  <version>3.3.1</version>
                  <executions>
                    <execution><id>attach-sources</id><goals><goal>jar-no-fork</goal></goals></execution>
                  </executions>
                </plugin>
                <plugin>
                  <groupId>org.apache.maven.plugins</groupId>
                  <artifactId>maven-javadoc-plugin</artifactId>
                  <version>3.6.3</version>
                  <configuration><doclint>none</doclint><failOnError>false</failOnError></configuration>
                  <executions>
                    <execution><id>attach-javadocs</id><goals><goal>jar</goal></goals></execution>
                  </executions>
                </plugin>
                <plugin>
                  <groupId>org.apache.maven.plugins</groupId>
                  <artifactId>maven-gpg-plugin</artifactId>
                  <version>3.2.4</version>
                  <executions>
                    <execution><id>sign-artifacts</id><phase>verify</phase><goals><goal>sign</goal></goals></execution>
                  </executions>
                </plugin>
                <plugin>
                  <groupId>org.sonatype.plugins</groupId>
                  <artifactId>nexus-staging-maven-plugin</artifactId>
                  <version>1.7.0</version>
                  <extensions>true</extensions>
                  <configuration>
                    <serverId>ossrh</serverId>
                    <nexusUrl>https://s01.oss.sonatype.org/</nexusUrl>
                    <autoReleaseAfterClose>false</autoReleaseAfterClose>
                  </configuration>
                </plugin>
              </plugins>
            </build>
          </project>
          POM
          echo "Assembled Maven project at $pkg"
          # Sanity-check the generated pom is well-formed before mvn runs.
          if command -v xmllint >/dev/null 2>&1; then xmllint --noout "$pkg/pom.xml"; fi

      - name: Build + verify JAR (always — validates packaging)
        working-directory: target/package/maven
        run: mvn -B -ntp package

      - name: Upload JAR (artifact)
        uses: actions/upload-artifact@v7
        with:
          name: maven-jar
          path: target/package/maven/target/*.jar
          if-no-files-found: warn
          retention-days: 7

      - name: Determine whether all Maven secrets are present
        # deploy-only: in website mode ready is never set, so the OSSRH deploy
        # steps below are skipped (build-only for the azul.rs/ui/maven mirror).
        if: github.event.inputs.run_mode == 'deploy'
        id: mvncheck
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          if [ -n "${OSSRH_USERNAME:-}" ] && [ -n "${OSSRH_TOKEN:-}" ] \
             && [ -n "${MAVEN_GPG_PRIVATE_KEY:-}" ] && [ -n "${MAVEN_GPG_PASSPHRASE:-}" ]; then
            echo "ready=1" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Maven Central secrets incomplete (need OSSRH_USERNAME, OSSRH_TOKEN, MAVEN_GPG_PRIVATE_KEY, MAVEN_GPG_PASSPHRASE) — built the JAR but skipping deploy."
            echo "ready=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Re-configure JDK with OSSRH server + GPG
        if: steps.mvncheck.outputs.ready == '1'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          server-id: ossrh
          server-username: OSSRH_USERNAME
          server-password: OSSRH_TOKEN
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Deploy to Maven Central (OSSRH)
        if: steps.mvncheck.outputs.ready == '1'
        working-directory: target/package/maven
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: mvn -B -ntp deploy -DskipTests

  # ---------------------------------------------------------------------------
  # 7. AUR — Arch User Repository. Source build (cargo build --release -p
  #    azul-dll --features build-dll). The PKGBUILD template lives under
  #    packaging/aur/PKGBUILD; this job stamps the version and deploys via
  #    git+SSH, gated on AUR_SSH_PRIVATE_KEY.
  # ---------------------------------------------------------------------------
  aur:
    name: AUR (Arch — libazul source build)
    if: github.event.inputs.run_mode == 'deploy'
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Stamp PKGBUILD version
        run: |
          set -euo pipefail
          mkdir -p target/package/aur
          cp packaging/aur/PKGBUILD target/package/aur/PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${AZUL_VERSION}/" target/package/aur/PKGBUILD
          echo "::group::PKGBUILD"
          cat target/package/aur/PKGBUILD
          echo "::endgroup::"

      - name: Upload PKGBUILD (artifact)
        uses: actions/upload-artifact@v7
        with:
          name: aur-pkgbuild
          path: target/package/aur/PKGBUILD
          if-no-files-found: warn
          retention-days: 7

      - name: Check AUR secret
        id: aurcheck
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${AUR_SSH_PRIVATE_KEY:-}" ]; then
            echo "::notice::AUR_SSH_PRIVATE_KEY not set — generated the PKGBUILD but skipping AUR publish."
            echo "ready=0" >> "$GITHUB_OUTPUT"
          else
            echo "ready=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to the AUR
        if: steps.aurcheck.outputs.ready == '1'
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: azul
          pkgbuild: target/package/aur/PKGBUILD
          # Username/email default to the maintainer in the PKGBUILD when the
          # optional secrets are unset, so AUR_SSH_PRIVATE_KEY is the only
          # strictly-required secret for this job.
          commit_username: ${{ secrets.AUR_USERNAME || 'Felix Schütt' }}
          commit_email: ${{ secrets.AUR_EMAIL || 'felix.schuett@maps4print.com' }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ env.AZUL_VERSION }}"
          updpkgsums: true

  # ---------------------------------------------------------------------------
  # 8a. LuaRocks — LuaJIT FFI binding. Uses the GENERATED rockspec
  #     (target/codegen/azul-1-1.rockspec). `luarocks pack` validates; upload
  #     gated on LUAROCKS_API_KEY.
  # ---------------------------------------------------------------------------
  luarocks:
    name: LuaRocks (lua binding) [stub]
    if: github.event.inputs.run_mode == 'deploy'
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Install build dependencies + LuaRocks
        run: sudo apt-get update && sudo apt-get install -y clang libgl1-mesa-dev libx11-dev libv4l-dev lua5.1 luarocks

      - name: Cache codegen output
        id: codegen-cache
        uses: actions/cache@v5
        with:
          path: target/codegen
          key: codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('doc/src/**/*.rs', 'doc/Cargo.toml', 'api.json') }}
          restore-keys: |
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            codegen-${{ env.CACHE_BUST }}-${{ runner.os }}-

      - name: Generate bindings (codegen)
        if: steps.codegen-cache.outputs.cache-hit != 'true'
        run: cargo run -r -p azul-doc codegen all

      - name: Assemble rock
        run: |
          set -euo pipefail
          pkg=target/package/lua
          rm -rf "$pkg" && mkdir -p "$pkg"
          # The generated rockspec installs only the LuaJIT FFI glue (azul.lua);
          # the native lib is distributed separately. Stamp the version.
          cp target/codegen/azul.lua "$pkg/azul.lua"
          sed "s/^version = .*/version = \"${AZUL_VERSION}-1\"/" \
            target/codegen/azul-1-1.rockspec > "$pkg/azul-${AZUL_VERSION}-1.rockspec"
          echo "::group::rockspec"
          cat "$pkg/azul-${AZUL_VERSION}-1.rockspec"
          echo "::endgroup::"

      - name: Pack (always — validates the rockspec)
        working-directory: target/package/lua
        run: |
          # `luarocks pack` builds a .src.rock from the rockspec without
          # needing the upstream source tarball to exist yet.
          luarocks pack "azul-${AZUL_VERSION}-1.rockspec" || \
            echo "::warning::luarocks pack failed (source tarball URL not live yet — expected pre-release)."

      - name: Publish to LuaRocks
        working-directory: target/package/lua
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${LUAROCKS_API_KEY:-}" ]; then
            echo "::notice::LUAROCKS_API_KEY not set — built the rockspec but skipping upload."
            exit 0
          fi
          luarocks upload "azul-${AZUL_VERSION}-1.rockspec" --api-key="$LUAROCKS_API_KEY" --skip-pack || \
            echo "::warning::luarocks upload failed (source tarball URL must be live first)."

  # ---------------------------------------------------------------------------
  # 8b. opam (OCaml) — TODO.
  #
  #     The OCaml binding (examples/ocaml) is an FFI loader (ctypes / dlopen of
  #     libazul). Publishing to the opam repository is done via a PR to
  #     ocaml/opam-repository (there is no push-token registry), so it does not
  #     fit the "secret-gated push" pattern of the other jobs. Wiring it up
  #     needs: a generated `azul.opam` file (NOT yet emitted by codegen), a
  #     released source tarball with a stable checksum, and the
  #     `ocaml/setup-ocaml` + `opam publish` (or a repo PR) flow.
  #
  #     Tracked as a follow-up; no job emitted here to avoid a perpetually-red
  #     placeholder.
  # ---------------------------------------------------------------------------
