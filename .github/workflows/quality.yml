# Code-quality, supply-chain, and sanitizer checks.
#
# These harden the libazul dll over time. They start as INFORMATIONAL
# (continue-on-error: true) so they surface issues without blocking the main
# pipeline; once a check is clean, drop its `continue-on-error` to make it a
# hard gate.
name: Quality & Security

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Supply chain: RUSTSEC advisories (== cargo-audit), banned/duplicate deps
  # (dependency-tree review), license review, and crate-source allow-listing.
  # Configured by deny.toml at the repo root.
  supply_chain:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: cargo-deny (advisories + bans + licenses + sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  # Unsafe-code surface: cargo-geiger reports how much `unsafe` each crate (and
  # the dll's dependency tree) uses — useful to watch the unsafe footprint of a
  # repr-C FFI library.
  unsafe_audit:
    name: Unsafe audit (cargo-geiger)
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Generate DLL API bindings
        run: cargo run -r -p azul-doc codegen all
      - name: Install cargo-geiger
        run: cargo install cargo-geiger --locked || cargo install cargo-geiger
      - name: Unsafe report (azul-dll)
        run: cargo geiger -p azul-dll --output-format Ascii || true

  # Clippy across the workspace. Informational for now (the tree still has
  # warnings); tighten to `-D warnings` per-crate as they're cleaned up.
  clippy:
    name: Clippy
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: clippy
      - name: Generate DLL API bindings
        run: cargo run -r -p azul-doc codegen all
      - name: clippy (azul-core, azul-css, azul-layout)
        run: cargo clippy -p azul-core -p azul-css -p azul-layout --no-default-features --features std 2>&1 | tail -n 80

  # Sanitizers on the C examples. ASan/UBSan on hello-world + the threaded
  # async example catch memory/UB bugs across the FFI boundary; ThreadSanitizer
  # on async.c catches data races in azul's background-thread machinery.
  sanitizers:
    name: Sanitizers (C examples)
    runs-on: ubuntu-22.04
    continue-on-error: true
    env:
      AZ_BACKEND: headless
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Install clang + headless deps
        run: sudo apt-get update && sudo apt-get install -y clang libgl1-mesa-dev libx11-dev
      - name: Generate DLL API bindings
        run: cargo run -r -p azul-doc codegen all
      - name: Build azul-dll (debug)
        run: cargo build -p azul-dll --features build-dll

      - name: ASan + UBSan (hello-world, async)
        shell: bash
        run: |
          set -x
          for ex in hello-world async; do
            clang -g -O1 -fsanitize=address,undefined -fno-omit-frame-pointer \
              -I target/codegen examples/c/$ex.c \
              -L target/debug -lazul -o /tmp/$ex-asan
            ASAN_OPTIONS=detect_leaks=0:abort_on_error=1 \
            UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1 \
            LD_LIBRARY_PATH=target/debug \
              timeout 30 /tmp/$ex-asan || [ $? -eq 124 ]
          done

      - name: ThreadSanitizer (async — data races in AzThread)
        shell: bash
        run: |
          set -x
          clang -g -O1 -fsanitize=thread -fno-omit-frame-pointer \
            -I target/codegen examples/c/async.c \
            -L target/debug -lazul -o /tmp/async-tsan
          TSAN_OPTIONS=halt_on_error=0 LD_LIBRARY_PATH=target/debug \
            timeout 30 /tmp/async-tsan || [ $? -eq 124 ]

  # Dependency tree per crate, per OS. Makes the full transitive dependency
  # graph of azul-css / azul-core / azul-layout / azul-dll visible (CI log +
  # downloadable artifact) so a reviewer can spot anything "weird" — a new or
  # untrusted dependency sneaking in. Pairs with cargo-deny (supply_chain),
  # which is the active gate on advisories / sources / licenses / dup versions.
  dep_tree:
    name: Dependency tree (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Generate DLL API bindings
        run: cargo run -r -p azul-doc codegen all
      - name: cargo tree (css / core / layout / dll)
        shell: bash
        run: |
          os="${{ matrix.os }}"
          mkdir -p deptree
          gen() { # <label> <cargo-tree args...>
            local label="$1"; shift
            echo "::group::$label ($os) — full tree"
            cargo tree "$@" -e normal,build 2>/dev/null | tee "deptree/${label}.${os}.tree.txt"
            echo "::endgroup::"
            # flat, de-duplicated crate list (names only) — easiest to eyeball
            cargo tree "$@" -e normal,build --prefix none --no-dedupe 2>/dev/null \
              | sed -E 's/ \(.*\)//; s/ v[0-9].*//' | grep -E '^[a-z0-9]' | sort -u \
              > "deptree/${label}.${os}.crates.txt"
            echo "$label ($os): $(wc -l < "deptree/${label}.${os}.crates.txt" | tr -d ' ') unique crates"
          }
          gen azul-css    -p azul-css
          gen azul-core   -p azul-core
          gen azul-layout -p azul-layout
          gen azul-dll    -p azul-dll --features build-dll
          echo "=== unique crate list (azul-dll, $os) ==="
          cat "deptree/azul-dll.${os}.crates.txt"
      - name: Upload dependency trees
        uses: actions/upload-artifact@v4
        with:
          name: dependency-trees-${{ matrix.os }}
          path: deptree/
          if-no-files-found: warn
