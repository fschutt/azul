[package]
name = "transpile-blueprint"
version = "0.0.1"
edition = "2021"
publish = false
description = "Functional blueprint for Phase C of azul's web backend: extern \"C\" fn → disasm → LLVM IR (via remill, stubbed today) → llc -mtriple=wasm32 → wasm-ld → .wasm"

# Excluded from the root workspace via [workspace.exclude] so the main
# `cargo build` never tries to compile remill's C++ tree. Build with:
#   cd experiments/transpile-blueprint && cargo run --release
[workspace]

[[bin]]
name = "transpile-blueprint"
path = "src/main.rs"

[dependencies]
# Multi-arch disassembler (iximeow / "Quine") — pulled in via the
# arch-specific yaxpeax-arm crate for our Apple Silicon host.
yaxpeax-arch = "0.3"
yaxpeax-arm   = "0.4"

# Real WASM module emission. Used by StubLifter to produce a sanity-check
# module when llc / wasm-ld are not available; the real path goes
# llc → wasm-ld.
wasm-encoder = "0.220"

[build-dependencies]
# cxx is wired in conditionally — only when REMILL_INSTALL_DIR is set
# does build.rs compile the C++ shim and add the link search path.
cxx-build = { version = "1.0", optional = true }

[features]
# OFF (default): build the StubLifter only. End-to-end pipeline is real
# (llc + wasm-ld) but the lift step emits hand-rolled IR. Use this until
# the remill C++ build finishes.
default = []

# ON: link against a built remill tree pointed at by $REMILL_INSTALL_DIR
# and route lift_function() through it.
remill = ["dep:cxx-build"]
