# =============================================================================
# PyPI packaging for the Azul GUI framework's Python bindings.
#
# The Python binding is a *native pyo3 extension* (not an FFI loader): the
# `dll` crate, built with `--features python-extension`, compiles to a CPython
# extension module named `azul` (entry point `PyInit_azul`). The Rust source
# for the module is generated by `cargo run -r -p azul-doc codegen all` into
# `target/codegen/python_api.rs` and `include!`d by `dll/src/lib.rs`, so the
# codegen step MUST run before building the wheel.
#
# maturin is the build backend. It reads `manifest-path` below to find the
# `dll` crate, builds it as an abi3 extension (pyo3 is configured with the
# `abi3` feature, so one wheel works across CPython 3.x), and bundles the
# resulting native library into the wheel as the importable `azul` module.
#
# Build locally:
#     cargo run -r -p azul-doc codegen all
#     pipx run maturin build --release -m dll/Cargo.toml \
#         --features python-extension -i python3.10
#
# In CI the wheels are built with cibuildwheel (see .github/workflows/publish.yml),
# which drives maturin under the hood across the CPython matrix / platforms.
# =============================================================================

[build-system]
requires = ["maturin>=1.5,<2.0"]
build-backend = "maturin"

[project]
name = "azul"
version = "0.2.0"
description = "Python bindings for the Azul GUI framework"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Felix Schütt", email = "felix.schuett@maps4print.com" }]
keywords = ["gui", "user-interface", "svg", "graphics", "css"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Rust",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: User Interfaces",
]

[project.urls]
Homepage = "https://azul.rs/"
Repository = "https://github.com/maps4print/azul"

[tool.maturin]
# Path to the crate that produces the `azul` pyo3 extension. Relative to this
# pyproject.toml; the workflow copies this file to the repo root before build
# so the path resolves against the workspace.
manifest-path = "dll/Cargo.toml"
# `python-extension` pulls in pyo3 (abi3 + extension-module), use_pyo3_logger,
# link-static and build-dll — the full functional surface as a CPython module.
features = ["python-extension"]
# Build a single abi3 wheel (forward-compatible across CPython 3.x) instead of
# one wheel per interpreter version.
# (pyo3's `abi3` feature in dll/Cargo.toml makes the produced .so abi3-tagged.)
